              <span className="mono" style={{ fontSize: 11, color: "var(--dim)" }}>{idx + 1}</span>
              <span className="mono" style={{ fontSize: 10, color: "var(--dim)" }}>{c ? c.matricule : "—"}</span>
              <span style={{ fontSize: 12, fontWeight: 600 }}>{c ? c.prenom + " " + c.nom : "—"}</span>
              <span>{c ? <Badge color={ORGANISMES_DATA[c.organisme_formation]?.color}>{c.organisme_formation}</Badge> : "—"}</span>
              <span className="mono" style={{ fontSize: 12, fontWeight: 700, color: moyColor(ins.moyenne_ponderee) }}>{ins.moyenne_ponderee !== null ? Number(ins.moyenne_ponderee).toFixed(2) : "—"}</span>
              <ResultBadge r={ins.resultat} />
            </div>); })}
          {sInscs.length === 0 && <Empty text="Aucun candidat" />}
        </div>

        {sf && <SessionForm session={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}

        {/* Planning form modal */}
        {planForm && (
          <Modal onClose={() => { setPlanForm(null); setPlanEdit(null); }} title={planEdit ? "Modifier epreuve" : "Programmer une epreuve"} width={480}>
            <div className="form-grid">
              <Field label="Module *">
                <select className="select" value={planForm.matiere_uuid} onChange={e => setPlanForm({ ...planForm, matiere_uuid: e.target.value })}>
                  <option value="">— Choisir un module —</option>
                  {(modules||[]).sort((a, b) => a.ordre - b.ordre).map(m => <option key={m.id} value={m.id}>{m.nom}</option>)}
                </select>
              </Field>
              <Field label="Date"><input type="date" className="input" value={planForm.date_epreuve} onChange={e => setPlanForm({ ...planForm, date_epreuve: e.target.value })} /></Field>
              <Field label="Heure debut"><input type="time" className="input" value={planForm.heure_debut || "08:00"} onChange={e => setPlanForm({ ...planForm, heure_debut: e.target.value })} /></Field>
              <Field label="Duree (min)"><input type="number" className="input" value={planForm.duree_minutes || 120} onChange={e => setPlanForm({ ...planForm, duree_minutes: parseInt(e.target.value) || 120 })} /></Field>
              <Field label="Salle"><input className="input" value={planForm.salle || ""} onChange={e => setPlanForm({ ...planForm, salle: e.target.value })} placeholder="Optionnel" /></Field>
              <Field label="Notes"><input className="input" value={planForm.notes || ""} onChange={e => setPlanForm({ ...planForm, notes: e.target.value })} placeholder="Optionnel" /></Field>
            </div>
            <button className="btn btn-accent btn-full" style={{ marginTop: 16 }} onClick={() => {
              if (!planForm.matiere_uuid) { alert("Choisissez un module"); return; }
              const data = { session_uuid: planForm.session_uuid || detail.id, matiere_uuid: planForm.matiere_uuid, date_epreuve: planForm.date_epreuve, heure_debut: planForm.heure_debut, duree_minutes: planForm.duree_minutes, salle: planForm.salle || null, notes: planForm.notes || null };
              savePlan(data);
            }}>{planEdit ? "Enregistrer" : "Programmer"}</button>
          </Modal>
        )}
      </div>
    );
  }

  /* ===== SESSIONS LIST (colored by status) ===== */
  return (
    <div>
      <div className="filters">
        <div className="filter-group">{["Tous", ...STATUTS_SESSION].map(s => <button key={s} className={"filter-btn " + (fil === s ? "active" : "")} onClick={() => setFil(s)}>{s}</button>)}</div>
        <div className="spacer" /><button className="btn btn-accent" onClick={() => { setEd(null); setSf(true); }}>+ Session</button>
      </div>

      {/* Desktop: colored session cards */}
      <div className="desktop-only" style={{ display: "grid", gap: 10 }}>
        {fl.map(s => {
          const nb = inscriptions.filter(i => i.session_uuid === s.id).length;
          const sb = statusBg[s.statut] || statusBg["Planifiee"];
          return (
            <div key={s.id} style={{ padding: "16px 20px", borderRadius: 14, background: sb.bg, border: "1.5px solid " + sb.border, cursor: "pointer", transition: "var(--tr)", display: "grid", gridTemplateColumns: "70px 1fr 100px 90px 60px 36px", alignItems: "center", gap: 10 }} onClick={() => setDetail(s)}>
              <span className="mono" style={{ fontSize: 10, color: "var(--dim)" }}>{s.session_id}</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700 }}>{s.intitule}</div>
                <div className="hint">{s.lieu || "—"} — {s.president_jury || "—"}</div>
              </div>
              <span className="hint">{fmtDate(s.date_debut)}</span>
              <Tag label={s.statut} />
              <Badge color="var(--cyan)">{nb}</Badge>
              <button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(s); }}>🗑</button>
            </div>
          );
        })}
        {fl.length === 0 && <Empty text="Aucune session" />}
      </div>

      {/* Mobile: colored cards */}
      <div className="mobile-only">
        {fl.map(s => {
          const nb = inscriptions.filter(i => i.session_uuid === s.id).length;
          const sb = statusBg[s.statut] || statusBg["Planifiee"];
          return (
            <div key={s.id} style={{ padding: 16, borderRadius: 14, background: sb.bg, border: "1.5px solid " + sb.border, marginBottom: 10, cursor: "pointer" }} onClick={() => setDetail(s)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{s.intitule}</div>
                  <div className="hint" style={{ marginTop: 2 }}>{s.session_id}</div>
                </div>
                <button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(s); }}>🗑</button>
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}><Tag label={s.statut} /><Badge color="var(--cyan)">{nb}</Badge></div>
              <div className="hint" style={{ marginTop: 8 }}>{s.lieu || "—"} — {fmtDate(s.date_debut)}</div>
            </div>
          );
        })}
        {fl.length === 0 && <Empty text="Aucune session" />}
      </div>

      <FAB onClick={() => { setEd(null); setSf(true); }} />
      {sf && <SessionForm session={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item={del.session_id} onConfirm={rm} onCancel={() => setDel(null)} />}
    </div>
  );
}

/* ===== BULK INSCRIPTION MODAL ===== */
function BulkInscriptionModal({ api, selectedCandidats, sessions, inscriptions, onClose, onDone }) {
  const [targetSession, setTargetSession] = useState("");
  const [processing, setProcessing] = useState(false);
  const [result, setResult] = useState(null);

  // Pre-check: which candidates are already inscribed to the target session
  const alreadyInscribed = useMemo(() => {
    if (!targetSession) return new Set();
    const set = new Set();
    (inscriptions || []).forEach(i => {
      if (i.session_uuid === targetSession) set.add(i.candidat_uuid);
    });
    return set;
  }, [targetSession, inscriptions]);

  const toInscribe = selectedCandidats.filter(c => !alreadyInscribed.has(c.id));
  const alreadyCount = selectedCandidats.length - toInscribe.length;

  const doInscribe = async () => {
    if (!targetSession) { alert("Selectionnez une session cible"); return; }
    if (toInscribe.length === 0) { alert("Tous les candidats selectionnes sont deja inscrits a cette session"); return; }
    setProcessing(true);
    let ok = 0, errors = 0;
    const errorDetails = [];
    for (const c of toInscribe) {
      try {
        await api.insert("inscriptions", { candidat_uuid: c.id, session_uuid: targetSession, statut: "Inscrit" });
        ok++;
      } catch (err) {
        errors++;
        errorDetails.push((c.prenom + " " + c.nom) + ": " + err.message);
      }
    }
    setResult({ ok, errors, errorDetails, alreadySkipped: alreadyCount });
    setProcessing(false);
  };

  const sess = sessions.find(s => s.id === targetSession);

  return (
    <Modal onClose={onClose} title="Affecter a une session" width={560}>
      <div style={{ marginBottom: 18, padding: 16, background: "rgba(36,99,235,0.04)", borderRadius: 12, border: "1px solid var(--border)" }}>
        <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 4 }}>Candidats selectionnes</div>
        <div style={{ fontSize: 28, fontWeight: 800, color: "var(--accent)", fontFamily: "'Playfair Display',serif" }}>{selectedCandidats.length}</div>
        <div style={{ marginTop: 8, maxHeight: 120, overflowY: "auto", fontSize: 12, color: "var(--dim)" }}>
          {selectedCandidats.map((c, i) => (
            <span key={c.id}>{c.prenom} {c.nom}{i < selectedCandidats.length - 1 ? " · " : ""}</span>
          ))}
        </div>
      </div>

      {!result ? (
        <div>
          <Field label="Session cible *">
            <select className="select" value={targetSession} onChange={e => setTargetSession(e.target.value)}>
              <option value="">— Choisir une session —</option>
              {sessions
                .filter(s => s.statut !== "Archivee")
                .sort((a,b) => String(b.date_debut||"").localeCompare(String(a.date_debut||"")))
                .map(s => <option key={s.id} value={s.id}>{s.intitule} ({s.session_id})</option>)
              }
            </select>
          </Field>

          {targetSession && (
            <div style={{ marginTop: 14, padding: 14, borderRadius: 10, background: alreadyCount > 0 ? "rgba(245,158,11,0.08)" : "rgba(34,197,94,0.08)", border: alreadyCount > 0 ? "1px solid rgba(245,158,11,0.2)" : "1px solid rgba(34,197,94,0.2)", fontSize: 13 }}>
              {toInscribe.length > 0 && (
                <div style={{ color: "var(--green)", fontWeight: 700 }}>
                  ✓ {toInscribe.length} candidat{toInscribe.length > 1 ? "s" : ""} seront inscrits a "{sess?.intitule}"
                </div>
              )}
              {alreadyCount > 0 && (
                <div style={{ color: "var(--orange)", marginTop: 4 }}>
                  ⚠ {alreadyCount} candidat{alreadyCount > 1 ? "s" : ""} deja inscrit{alreadyCount > 1 ? "s" : ""} a cette session (seront ignores)
                </div>
              )}
              {toInscribe.length === 0 && (
                <div style={{ color: "var(--orange)", fontWeight: 700 }}>
                  Tous les candidats selectionnes sont deja inscrits a cette session.
                </div>
              )}
            </div>
          )}

          <button
            className="btn btn-accent btn-full"
            style={{ marginTop: 18 }}
            onClick={doInscribe}
            disabled={processing || !targetSession || toInscribe.length === 0}
          >
            {processing ? "Inscription en cours..." : "Inscrire " + toInscribe.length + " candidat" + (toInscribe.length > 1 ? "s" : "")}
          </button>
        </div>
      ) : (
        <div>
          <div style={{ padding: 16, borderRadius: 10, background: result.errors > 0 ? "rgba(200,16,46,0.08)" : "rgba(34,197,94,0.08)", border: result.errors > 0 ? "1px solid rgba(200,16,46,0.2)" : "1px solid rgba(34,197,94,0.2)", fontSize: 13 }}>
            <div style={{ color: "var(--green)", fontWeight: 700, fontSize: 16 }}>
              ✓ {result.ok} candidat{result.ok > 1 ? "s" : ""} inscrit{result.ok > 1 ? "s" : ""} avec succes
            </div>
            {result.alreadySkipped > 0 && (
              <div style={{ color: "var(--orange)", marginTop: 6 }}>{result.alreadySkipped} ignore{result.alreadySkipped > 1 ? "s" : ""} (deja inscrits)</div>
            )}
            {result.errors > 0 && (
              <div style={{ marginTop: 8 }}>
                <div style={{ color: "var(--red-tn)" }}>{result.errors} erreur{result.errors > 1 ? "s" : ""}</div>
                <div style={{ marginTop: 4, fontSize: 11, color: "var(--red-tn)", maxHeight: 80, overflowY: "auto" }}>
                  {result.errorDetails.map((e, i) => <div key={i}>• {e}</div>)}
                </div>
              </div>
            )}
          </div>
          <button className="btn btn-accent btn-full" style={{ marginTop: 18 }} onClick={onDone}>Fermer et actualiser</button>
        </div>
      )}
    </Modal>
  );
}

/* ===== CANDIDATS VIEW ===== */
function CandidatsView({ api, candidats, sessions, inscriptions, reload }) {
  const [historyCandidat, setHistoryCandidat] = React.useState(null);
  const [step, setStep] = useState("org");
  const [selectedOrg, setSelectedOrg] = useState("");
  const [selectedSessionId, setSelectedSessionId] = useState("");
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [importModal, setImportModal] = useState(false);
  const [se, setSe] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [bulkModal, setBulkModal] = useState(false);

  const candById = useMemo(() => { const m = new Map(); (candidats||[]).forEach(c => m.set(c.id, c)); return m; }, [candidats]);
  const goOrg = () => { setStep("org"); setSelectedOrg(""); setSelectedSessionId(""); setSe(""); setSelected(new Set()); };
  const goSessions = () => { setStep("sessions"); setSelectedSessionId(""); setSe(""); setSelected(new Set()); };

  const sessionsForOrg = useMemo(() => {
    if (!selectedOrg) return [];
    const sset = new Set();
    (inscriptions||[]).forEach(i => { const c = candById.get(i.candidat_uuid); if (c && (c.organisme_formation||"") === selectedOrg) sset.add(i.session_uuid); });
    return (sessions||[]).filter(s => sset.has(s.id)).sort((a, b) => String(b.date_debut||"").localeCompare(String(a.date_debut||"")));
  }, [selectedOrg, inscriptions, sessions, candById]);

  const candidatsForSession = useMemo(() => {
    if (!selectedOrg || !selectedSessionId) return [];
    let rows = [];
    (inscriptions||[]).filter(i => i.session_uuid === selectedSessionId).forEach(i => {
      const c = candById.get(i.candidat_uuid);
      if (c && (c.organisme_formation||"") === selectedOrg) rows.push({ candidat: c, inscription: i });
    });
    const q = (se||"").trim().toLowerCase();
    if (q) rows = rows.filter(({ candidat: c }) => (c.nom||"").toLowerCase().includes(q) || (c.prenom||"").toLowerCase().includes(q) || (c.matricule||"").toLowerCase().includes(q) || (c.cin||"").toLowerCase().includes(q));
    rows.sort((a, b) => `${a.candidat.nom} ${a.candidat.prenom}`.toLowerCase().localeCompare(`${b.candidat.nom} ${b.candidat.prenom}`.toLowerCase()));
    return rows;
  }, [selectedOrg, selectedSessionId, inscriptions, candById, se]);

  const save = async (d) => { try { if (ed) await api.update("candidats", ed.id, d); else await api.insert("candidats", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("candidats", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };
  const toggleSelect = id => setSelected(p => { const n = new Set(p); if (n.has(id)) n.delete(id); else n.add(id); return n; });
  const toggleSelectAll = () => { if (selected.size === candidatsForSession.length) setSelected(new Set()); else setSelected(new Set(candidatsForSession.map(r => r.candidat.id))); };
  const someSelected = selected.size > 0;
  const selectedObjs = candidatsForSession.filter(r => selected.has(r.candidat.id)).map(r => r.candidat);

  if (step === "org") {
    return (<div>
      <div className="filters"><div className="hint">Choisis un centre de formation</div><div className="spacer" /><button className="btn-outline" onClick={() => setImportModal(true)}>Importer Excel</button><button className="btn btn-accent" onClick={() => { setEd(null); setSf(true); }}>+ Candidat</button></div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 14 }}>
        {ORGANISMES.map(org => {
          const nb = (candidats||[]).filter(c => (c.organisme_formation||"") === org).length;
          const nbI = (inscriptions||[]).filter(i => { const c = candById.get(i.candidat_uuid); return c && (c.organisme_formation||"") === org; }).length;
          return (<div key={org} className="centre-card" onClick={() => { setSelectedOrg(org); setStep("sessions"); }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}><OrgIcon org={org} size={48} /><div style={{ flex: 1 }}><div style={{ fontWeight: 800, fontSize: 18 }}>{org}</div><div className="hint">{nb} candidats · {nbI} inscriptions</div></div><div style={{ fontSize: 24, color: "var(--dim)" }}>→</div></div>
          </div>);
        })}
      </div>
      {sf && <CandidatForm candidat={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item={del.prenom + " " + del.nom} onConfirm={rm} onCancel={() => setDel(null)} />}
      {importModal && <ImportExcelModal api={api} sessions={sessions} onClose={() => setImportModal(false)} onDone={() => { setImportModal(false); reload(); }} />}
    </div>);
  }

  if (step === "sessions") {
    return (<div>
      <div className="filters"><button className="btn-outline" onClick={goOrg}>← Centres</button><div style={{ display: "flex", alignItems: "center", gap: 8 }}><OrgIcon org={selectedOrg} size={28} /><strong>{selectedOrg}</strong></div><div className="spacer" /></div>
      {sessionsForOrg.length === 0 ? (<div className="card card-padded"><Empty text={"Aucune session pour " + selectedOrg} /></div>) : (
        <div style={{ display: "grid", gap: 10 }}>
          {sessionsForOrg.map(s => {
            const nb = (inscriptions||[]).filter(i => { if (i.session_uuid !== s.id) return false; const c = candById.get(i.candidat_uuid); return c && (c.organisme_formation||"") === selectedOrg; }).length;
            return (<div key={s.id} className="card" style={{ padding: "16px 20px", cursor: "pointer" }} onClick={() => { setSelectedSessionId(s.id); setStep("candidats"); setSelected(new Set()); }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><div style={{ fontWeight: 700, fontSize: 14 }}>{s.intitule}</div><div className="hint">{s.session_id} · {fmtDate(s.date_debut)} → {fmtDate(s.date_fin)} · {s.lieu || "—"}</div></div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Tag label={s.statut} /><Badge color={ORGANISMES_DATA[selectedOrg]?.color}>{nb} cand.</Badge><span style={{ color: "var(--dim)" }}>→</span></div>
              </div>
            </div>);
          })}
        </div>
      )}
    </div>);
  }

  const session = (sessions||[]).find(s => s.id === selectedSessionId);
  return (<div>
    <div className="filters">
      <button className="btn-outline" onClick={goSessions}>← Sessions {selectedOrg}</button>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}><OrgIcon org={selectedOrg} size={24} /><div><strong>{selectedOrg}</strong><span className="hint" style={{ marginLeft: 8 }}>{session?.intitule || ""}</span></div></div>
      <div className="spacer" /><input className="input" style={{ maxWidth: 240 }} placeholder="Rechercher…" value={se} onChange={e => setSe(e.target.value)} />
    </div>
    {someSelected && (<div style={{ marginBottom: 12, padding: "10px 16px", borderRadius: 12, background: "rgba(37,99,235,0.06)", border: "1px solid rgba(37,99,235,0.2)", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
      <strong style={{ color: "var(--accent)", fontSize: 13 }}>{selected.size} selectionne{selected.size > 1 ? "s" : ""}</strong><div className="spacer" />
      <button className="btn btn-accent btn-sm" onClick={() => setBulkModal(true)}>Affecter a une session</button>
      <button className="btn-outline btn-sm" onClick={() => setSelected(new Set())}>Deselectionner</button>
    </div>)}
    <div className="hint" style={{ marginBottom: 10 }}>{candidatsForSession.length} candidat{candidatsForSession.length !== 1 ? "s" : ""}</div>
    <div className="table-container desktop-only">
      <div className="table-head" style={{ gridTemplateColumns: "36px 100px 1fr 110px 80px 80px" }}>
        <div style={{ textAlign: "center" }}><input type="checkbox" checked={candidatsForSession.length > 0 && selected.size === candidatsForSession.length} onChange={toggleSelectAll} style={{ width: 15, height: 15, cursor: "pointer", accentColor: "var(--accent)" }} /></div>
        <div>Matricule</div><div>Nom & Prenom</div><div>CIN</div><div>Moyenne</div><div>Action</div>
      </div>
      {candidatsForSession.length === 0 ? <Empty text="Aucun candidat" /> : candidatsForSession.map(({ candidat: c, inscription: ins }) => {
        const isChk = selected.has(c.id);
        return (<div key={c.id + ins.id} className="table-row" style={{ gridTemplateColumns: "36px 100px 1fr 110px 80px 80px", background: isChk ? "rgba(37,99,235,0.04)" : undefined }} onClick={() => toggleSelect(c.id)}>
          <div style={{ textAlign: "center" }} onClick={e => e.stopPropagation()}><input type="checkbox" checked={isChk} onChange={() => toggleSelect(c.id)} style={{ width: 15, height: 15, cursor: "pointer", accentColor: "var(--accent)" }} /></div>
          <div className="mono" style={{ fontWeight: 700, fontSize: 10 }}>{c.matricule || "—"}</div>
          <div><div style={{ fontWeight: 700, fontSize: 12 }}>{c.prenom} {c.nom}</div><div className="hint">{c.email || c.telephone || "—"}</div></div>
          <div className="mono" style={{ color: "var(--muted)", fontSize: 10 }}>{c.cin || "—"}</div>
          <div className="mono" style={{ fontWeight: 800, fontSize: 12, color: (ins?.moyenne_ponderee ?? null) === null ? "var(--dim)" : (Number(ins.moyenne_ponderee) >= PASS_MARK ? "var(--green)" : "var(--red-tn)") }}>{(ins?.moyenne_ponderee ?? null) === null ? "—" : Number(ins.moyenne_ponderee).toFixed(2)}</div>
          <div style={{ display: "flex", gap: 4 }} onClick={e => e.stopPropagation()}><button className="btn-outline btn-sm" onClick={() => { setEd(c); setSf(true); }}>✏️</button><button className="btn-outline btn-sm" onClick={() => setDel(c)}>🗑</button></div>
        </div>);
      })}
    </div>
    <div className="mobile-only">{candidatsForSession.length === 0 ? <Empty text="Aucun candidat" /> : candidatsForSession.map(({ candidat: c, inscription: ins }) => {
      const isChk = selected.has(c.id);
      return (<div key={c.id + ins.id} className="mobile-card" style={{ border: isChk ? "2px solid var(--accent)" : undefined }} onClick={() => toggleSelect(c.id)}>
        <div className="mobile-card-header"><div style={{ display: "flex", alignItems: "center", gap: 8 }}><input type="checkbox" checked={isChk} onChange={() => toggleSelect(c.id)} onClick={e => e.stopPropagation()} style={{ width: 16, height: 16, accentColor: "var(--accent)", flexShrink: 0 }} /><div><div className="mobile-card-title">{c.prenom} {c.nom}</div><div className="mobile-card-id">{c.matricule} · {c.cin || "—"}</div></div></div><button className="btn-outline btn-sm" onClick={e => { e.stopPropagation(); setEd(c); setSf(true); }}>✏️</button></div>
        <div className="mobile-card-footer"><span className="mono" style={{ fontSize: 14, fontWeight: 700, color: (ins?.moyenne_ponderee ?? null) === null ? "var(--dim)" : (Number(ins.moyenne_ponderee) >= PASS_MARK ? "var(--green)" : "var(--red-tn)") }}>{(ins?.moyenne_ponderee ?? null) === null ? "—" : Number(ins.moyenne_ponderee).toFixed(2) + "/20"}</span><button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(c); }}>🗑</button></div>
      </div>);
    })}</div>
    <FAB onClick={() => { setEd(null); setSf(true); }} />
    {sf && <CandidatForm candidat={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
    {del && <ConfirmDelete item={del.prenom + " " + del.nom} onConfirm={rm} onCancel={() => setDel(null)} />}
    {importModal && <ImportExcelModal api={api} sessions={sessions} onClose={() => setImportModal(false)} onDone={() => { setImportModal(false); reload(); }} />}
    {bulkModal && <BulkInscriptionModal api={api} selectedCandidats={selectedObjs} sessions={sessions} inscriptions={inscriptions} onClose={() => setBulkModal(false)} onDone={() => { setBulkModal(false); setSelected(new Set()); reload(); }} />}

      {historyCandidat && (() => {
        const hc = historyCandidat;
        const hSessions = sessions.filter(s => inscriptions.some(i => i.session_uuid === s.id && i.candidat_uuid === hc.id));
        return <div className="modal-overlay" onClick={() => setHistoryCandidat(null)}>
          <div className="modal-box" style={{ maxWidth: 580 }} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2>Historique — {hc.prenom} {hc.nom}</h2>
              <button className="btn-icon" onClick={() => setHistoryCandidat(null)}>✕</button>
            </div>
            <div className="modal-body" style={{ maxHeight: "60vh", overflowY: "auto" }}>
              {hSessions.length === 0 && <p style={{ color: "var(--muted)" }}>Aucun historique.</p>}
              {hSessions.map((s, idx) => {
                const sIns = inscriptions.find(i => i.session_uuid === s.id && i.candidat_uuid === hc.id);
                const moy = sIns && sIns.moyenne_ponderee ? Number(sIns.moyenne_ponderee).toFixed(2) : null;
                const isAdmis = sIns && sIns.resultat === "admis";
                const isRachat = sIns && sIns.rachat;
                return <div key={idx} style={{ marginBottom: 14, padding: 12, background: "var(--bg)", borderRadius: 10, border: "1px solid var(--border)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <strong>{s.intitule || "Session"}</strong>
                      <div style={{ fontSize: 11, color: "var(--muted)" }}>{s.date_debut} → {s.date_fin}</div>
                    </div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      {moy && <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "var(--mono)", color: isAdmis ? "var(--green-tn)" : "var(--red-tn)" }}>{moy}</span>}
                      {isAdmis && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: isRachat ? "rgba(234,179,8,.1)" : "rgba(22,163,74,.1)", color: isRachat ? "#b45309" : "var(--green-tn)", fontWeight: 600 }}>{isRachat ? "RACHAT" : "ADMIS"}</span>}
                      {sIns && sIns.resultat === "ajourne" && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 6, background: "rgba(200,16,46,.1)", color: "var(--red-tn)", fontWeight: 600 }}>AJOURNÉ</span>}
                    </div>
                  </div>
                </div>;
              })}
            </div>
          </div>
        </div>;
      })()}
  </div>);
}



/* ===== NOTES VIEW ===== */
function NotesView({ api, sessions, candidats, inscriptions, notes, modules, reload }) {
  const [selSession, setSelSession] = useState(null);
  const [importMod, setImportMod] = useState(null);
  const [importFile, setImportFile] = useState(null);
  const [importPreview, setImportPreview] = useState(null);
  const [importStep, setImportStep] = useState("pick");
  const [importing, setImporting] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [editCell, setEditCell] = useState(null);
  const [editVal, setEditVal] = useState("");

  if (!selSession) {
    return (<div>
      <div className="section-title">✏ Saisie des Notes</div>
      <p style={{ color: "var(--muted)", fontSize: 13, marginBottom: 16 }}>Selectionnez une session pour saisir ou importer les notes.</p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {sessions.map(s => {
          const sIns = inscriptions.filter(i => i.session_uuid === s.id);
          const sMods = modules.filter(m => m.session_uuid === s.id);
          const totalNotes = notes.filter(n => sIns.some(i => i.id === n.inscription_uuid) && n.note !== null).length;
          const totalExpected = sIns.length * sMods.length;
          const pct = totalExpected > 0 ? Math.round(totalNotes / totalExpected * 100) : 0;
          const barColor = pct === 100 ? "var(--green-tn)" : pct > 50 ? "var(--accent)" : pct > 0 ? "#f59e0b" : "var(--border)";
          return <div key={s.id} className="card" style={{ padding: 16, cursor: "pointer", transition: "var(--tr)" }}
            onClick={() => setSelSession(s)}
            onMouseEnter={e => e.currentTarget.style.borderColor = "var(--accent)"}
            onMouseLeave={e => e.currentTarget.style.borderColor = ""}>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6 }}>{s.intitule}</div>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 10 }}>{s.date_debut} → {s.date_fin} — {s.organisation || ""}</div>
            <div style={{ display: "flex", gap: 16, fontSize: 12, marginBottom: 8 }}>
              <span><strong>{sIns.length}</strong> candidats</span>
              <span><strong>{sMods.length}</strong> modules</span>
              <span style={{ color: barColor, fontWeight: 600 }}>{totalNotes}/{totalExpected} notes ({pct}%)</span>
            </div>
            <div style={{ height: 4, borderRadius: 2, background: "var(--border)", overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct + "%", background: barColor, borderRadius: 2, transition: "width 0.3s" }} />
            </div>
          </div>;
        })}
      </div>
    </div>);
  }

  const session = selSession;
  const sMods = modules.filter(m => m.session_uuid === session.id).sort((a,b) => a.ordre - b.ordre);
  const sInscr = inscriptions.filter(i => i.session_uuid === session.id);

  const getNote = (insId, modId) => {
    const n = notes.find(x => x.inscription_uuid === insId && x.matiere_uuid === modId);
    return n || null;
  };

  const handleCellClick = (ins, mod) => {
    const n = getNote(ins.id, mod.id);
    setEditCell({ ins, mod });
    setEditVal(n && n.note !== null ? String(n.note) : "");
  };

  const saveCell = async () => {
    if (!editCell) return;
    const { ins, mod } = editCell;
    const val = editVal.trim();
    const isAbs = val.toLowerCase() === "abs";
    const noteNum = isAbs ? null : (val === "" ? null : parseFloat(val));
    if (val !== "" && !isAbs && (isNaN(noteNum) || noteNum < 0 || noteNum > 20)) { alert("Note invalide (0-20 ou abs)"); return; }

    const record = { inscription_uuid: ins.id, matiere_uuid: mod.id, note: noteNum, absent: isAbs };
    const existing = notes.find(n => n.inscription_uuid === ins.id && n.matiere_uuid === mod.id);
    try {
      if (existing) await api.update("notes", existing.id, record);
      else if (val !== "") await api.insert("notes", record);
      setEditCell(null);
      reload();
    } catch (e) { alert(e.message); }
  };

  const openModuleImport = (mod) => {
    setImportMod(mod);
    setImportStep("pick");
    setImportFile(null);
    setImportPreview(null);
    setImportResult(null);
  };

  const downloadModTemplate = () => {
    if (!importMod) return;
    const wb = XLSX.utils.book_new();
    const headers = ["CIN", "Nom", "Prenom", "Note (/20)"];
    const rows = sInscr.map(ins => {
      const cand = candidats.find(x => x.id === ins.candidat_uuid) || {};
      return [cand.cin || "", cand.nom || "", cand.prenom || "", ""];
    });
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    ws["!cols"] = [{ wch: 14 }, { wch: 18 }, { wch: 18 }, { wch: 12 }];
    XLSX.utils.book_append_sheet(wb, ws, importMod.nom.substring(0, 31).replace(/[\[\]*?\/\\:]/g, "-"));
    XLSX.writeFile(wb, "Notes_" + importMod.nom.replace(/\s/g, "_") + ".xlsx");
  };

  const handleImportFile = async (f) => {
    setImportFile(f);
    try {
      const data = await f.arrayBuffer();
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      if (rows.length === 0) { setImportResult({ error: "Fichier vide" }); return; }
      const headers = Object.keys(rows[0]);
      const cinCol = headers.find(h => h.toLowerCase().includes("cin")) || headers[0];
      const noteCol = headers.find(h => h.toLowerCase().includes("note")) || headers[headers.length - 1];
      const matched = [];
      const errors = [];
      rows.forEach(function(row, ri) {
        const cin = String(row[cinCol] || "").trim();
        if (!cin) return;
        const cand = candidats.find(function(x) { return String(x.cin).trim() === cin; });
        if (!cand) { errors.push("L" + (ri+2) + ": CIN " + cin + " non trouve"); return; }
        const ins = sInscr.find(function(i) { return i.candidat_uuid === cand.id; });
        if (!ins) { errors.push("L" + (ri+2) + ": " + cin + " non inscrit"); return; }
        var val = row[noteCol];
        var absent = false;
        var note = null;
        if (String(val).toLowerCase() === "abs" || String(val).toLowerCase() === "absent") {
          absent = true;
        } else if (val !== "" && val !== null && val !== undefined) {
          var parsed = parseFloat(val);
          if (!isNaN(parsed) && parsed >= 0 && parsed <= 20) { note = parsed; }
          else { errors.push("L" + (ri+2) + ": note invalide"); return; }
        } else { return; }
        matched.push({ cin: cin, cand: cand, ins: ins, note: note, absent: absent });
      });
      setImportPreview({ matched: matched, errors: errors });
      setImportStep("preview");
    } catch (e) { setImportResult({ error: "Erreur: " + e.message }); }
  };

  const doModuleImport = async () => {
    if (!importPreview || !importMod) return;
    setImporting(true);
    var saved = 0;
    try {
      for (const item of importPreview.matched) {
        const record = { inscription_uuid: item.ins.id, matiere_uuid: importMod.id, note: item.absent ? null : item.note, absent: item.absent };
        const existing = notes.find(function(n) { return n.inscription_uuid === item.ins.id && n.matiere_uuid === importMod.id; });
        if (existing) await api.update("notes", existing.id, record);
        else await api.insert("notes", record);
        saved++;
      }
      for (const item of importPreview.matched) {
        var tCN = 0, tC = 0;
        sMods.forEach(function(m) {
          var n = notes.find(function(x) { return x.inscription_uuid === item.ins.id && x.matiere_uuid === m.id; });
          if (m.id === importMod.id) { n = { note: item.absent ? null : item.note, absent: item.absent }; }
          if (n && !n.absent && n.note !== null) { tCN += n.note * m.coefficient; tC += m.coefficient; }
        });
        var moy = tC > 0 ? tCN / tC : null;
        var res = moy !== null ? (moy >= PASS_MARK ? "Admis" : "Ajourne") : "En attente";
        await api.update("inscriptions", item.ins.id, { moyenne_ponderee: moy, resultat: res });
      }
      setImportResult({ saved: saved });
      setImportStep("done");
      reload();
    } catch (e) { setImportResult({ error: e.message }); }
    setImporting(false);
  };

  return (<div>
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
      <button className="btn btn-sm" onClick={() => setSelSession(null)}>← Sessions</button>
      <h2 style={{ fontSize: 18, fontWeight: 800, flex: 1 }}>{session.intitule}</h2>
      <span style={{ fontSize: 12, color: "var(--muted)" }}>{sInscr.length} candidats — {sMods.length} modules</span>
    </div>

    <div style={{ overflowX: "auto", border: "1px solid var(--border)", borderRadius: 10, background: "var(--card)" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, minWidth: sMods.length * 70 + 280 }}>
        <thead>
          <tr style={{ background: "var(--bg)" }}>
            <th style={{ padding: "10px 8px", textAlign: "left", position: "sticky", left: 0, background: "var(--bg)", zIndex: 2, borderRight: "2px solid var(--border)", minWidth: 180 }}>Candidat</th>
            {sMods.map(mod => {
              const modNotes = notes.filter(n => sInscr.some(i => i.id === n.inscription_uuid) && n.matiere_uuid === mod.id && n.note !== null);
              const filled = modNotes.length;
              const allFilled = filled === sInscr.length;
              return <th key={mod.id} style={{ padding: "6px 4px", textAlign: "center", minWidth: 65, cursor: "pointer", borderBottom: allFilled ? "3px solid var(--green-tn)" : "3px solid var(--border)" }}
                onClick={() => openModuleImport(mod)}
                title={"Cliquer pour importer — " + filled + "/" + sInscr.length + " notes"}>
                <div style={{ fontSize: 10, fontWeight: 700, lineHeight: 1.2, color: "var(--fg)" }}>{mod.nom.length > 12 ? mod.nom.substring(0, 11) + "\u2026" : mod.nom}</div>
                <div style={{ fontSize: 9, color: "var(--muted)", marginTop: 2 }}>x{mod.coefficient}</div>
                <div style={{ fontSize: 9, marginTop: 2, color: allFilled ? "var(--green-tn)" : "#f59e0b" }}>{filled}/{sInscr.length}</div>
              </th>;
            })}
            <th style={{ padding: "10px 8px", textAlign: "center", minWidth: 70, borderLeft: "2px solid var(--border)", fontWeight: 800 }}>Moy.</th>
          </tr>
        </thead>
        <tbody>
          {sInscr.sort((a,b) => (b.moyenne_ponderee||0) - (a.moyenne_ponderee||0)).map((ins, ri) => {
            const cand = candidats.find(x => x.id === ins.candidat_uuid) || {};
            const moy = ins.moyenne_ponderee;
            const passed = moy !== null && moy !== undefined && moy >= PASS_MARK;
            return <tr key={ins.id} style={{ borderBottom: "1px solid var(--border)", background: ri % 2 === 0 ? "transparent" : "rgba(36,99,235,0.015)" }}>
              <td style={{ padding: "8px", position: "sticky", left: 0, background: ri % 2 === 0 ? "var(--card)" : "rgba(246,248,252,1)", zIndex: 1, borderRight: "2px solid var(--border)" }}>
                <div style={{ fontWeight: 600, fontSize: 12 }}>{cand.prenom} {cand.nom}</div>
                <div style={{ fontSize: 10, color: "var(--muted)" }}>{cand.cin}</div>
              </td>
              {sMods.map(mod => {
                const n = getNote(ins.id, mod.id);
                const hasNote = n && n.note !== null;
                const isAbs = n && n.absent;
                const isEditing = editCell && editCell.ins.id === ins.id && editCell.mod.id === mod.id;
                if (isEditing) {
                  return <td key={mod.id} style={{ padding: 2, textAlign: "center" }}>
                    <input autoFocus type="text" value={editVal} onChange={e => setEditVal(e.target.value)}
                      onKeyDown={e => { if(e.key === "Enter") saveCell(); if(e.key === "Escape") setEditCell(null); }}
                      onBlur={() => saveCell()}
                      style={{ width: 50, textAlign: "center", fontSize: 12, fontFamily: "var(--mono)", padding: "4px 2px", border: "2px solid var(--accent)", borderRadius: 4, outline: "none" }} />
                  </td>;
                }
                return <td key={mod.id}
                  onClick={() => handleCellClick(ins, mod)}
                  style={{ padding: "4px 2px", textAlign: "center", cursor: "pointer", fontFamily: "var(--mono)", fontWeight: 600,
                    color: isAbs ? "var(--muted)" : hasNote ? (n.note < 10 ? "var(--red-tn)" : "var(--green-tn)") : "var(--border)",
                    fontSize: hasNote || isAbs ? 12 : 10 }}
                  title={hasNote ? mod.nom + ": " + n.note + "/20" : "Cliquer pour saisir"}>
                  {isAbs ? "ABS" : hasNote ? n.note : "···"}
                </td>;
              })}
              <td style={{ padding: "8px 6px", textAlign: "center", borderLeft: "2px solid var(--border)", fontFamily: "var(--mono)", fontWeight: 800, fontSize: 14,
                color: moy === null || moy === undefined ? "var(--muted)" : passed ? "var(--green-tn)" : "var(--red-tn)" }}>
                {moy !== null && moy !== undefined ? Number(moy).toFixed(2) : "—"}
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>

    {importMod && <div className="modal-overlay" onClick={() => setImportMod(null)}>
      <div className="modal-box" style={{ maxWidth: 520 }} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>{importMod.nom} <span style={{ fontSize: 12, color: "var(--muted)", fontWeight: 400 }}>x{importMod.coefficient}</span></h2>
          <button className="btn-icon" onClick={() => setImportMod(null)}>✕</button>
        </div>
        <div className="modal-body" style={{ padding: 20 }}>
          {importStep === "pick" && <div>
            <p style={{ color: "var(--muted)", fontSize: 13, marginBottom: 16, lineHeight: 1.5 }}>
              Importez les notes du module <strong>{importMod.nom}</strong> depuis un fichier Excel.
              Le fichier doit contenir les colonnes <strong>CIN</strong> et <strong>Note</strong>.
            </p>
            <button className="btn btn-sm" style={{ marginBottom: 16 }} onClick={downloadModTemplate}>
              ⬇ Telecharger template ({sInscr.length} candidats)
            </button>
            <div style={{ border: "2px dashed var(--border-light)", borderRadius: 10, padding: 24, textAlign: "center", cursor: "pointer", background: "var(--bg)" }}
              onClick={() => document.getElementById("import-mod-file").click()}
              onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = "var(--accent)"; }}
              onDragLeave={e => { e.currentTarget.style.borderColor = ""; }}
              onDrop={e => { e.preventDefault(); e.currentTarget.style.borderColor = ""; if(e.dataTransfer.files[0]) handleImportFile(e.dataTransfer.files[0]); }}>
              <div style={{ fontSize: 13, fontWeight: 600 }}>📎 Glisser ou cliquer pour importer</div>
              <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 4 }}>.xlsx, .xls</div>
            </div>
            <input id="import-mod-file" type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }}
              onChange={e => { if(e.target.files[0]) handleImportFile(e.target.files[0]); }} />
            {importResult && importResult.error && <div style={{ marginTop: 10, padding: 8, background: "rgba(200,16,46,0.08)", borderRadius: 6, color: "var(--red-tn)", fontSize: 12 }}>{importResult.error}</div>}
          </div>}

          {importStep === "preview" && importPreview && <div>
            <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
              <span style={{ padding: "4px 10px", borderRadius: 6, background: "rgba(22,163,74,0.08)", fontSize: 12 }}>
                <strong style={{ color: "var(--green-tn)" }}>{importPreview.matched.length}</strong> notes
              </span>
              {importPreview.errors.length > 0 && <span style={{ padding: "4px 10px", borderRadius: 6, background: "rgba(234,179,8,0.08)", fontSize: 12 }}>
                <strong style={{ color: "#b45309" }}>{importPreview.errors.length}</strong> avert.
              </span>}
            </div>
            <div style={{ maxHeight: 250, overflowY: "auto", marginBottom: 12, border: "1px solid var(--border)", borderRadius: 6 }}>
              {importPreview.matched.map((item, i) => <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 10px", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
                <span>{item.cand.prenom} {item.cand.nom} <span style={{ color: "var(--muted)", fontSize: 10 }}>({item.cin})</span></span>
                <span style={{ fontFamily: "var(--mono)", fontWeight: 700, color: item.absent ? "var(--muted)" : item.note < 10 ? "var(--red-tn)" : "var(--green-tn)" }}>
                  {item.absent ? "ABS" : item.note}
                </span>
              </div>)}
            </div>
            {importPreview.errors.length > 0 && <details style={{ marginBottom: 10, fontSize: 11 }}>
              <summary style={{ cursor: "pointer", color: "#b45309" }}>{importPreview.errors.length} avertissement(s)</summary>
              {importPreview.errors.map((e, i) => <div key={i} style={{ color: "#92400e", padding: "1px 0" }}>{e}</div>)}
            </details>}
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button className="btn btn-sm" onClick={() => { setImportStep("pick"); setImportPreview(null); }}>Retour</button>
              <button className="btn btn-accent btn-sm" onClick={doModuleImport} disabled={importing}>
                {importing ? "Import..." : "Importer " + importPreview.matched.length + " notes"}
              </button>
            </div>
          </div>}

          {importStep === "done" && importResult && <div style={{ textAlign: "center", padding: 10 }}>
            <div style={{ fontSize: 36, marginBottom: 8 }}>✅</div>
            <p style={{ marginBottom: 12, fontSize: 13 }}><strong>{importResult.saved}</strong> notes importees pour <strong>{importMod.nom}</strong></p>
            <button className="btn btn-accent btn-sm" onClick={() => setImportMod(null)}>Fermer</button>
          </div>}
        </div>
      </div>
    </div>}
  </div>);
}

/* ===== DELIBERATIONS VIEW ===== */
function DeliberationsView({ api, sessions, candidats, inscriptions, deliberations, reload }) {
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [rachatModal, setRachatModal] = useState(null);
  const [rachatMotif, setRachatMotif] = useState("");
  const save = async (d) => { try { if (ed) await api.update("deliberations", ed.id, d); else await api.insert("deliberations", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("deliberations", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };

  /* Rachat (#15) */
  const doRachat = async () => {
    if (!rachatModal) return;
    try {
      await api.update("inscriptions", rachatModal.id, { resultat: "Admis", observations: (rachatModal.observations || "") + "\n[RACHAT] " + rachatMotif });
      setRachatModal(null); setRachatMotif(""); reload();
    } catch (e) { alert(e.message); }
  };

  return (
    <div>
      <div className="filters"><div className="spacer" /><button className="btn btn-purple" onClick={() => { setEd(null); setSf(true); }}>+ Deliberation</button></div>
      {deliberations.map(d => {
        const s = sessions.find(x => x.id === d.session_uuid);
        const iS = inscriptions.filter(i => i.session_uuid === d.session_uuid);
        const ad = iS.filter(i => i.resultat === "Admis").length;
        /* Cas limites (#14): moyenne entre 12 et 13 */
        const casLimites = iS.filter(i => i.moyenne_ponderee !== null && Number(i.moyenne_ponderee) >= 12 && Number(i.moyenne_ponderee) < 13);
        return (
          <div key={d.id} className="card card-padded" style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 800, fontSize: 15 }}>{s ? s.intitule : "—"}</div>
                <div className="hint">{d.date_deliberation} · {d.pv_valide ? "✅ PV valide" : "⏳ PV en attente"}</div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button className="btn-outline btn-sm" onClick={() => { setEd(d); setSf(true); }}>Modifier</button>
                <button className="btn-icon" onClick={() => setDel(d)}>🗑</button>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
              <Badge color="var(--green)">{ad} admis</Badge>
              <Badge color="var(--red-tn)">{iS.length - ad} aj.</Badge>
              <Badge color="var(--cyan)">{iS.length} total</Badge>
              {casLimites.length > 0 && <Badge color="var(--orange)">⚠ {casLimites.length} cas limite{casLimites.length > 1 ? "s" : ""}</Badge>}
            </div>
            {/* Cas limites detail */}
            {casLimites.length > 0 && (
              <div style={{ marginTop: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--orange)", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Cas limites (12-13)</div>
                {casLimites.map(i => {
                  const c = (candidats||[]).find(x => x.id === i.candidat_uuid);
                  return (
                    <div key={i.id} className="cas-limite" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", borderRadius: 8, marginBottom: 4, border: "1px solid var(--border)", fontSize: 12 }}>
                      <div><span style={{ fontWeight: 700 }}>{c ? c.prenom + " " + c.nom : "—"}</span><span className="hint" style={{ marginLeft: 6 }}>{c ? c.organisme_formation : ""}</span></div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span className="mono" style={{ fontWeight: 700, color: "var(--orange)" }}>{Number(i.moyenne_ponderee).toFixed(2)}</span>
                        <ResultBadge r={i.resultat} />
                        {i.resultat === "Ajourne" && <button className="btn btn-green btn-sm" onClick={() => { setRachatModal(i); setRachatMotif(""); }}>Rachat</button>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
      {deliberations.length === 0 && <Empty text="Aucune deliberation" />}
      <FAB onClick={() => { setEd(null); setSf(true); }} color="var(--purple)" />
      {sf && <DeliberationForm delib={ed} sessions={sessions} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item="cette deliberation" onConfirm={rm} onCancel={() => setDel(null)} />}
      {rachatModal && (
        <Modal onClose={() => setRachatModal(null)} title="Rachat — Decision du jury" width={460}>
          {(() => { const c = (candidats||[]).find(x => x.id === rachatModal.candidat_uuid); return (
            <div>
              <div style={{ marginBottom: 14, fontSize: 13 }}><strong>{c ? c.prenom + " " + c.nom : "—"}</strong> — Moyenne: <strong className="mono" style={{ color: "var(--orange)" }}>{Number(rachatModal.moyenne_ponderee).toFixed(2)}/20</strong></div>
              <Field label="Motif du rachat *" span><textarea className="textarea" value={rachatMotif} onChange={e => setRachatMotif(e.target.value)} placeholder="Decision du jury: proximite du seuil, progression, circonstances..." /></Field>
              <button className="btn btn-green btn-full" style={{ marginTop: 14 }} onClick={doRachat} disabled={!rachatMotif.trim()}>Confirmer le rachat → Admis</button>
            </div>
          ); })()}
        </Modal>
      )}
    </div>
  );
}

/* ===== PDF EXPORT ===== */
function exportReleve(candidat, inscription, notesArr, modules) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text("DGAC — Direction Generale de l'Aviation Civile", 14, 20);
  doc.setFontSize(11); doc.text("Republique Tunisienne", 14, 28);
  doc.setFontSize(14); doc.text("Releve de Notes — Examen ATE", 14, 42);
  doc.setFontSize(11);
  doc.text("Candidat: " + candidat.prenom + " " + candidat.nom, 14, 55);
  doc.text("Matricule: " + candidat.matricule + "    CIN: " + (candidat.cin || "—"), 14, 62);
  doc.text("Organisme: " + (candidat.organisme_formation || "—"), 14, 69);
  const rows = modules.sort((a, b) => a.ordre - b.ordre).map(m => {
    const n = notesArr.find(x => x.matiere_uuid === m.id);
    return [m.nom, m.coefficient, n && n.absent ? "ABS" : n && n.note !== null ? n.note + "/20" : "—"];
  });
  doc.autoTable({ startY: 78, head: [["Module", "Coef", "Note"]], body: rows, styles: { fontSize: 9 }, headStyles: { fillColor: [18, 32, 61] } });
  const fy = doc.lastAutoTable.finalY + 14;
  const moy = inscription.moyenne_ponderee !== null ? Number(inscription.moyenne_ponderee).toFixed(2) : "—";
  doc.setFontSize(13); doc.text("Moyenne Ponderee: " + moy + "/20", 14, fy);
  doc.setFontSize(14); doc.text("Resultat: " + (inscription.resultat || "En attente"), 14, fy + 10);
  doc.save("Releve_" + candidat.matricule + ".pdf");
}

function exportPV(session, inscriptions, candidats, modules, notes) {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF("l");
  doc.setFontSize(12); doc.text("REPUBLIQUE TUNISIENNE", 148, 12, { align: "center" });
  doc.setFontSize(10); doc.text("Ministere du Transport - Direction Generale de l'Aviation Civile", 148, 18, { align: "center" });
  doc.setFontSize(14); doc.text("PROCES-VERBAL DE DELIBERATION", 148, 28, { align: "center" });
  doc.setFontSize(11);
  doc.text("Session: " + (session.intitule || ""), 14, 38);
  doc.text("Date: " + (session.date_debut || "") + "  au  " + (session.date_fin || ""), 14, 44);
  doc.text("Organisation: " + (session.organisation || ""), 14, 50);
  var jury = session.membres_jury ? session.membres_jury.split(",").map(function(m){ return m.trim(); }) : [];
  var yPos = 56;
  if (jury.length > 0) {
    doc.setFontSize(10);
    doc.text("Composition du jury:", 14, yPos); yPos += 6;
    doc.text("President: " + jury[0], 20, yPos); yPos += 5;
    for (var ji = 1; ji < jury.length; ji++) { doc.text("Membre " + ji + ": " + jury[ji], 20, yPos); yPos += 5; }
    yPos += 4;
  }
  var sInscrits = inscriptions.filter(function(i){ return i.session_uuid === session.id; }).sort(function(a,b){ return (b.moyenne_ponderee||0) - (a.moyenne_ponderee||0); });
  var sMods = modules.filter(function(m){ return m.session_uuid === session.id; });
  var headers = ["N", "CIN", "Nom", "Prenom"].concat(sMods.map(function(m){ return m.nom.substring(0,12); })).concat(["Moy.", "Resultat", "Obs."]);
  var rows = [];
  var admisCount = 0;
  var rachats = [];
  sInscrits.forEach(function(ins, idx) {
    var cand = candidats.find(function(cc){ return cc.id === ins.candidat_uuid; }) || {};
    var row = [idx+1, cand.cin||"", cand.nom||"", cand.prenom||""];
    sMods.forEach(function(m) {
      var n = notes.find(function(x){ return x.session_uuid === session.id && x.candidat_uuid === ins.candidat_uuid && x.module_uuid === m.id; });
      row.push(n ? n.note : "");
    });
    var moy = ins.moyenne_ponderee ? Number(ins.moyenne_ponderee).toFixed(2) : "";
    var isAdmis = ins.resultat === "admis";
    var isRachat = ins.rachat;
    var obs = "";
    if (isRachat) { obs = "RACHAT"; rachats.push({ nom: (cand.nom||"") + " " + (cand.prenom||""), cin: cand.cin, moy: moy, motif: ins.rachat_motif || "" }); }
    if (isAdmis) admisCount++;
    row.push(moy, isAdmis ? "ADMIS" : (ins.resultat === "ajourne" ? "AJOURNE" : ""), obs);
    rows.push(row);
  });
  doc.autoTable({ head: [headers], body: rows, startY: yPos, styles: { fontSize: 7 }, headStyles: { fillColor: [36, 99, 235] } });
  var finalY = doc.lastAutoTable.finalY + 8;
  if (rachats.length > 0) {
    doc.setFontSize(10); doc.text("Candidats admis par rachat:", 14, finalY); finalY += 6;
    doc.setFontSize(8);
    rachats.forEach(function(r){ doc.text(r.nom + " (CIN: " + r.cin + ") - Moy: " + r.moy + " - Motif: " + (r.motif || "Decision du jury"), 20, finalY); finalY += 5; });
    finalY += 4;
  }
  var taux = sInscrits.length > 0 ? ((admisCount / sInscrits.length) * 100).toFixed(1) : "0";
  doc.setFontSize(10);
  doc.text("Taux de reussite: " + admisCount + "/" + sInscrits.length + " (" + taux + "%)", 14, finalY);
  finalY += 12;
  doc.text("Le President du Jury", 30, finalY);
  doc.text("Membre 1", 120, finalY);
  doc.text("Membre 2", 210, finalY);
  finalY += 3;
  doc.line(14, finalY, 80, finalY); doc.line(104, finalY, 170, finalY); doc.line(194, finalY, 260, finalY);
  finalY += 12;
  doc.setFontSize(8);
  doc.text("Lu et approuve - Document genere le " + new Date().toLocaleDateString("fr-FR"), 14, finalY);
  doc.save("PV_" + (session.intitule || "session").replace(/\s/g, "_") + ".pdf");
}

/* ===== RESULTS VIEW ===== */
function ResultatsView({ sessions, candidats, inscriptions, notes, modules, api, reload }) {
  const [selSession, setSelSession] = useState(null);
  const [orgF, setOrgF] = useState("Tous");
  const [detail, setDetail] = useState(null);
  const [showStats, setShowStats] = useState(false);
  const [rachatCand, setRachatCand] = useState(null);
  const [rachatMotif, setRachatMotif] = useState("");

  if (!selSession) {
    return (<div>
      <div className="section-title">📊 Résultats</div>
      <p style={{ color: "var(--muted)", fontSize: 13, marginBottom: 16 }}>Sélectionnez une session pour consulter les résultats.</p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {sessions.map(s => {
          const sIns = inscriptions.filter(i => i.session_uuid === s.id);
          const admis = sIns.filter(i => i.resultat === "Admis").length;
          const ajourne = sIns.filter(i => i.resultat === "Ajourne").length;
          const attente = sIns.length - admis - ajourne;
          const taux = sIns.length > 0 ? Math.round(admis / sIns.length * 100) : 0;
          return <div key={s.id} className="card" style={{ padding: 16, cursor: "pointer", transition: "var(--tr)" }}
            onClick={() => setSelSession(s)}
            onMouseEnter={e => e.currentTarget.style.borderColor = "var(--accent)"}
            onMouseLeave={e => e.currentTarget.style.borderColor = ""}>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6 }}>{s.intitule}</div>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 10 }}>{s.date_debut} → {s.date_fin} — {s.organisation || ""}</div>
            <div style={{ display: "flex", gap: 12, fontSize: 12, marginBottom: 8 }}>
              <span><strong style={{ color: "var(--green-tn)" }}>{admis}</strong> admis</span>
              <span><strong style={{ color: "var(--red-tn)" }}>{ajourne}</strong> ajournés</span>
              {attente > 0 && <span><strong style={{ color: "var(--muted)" }}>{attente}</strong> en attente</span>}
              <span style={{ marginLeft: "auto", fontWeight: 700, color: taux >= 50 ? "var(--green-tn)" : "var(--red-tn)" }}>{taux}%</span>
            </div>
            <div style={{ height: 4, borderRadius: 2, background: "var(--border)", overflow: "hidden", display: "flex" }}>
              <div style={{ height: "100%", width: (sIns.length > 0 ? admis/sIns.length*100 : 0) + "%", background: "var(--green-tn)" }} />
              <div style={{ height: "100%", width: (sIns.length > 0 ? ajourne/sIns.length*100 : 0) + "%", background: "var(--red-tn)" }} />
            </div>
          </div>;
        })}
      </div>
    </div>);
  }

  const session = selSession;
  const sMods = modules.filter(m => m.session_uuid === session.id).sort((a,b) => a.ordre - b.ordre);
  const allSI = inscriptions.filter(i => i.session_uuid === session.id);
  const sI = allSI.filter(i => {
    if (orgF === "Tous") return true;
    const cd = candidats.find(x => x.id === i.candidat_uuid);
    return cd && cd.organisme_formation === orgF;
  }).sort((a, b) => (b.moyenne_ponderee || 0) - (a.moyenne_ponderee || 0));
  const admis = sI.filter(i => i.resultat === "Admis").length;
  const total = sI.length;

  const matStats = sMods.map(m => {
    const mn = [];
    allSI.forEach(i => { const n = notes.find(x => x.inscription_uuid === i.id && x.matiere_uuid === m.id); if (n && n.note !== null && !n.absent) mn.push(n.note); });
    const max = mn.length > 0 ? Math.max(...mn) : null;
    const avg = mn.length > 0 ? (mn.reduce((a, b) => a + b, 0) / mn.length) : null;
    const sup = mn.filter(n => n >= 10).length;
    return { nom: m.nom, coefficient: m.coefficient, max: max, avg: avg, sup: sup, total: mn.length };
  });

  const orgStats = ORGANISMES.map(o => {
    const oI = allSI.filter(i => { const cd = candidats.find(x => x.id === i.candidat_uuid); return cd && cd.organisme_formation === o; });
    const oA = oI.filter(i => i.resultat === "Admis").length;
    const oM = oI.filter(i => i.moyenne_ponderee !== null);
    const avg = oM.length > 0 ? (oM.reduce((s, i) => s + Number(i.moyenne_ponderee), 0) / oM.length) : null;
    return { org: o, total: oI.length, admis: oA, taux: oI.length > 0 ? Math.round((oA / oI.length) * 100) : 0, avg: avg };
  });

  return (<div>
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
      <button className="btn btn-sm" onClick={() => setSelSession(null)}>← Sessions</button>
      <h2 style={{ fontSize: 18, fontWeight: 800, flex: 1 }}>{session.intitule}</h2>
      <div className="filter-group">{["Tous", ...ORGANISMES].map(o => <button key={o} className={"filter-btn " + (orgF === o ? "active" : "")} onClick={() => setOrgF(o)}>{o}</button>)}</div>
      <button className="btn btn-outline btn-sm" onClick={() => setShowStats(!showStats)}>{showStats ? "Tableau" : "Stats"}</button>
      <button className="btn btn-purple btn-sm" onClick={() => exportPV(session, inscriptions, candidats, modules, notes)}>PDF PV</button>
    </div>

    <div className="kpi-grid" style={{ marginBottom: 16 }}>
      <KPI label="Candidats" value={total} color="var(--cyan)" />
      <KPI label="Admis" value={admis} color="var(--green)" />
      <KPI label="Ajourn\u00e9s" value={total - admis} color="var(--red-tn)" />
      <KPI label="Taux r\u00e9ussite" value={total > 0 ? Math.round((admis / total) * 100) + "%" : "\u2014"} color="var(--green)" />
    </div>

    {showStats ? (<div>
      <div className="section-title" style={{ marginBottom: 10 }}>Statistiques par module</div>
      <div style={{ overflowX: "auto", marginBottom: 20 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead><tr style={{ background: "var(--bg)" }}>
            <th style={{ padding: "8px", textAlign: "left" }}>Module</th>
            <th style={{ padding: "8px", textAlign: "center" }}>Coef.</th>
            <th style={{ padding: "8px", textAlign: "center" }}>Nb notes</th>
            <th style={{ padding: "8px", textAlign: "center" }}>Moy. classe</th>
            <th style={{ padding: "8px", textAlign: "center" }}>Max</th>
            <th style={{ padding: "8px", textAlign: "center" }}>≥10</th>
          </tr></thead>
          <tbody>{matStats.map((ms, i) => <tr key={i} style={{ borderBottom: "1px solid var(--border)" }}>
            <td style={{ padding: "6px 8px", fontWeight: 600 }}>{ms.nom}</td>
            <td style={{ padding: "6px", textAlign: "center" }}>x{ms.coefficient}</td>
            <td style={{ padding: "6px", textAlign: "center" }}>{ms.total}</td>
            <td style={{ padding: "6px", textAlign: "center", fontFamily: "var(--mono)", fontWeight: 700, color: ms.avg !== null && ms.avg >= 10 ? "var(--green-tn)" : "var(--red-tn)" }}>{ms.avg !== null ? ms.avg.toFixed(2) : "\u2014"}</td>
            <td style={{ padding: "6px", textAlign: "center", fontFamily: "var(--mono)" }}>{ms.max !== null ? ms.max : "\u2014"}</td>
            <td style={{ padding: "6px", textAlign: "center" }}>{ms.sup}/{ms.total}</td>
          </tr>)}</tbody>
        </table>
      </div>

      <div className="section-title" style={{ marginBottom: 10 }}>Statistiques par organisme</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
        {orgStats.map((os, i) => <div key={i} className="card" style={{ padding: 14 }}>
          <div style={{ fontWeight: 700, marginBottom: 6 }}>{os.org}</div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
            <span>{os.admis}/{os.total} admis</span>
            <span style={{ fontWeight: 700, color: os.taux >= 50 ? "var(--green-tn)" : "var(--red-tn)" }}>{os.taux}%</span>
          </div>
          {os.avg !== null && <div style={{ fontSize: 11, color: "var(--muted)" }}>Moy. classe: {os.avg.toFixed(2)}</div>}
        </div>)}
      </div>
    </div>) : (
      <div style={{ overflowX: "auto", border: "1px solid var(--border)", borderRadius: 10, background: "var(--card)" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead><tr style={{ background: "var(--bg)" }}>
            <th style={{ padding: "10px 8px", textAlign: "center", width: 36 }}>#</th>
            <th style={{ padding: "10px 8px", textAlign: "left", position: "sticky", left: 0, background: "var(--bg)", zIndex: 2, minWidth: 180 }}>Candidat</th>
            <th style={{ padding: "10px 6px", textAlign: "center", minWidth: 70 }}>Organisme</th>
            <th style={{ padding: "10px 6px", textAlign: "center", minWidth: 75, fontWeight: 800 }}>Moyenne</th>
            <th style={{ padding: "10px 6px", textAlign: "center", minWidth: 85 }}>R\u00e9sultat</th>
            <th style={{ padding: "10px 6px", textAlign: "center", minWidth: 70 }}>Actions</th>
          </tr></thead>
          <tbody>
            {sI.map((ins, idx) => {
              const cand = candidats.find(x => x.id === ins.candidat_uuid) || {};
              const moy = ins.moyenne_ponderee;
              const passed = moy !== null && moy !== undefined && moy >= PASS_MARK;
              const isRachat = ins.rachat;
              const nearPass = moy !== null && moy >= PASS_MARK - 1 && moy < PASS_MARK && !passed;
              return <tr key={ins.id} style={{ borderBottom: "1px solid var(--border)", background: idx % 2 === 0 ? "transparent" : "rgba(36,99,235,0.015)" }}>
                <td style={{ padding: "8px 6px", textAlign: "center", fontSize: 11, color: "var(--muted)" }}>{idx + 1}</td>
                <td style={{ padding: "8px", position: "sticky", left: 0, background: idx % 2 === 0 ? "var(--card)" : "rgba(246,248,252,1)", zIndex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 12 }}>{cand.prenom} {cand.nom}</div>
                  <div style={{ fontSize: 10, color: "var(--muted)" }}>{cand.cin} — {cand.matricule || ""}</div>
                </td>
                <td style={{ padding: "6px", textAlign: "center" }}><Badge color="var(--accent)">{cand.organisme_formation || "\u2014"}</Badge></td>

                </td>
              </tr>;

          </tbody>

      </div>
    )}

          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16, alignItems: "center" }}>

            </div>

                  {n && n.absent ? "ABS" : n && n.note !== null ? n.note + "/20" : "\u2014"}
                </span>
              </div>;
            })}
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 16, justifyContent: "center" }}>
            <button className="btn btn-purple btn-sm" onClick={() => { exportReleve(cd, detail, iNotes, modules); }}>T\u00e9l\u00e9charger relev\u00e9 PDF</button>
          </div>
        </div>
      </Modal>;
    })()}

    {rachatCand && <div className="modal-overlay" onClick={() => setRachatCand(null)}>
      <div className="modal-box" style={{ maxWidth: 420 }} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>Rachat</h2>
          <button className="btn-icon" onClick={() => setRachatCand(null)}>\u2715</button>
        </div>
        <div className="modal-body" style={{ padding: 20 }}>
          {(() => {
            const cd = candidats.find(x => x.id === rachatCand.candidat_uuid) || {};
            return <div>
              <p style={{ fontSize: 13, marginBottom: 12 }}>
                Accorder le rachat \u00e0 <strong>{cd.prenom} {cd.nom}</strong> (moyenne: <strong style={{ color: "var(--red-tn)" }}>{Number(rachatCand.moyenne_ponderee).toFixed(2)}</strong>) ?
              </p>
              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 4 }}>Motif du rachat :</label>
                <textarea value={rachatMotif} onChange={e => setRachatMotif(e.target.value)}
                  placeholder="D\u00e9cision du jury, compensation..."
                  style={{ width: "100%", padding: 8, borderRadius: 6, border: "1px solid var(--border)", fontSize: 12, minHeight: 60, resize: "vertical" }} />
              </div>
              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                <button className="btn btn-sm" onClick={() => setRachatCand(null)}>Annuler</button>
                <button className="btn btn-accent btn-sm" onClick={async () => {
                  try {
                    await api.update("inscriptions", rachatCand.id, { resultat: "Admis", rachat: true, rachat_motif: rachatMotif || "D\u00e9cision du jury" });
                    setRachatCand(null);
                    reload && reload();
                  } catch(e) { alert(e.message); }
                }}>Confirmer le rachat</button>
              </div>
            </div>;
          })()}
        </div>
      </div>
    </div>}
  </div>);
}


/* ===== MAIN APP ===== */
function App() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [sessions, setSessions] = useState([]);
  const [candidats, setCandidats] = useState([]);
  const [inscriptions, setInscriptions] = useState([]);
  const [notes, setNotes] = useState([]);
  const [modules, setModules] = useState([]);
  const [deliberations, setDeliberations] = useState([]);
  const [planning, setPlanning] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [cs, setCs] = useState(true);
  const [lookup, setLookup] = useState(false);

  /* FIX #5: Use a ref to always have the latest api instance available to loadAll,
     avoiding stale closure issues with useCallback depending on api state */
  const apiRef = useRef(null);

  const loadAll = useCallback(async (overrideApi) => {
    const a = overrideApi || apiRef.current;
    if (!a) return;
    setLoading(true); setError("");
    try {
      const [se, ca, ins, no, ma, de, pl] = await Promise.all([
        a.select("sessions", "order=created_at.desc"), a.select("candidats", "order=nom.asc"),
        a.select("inscriptions", "order=created_at.desc"), a.select("notes", ""),
        a.select("matieres", "order=ordre.asc"), a.select("deliberations", "order=date_deliberation.desc"),
        a.select("planning_epreuves", "order=date_epreuve.asc,heure_debut.asc").catch(() => [])
      ]);
      setSessions(se); setCandidats(ca); setInscriptions(ins); setNotes(no); setModules(ma); setDeliberations(de); setPlanning(pl);
    } catch (e) { setError("Erreur: " + e.message); }
    setLoading(false);
  }, []);

  const handleLogin = (t, u) => {
    const a = createApi(t);
    setToken(t);
    setUser(u);
    apiRef.current = a;
    loadAll(a);
  };

  const handleLogout = async () => {
    try { if (token) await authApi.logout(token); } catch (e) {}
    localStorage.removeItem("ate_token");
    setUser(null);
    setToken(null);
    apiRef.current = null;
  };

  useEffect(() => {
    const t = localStorage.getItem("ate_token");
    if (t) {
      authApi.getUser(t).then(u => {
        const a = createApi(t);
        setToken(t);
        setUser(u);
        apiRef.current = a;
        loadAll(a);
        setCs(false);
      }).catch(() => { localStorage.removeItem("ate_token"); setCs(false); });
    } else setCs(false);
  }, []);

  if (cs) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)" }}><div style={{ textAlign: "center" }}><div style={{ marginBottom: 12 }}><img src={DGAC_LOGO} alt="DGAC" style={{width:56,height:56,objectFit:"contain"}} /></div><div style={{ color: "var(--muted)", fontSize: 14 }}>Chargement...</div></div></div>;
  if (lookup) return <CandidatLookup onBack={() => setLookup(false)} />;
  if (!user) return <LoginScreen onLogin={handleLogin} onLookup={() => setLookup(true)} />;

  const tabs = [
    { id: "dashboard", label: "Accueil", ml: "Accueil", icon: "\u2302" },
    { id: "sessions", label: "Sessions", ml: "Sessions", icon: "\uD83D\uDCC5", count: sessions.filter(s => s.statut !== "Archivee").length },
    { id: "candidats", label: "Candidats", ml: "Candidats", icon: "\uD83D\uDC65" },
    { id: "notes", label: "Notes", ml: "Notes", icon: "\u270F" },
    { id: "resultats", label: "Resultats", ml: "Resultats", icon: "\uD83D\uDCCA" },
    { id: "deliberations", label: "Deliberations", ml: "Delib.", icon: "\u2696", count: deliberations.filter(d => !d.pv_valide).length }
  ];

  /* FIX #4: Removed duplicate tn-stripe — the one in static HTML body is sufficient */
  return (
    <div>
      <header className="header">
        <div className="header-left">
          <div className="logo-mark"><img src={DGAC_LOGO} alt="DGAC" style={{width:30,height:30,objectFit:"contain",borderRadius:4}} /></div>
          <div><div className="header-title">Examens ATE</div><div className="header-sub">Agent Technique d'Exploitation</div></div>
        </div>
        <div className="desktop-tabs">{tabs.map(t => <button key={t.id} className={"tab-btn " + (tab === t.id ? "active" : "")} onClick={() => setTab(t.id)}><span>{t.icon}</span> {t.label}{t.count > 0 && <span className="tab-count">{t.count}</span>}</button>)}</div>
        <div className="header-right">
          <div className="user-badge"><div className="user-dot" />{user.email}</div>
          <button className="btn-outline btn-sm" onClick={() => loadAll()}>{loading ? "\u23F3" : "\u21BB"}</button>
          <button className="btn-outline btn-outline-red btn-sm" onClick={handleLogout}>Deconnexion</button>
        </div>
      </header>
      <nav className="mobile-nav">
        {tabs.map(t => <button key={t.id} className={"mobile-nav-btn " + (tab === t.id ? "active" : "")} onClick={() => setTab(t.id)}><span className="nav-icon">{t.icon}</span>{t.ml}{t.count > 0 && tab !== t.id && <span className="nav-badge">{t.count}</span>}</button>)}
        <button className="mobile-nav-btn" onClick={handleLogout}><span className="nav-icon">&#x1F6AA;</span>Sortir</button>
      </nav>
      {error && <div className="error-box" style={{ margin: "12px 16px 0" }}>{error}</div>}
      <main style={{ padding: "28px 32px", maxWidth: 1400, margin: "0 auto" }}>
        {tab === "dashboard" && <Dashboard sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} modules={modules} deliberations={deliberations} onNav={setTab} />}
        {tab === "sessions" && <SessionsView api={apiRef.current} sessions={sessions} inscriptions={inscriptions} candidats={candidats} notes={notes} modules={modules} planning={planning} reload={() => loadAll()} />}
        {tab === "candidats" && <CandidatsView api={apiRef.current} candidats={candidats} sessions={sessions} inscriptions={inscriptions} reload={() => loadAll()} />}
        {tab === "notes" && <NotesView api={apiRef.current} sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} modules={modules} reload={() => loadAll()} />}
        {tab === "resultats" && <ResultatsView sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} modules={modules} api={apiRef.current} reload={() => loadAll()} />}
        {tab === "deliberations" && <DeliberationsView api={apiRef.current} sessions={sessions} candidats={candidats} inscriptions={inscriptions} deliberations={deliberations} reload={() => loadAll()} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</script>
</body>
</html>
