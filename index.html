<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGAC — Examens ATE</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2463EB">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* Surfaces */
  --bg:#F6F8FC;
  --card:#FFFFFF;
  --card-hover:#F2F6FF;
  --border:rgba(36,99,235,0.12);
  --border-light:rgba(36,99,235,0.20);

  /* Texte */
  --text:#0B1220;
  --muted:rgba(11,18,32,0.62);
  --dim:rgba(11,18,32,0.42);

  /* Accent moderne (bleu) — on réutilise --gold pour éviter de toucher le JS */
  --gold:#2463EB;
  --gold-light:#3B82F6;
  --gold-dark:#1E40AF;

  /* Statuts */
  --red-tn:#C8102E;
  --green:#22C55E;
  --red:#E74C3C;
  --orange:#F59E0B;
  --cyan:#06B6D4;
  --purple:#8B5CF6;

  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tr:all .25s cubic-bezier(.4,0,.2,1);
}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.6}
h1,h2,h3,.serif{font-family:'Playfair Display',serif}
.mono{font-family:'JetBrains Mono',monospace}
::selection{background:rgba(36,99,235,0.3)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(36,99,235,0.2);border-radius:4px}
.header{padding:0 32px;height:64px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.92);box-shadow:0 10px 30px rgba(2,6,23,0.06);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(36,99,235,0.2);font-size:18px}
.header-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold-light)}
.header-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.desktop-tabs{display:flex;gap:2px;padding:3px;border-radius:10px;background:rgba(36,99,235,0.04);border:1px solid var(--border)}
.tab-btn{padding:8px 16px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;background:transparent;color:var(--muted);transition:var(--tr);white-space:nowrap;letter-spacing:0.3px;text-transform:uppercase}
.tab-btn:hover{color:var(--text)}.tab-btn.active{background:rgba(36,99,235,0.12);color:var(--gold)}
.tab-count{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:6px;background:rgba(36,99,235,0.15);color:var(--gold)}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(11,21,40,0.98);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:6px 4px;padding-bottom:calc(6px + var(--safe-bottom));z-index:100;justify-content:space-around}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:9px;font-family:inherit;font-weight:600;cursor:pointer;padding:5px 4px;border-radius:8px;min-width:44px;position:relative;transition:var(--tr)}
.mobile-nav-btn.active{color:var(--gold)}.mobile-nav-btn .nav-icon{font-size:18px}
.mobile-nav-btn .nav-badge{position:absolute;top:0;right:2px;font-size:8px;font-weight:700;background:var(--red-tn);color:#fff;padding:1px 4px;border-radius:6px}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--tr);letter-spacing:0.5px;text-transform:uppercase}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}.btn:active{transform:scale(0.97)}.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0B1528}
.btn-red{background:var(--red-tn);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-purple{background:var(--purple);color:#fff}.btn-orange{background:var(--orange);color:#fff}
.btn-outline{padding:9px 18px;background:transparent;border:1px solid rgba(36,99,235,0.25);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--gold);transition:var(--tr)}
.btn-outline:hover{border-color:var(--gold)}.btn-outline-red{border-color:rgba(200,16,46,0.3);color:var(--red-tn)}
.btn-sm{padding:6px 14px;font-size:10px}.btn-full{width:100%;padding:14px 0}
.btn-icon{background:none;border:none;color:var(--dim);cursor:pointer;padding:8px;transition:var(--tr);border-radius:6px}.btn-icon:hover{color:var(--gold)}
.btn-fab{position:fixed;bottom:80px;right:18px;width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 24px rgba(36,99,235,0.25);z-index:90;display:none;align-items:center;justify-content:center;color:#0B1528;background:linear-gradient(135deg,var(--gold),var(--gold-dark))}
.input,.select,.textarea{width:100%;padding:12px 16px;background:rgba(36,99,235,0.04);border:1px solid var(--border-light);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:var(--tr)}
.input:focus,.select:focus,.textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(36,99,235,0.08)}.select{cursor:pointer}.textarea{min-height:80px;resize:vertical}
.label{font-size:10px;color:var(--gold);margin-bottom:6px;display:block;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:var(--tr)}.card-padded{padding:24px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:var(--tr)}.kpi:hover{border-color:var(--border-light);transform:translateY(-2px)}
.kpi-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:16px 0 0 16px}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700}
.kpi-value{font-size:28px;font-weight:700;margin-top:6px;font-family:'Playfair Display',serif}.kpi-sub{font-size:12px;color:var(--dim);margin-top:4px}
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.table-container{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.table-row{display:grid;padding:14px 22px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:var(--tr)}.table-row:hover{background:var(--card-hover)}.table-row:last-child{border-bottom:none}
.mobile-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:var(--tr)}.mobile-card:hover{border-color:var(--border-light)}
.mobile-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.mobile-card-title{font-size:15px;font-weight:600}.mobile-card-id{font-size:11px;color:var(--dim);margin-top:3px}
.mobile-card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.mobile-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:12px;animation:fadeIn 0.2s}
.modal{background:linear-gradient(180deg,#FFFFFF,#F3F6FF);border:1px solid var(--border-light);border-radius:20px;padding:28px;max-width:94vw;max-height:90vh;overflow-y:auto;width:560px;animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:20px;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold-light)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form-span{grid-column:1/-1}
.filters{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;gap:3px;background:rgba(36,99,235,0.04);border-radius:10px;padding:3px;border:1px solid var(--border)}
.filter-btn{padding:7px 14px;border-radius:7px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--muted);white-space:nowrap;transition:var(--tr)}.filter-btn.active{background:rgba(36,99,235,0.12);color:var(--gold)}
.spacer{flex:1}.empty{padding:48px 24px;text-align:center;color:var(--dim);font-size:14px;font-style:italic}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#F6F8FC,#EAF1FF,#F6F8FC)}
.login-box{width:440px;max-width:100%}.login-header{text-align:center;margin-bottom:36px}
.login-title{font-size:26px;font-weight:800;font-family:'Playfair Display',serif;color:var(--gold-light)}
.login-sub{color:var(--muted);font-size:14px;margin-top:10px}
.error-box{padding:12px 16px;background:rgba(200,16,46,0.08);border:1px solid rgba(200,16,46,0.2);border-radius:10px;color:var(--red-tn);font-size:12px;margin-bottom:16px}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(36,99,235,0.06);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted)}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.section-title{font-size:18px;font-weight:700;font-family:'Playfair Display',serif;color:var(--gold-light);margin-bottom:18px;margin-top:32px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border:none}
.note-grid{display:grid;gap:6px;margin:16px 0}
.note-row{display:grid;grid-template-columns:1fr 80px 50px;gap:10px;align-items:center;padding:10px 14px;background:rgba(36,99,235,0.02);border:1px solid var(--border);border-radius:10px}
.note-row .matiere-name{font-size:12px;font-weight:500}.note-row .coef{font-size:10px;color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:600}
.note-input{width:100%;padding:8px;background:rgba(36,99,235,0.06);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-size:14px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;transition:var(--tr)}
.note-input:focus{border-color:var(--gold)}.note-input.absent{background:rgba(200,16,46,0.08);border-color:rgba(200,16,46,0.25);color:var(--red-tn)}
.result-admis{color:var(--green);font-weight:700}.result-ajourne{color:var(--red-tn);font-weight:700}.result-attente{color:var(--orange);font-weight:700}
.moyenne-display{font-size:32px;font-weight:800;text-align:center;padding:20px;border-radius:14px;margin-bottom:18px;font-family:'Playfair Display',serif}
.stats-table{width:100%;border-collapse:collapse;font-size:12px}
.stats-table th{text-align:left;padding:10px 12px;background:rgba(36,99,235,0.06);color:var(--gold);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid var(--border)}
.stats-table td{padding:10px 12px;border-bottom:1px solid var(--border)}.stats-table tr:hover td{background:rgba(36,99,235,0.02)}
.tn-stripe{height:3px;background:linear-gradient(90deg,var(--red-tn),var(--gold),var(--red-tn));opacity:0.6}
@media(max-width:768px){
  .header{padding:0 16px;height:56px}.header-title{font-size:14px}.header-sub{display:none}
  .desktop-tabs{display:none!important}.header-right .user-badge{display:none}.header-right .btn-outline:not(.btn-outline-red){display:none}
  .mobile-nav{display:flex!important}.btn-fab{display:flex!important}
  main{padding:16px 14px 96px 14px!important}
  .form-grid{grid-template-columns:1fr}.form-span{grid-column:1}.grid-2{grid-template-columns:1fr}
  .modal{padding:22px 18px;width:100%;max-width:100%;border-radius:18px 18px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:92vh}
  .modal-overlay{align-items:flex-end;padding:0}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}.kpi{padding:14px}.kpi-value{font-size:24px}
  .desktop-only{display:none!important}.mobile-only{display:block!important}
  .input,.select,.textarea{font-size:16px;padding:14px}.btn{padding:12px 20px;font-size:13px}.btn-full{padding:16px 0}
  .note-row{grid-template-columns:1fr 60px 45px}
}
@media(min-width:769px){.mobile-only{display:none!important}.mobile-nav{display:none!important}.btn-fab{display:none!important}}
</style>

<body>
<div class="tn-stripe"></div>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const SB_URL = "https://rvsldfentjjuukgozrzv.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2c2xkZmVudGpqdXVrZ296cnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzA0MDEsImV4cCI6MjA4NzI0NjQwMX0.PAFfUgH1-cmrd7HULo0H46Bzs9q3fwX3qoxjBgnvCdQ";
const PASS_MARK = 13;
const ORGANISMES = ["CIFAC", "AFA", "OSC"];

const authApi = {
  async login(e, p) {
    const r = await fetch(SB_URL + "/auth/v1/token?grant_type=password", { method: "POST", headers: { apikey: SB_KEY, "Content-Type": "application/json" }, body: JSON.stringify({ email: e, password: p }) });
    const d = await r.json(); if (!r.ok) throw new Error(d.error_description || d.msg || "Echec"); return d;
  },
  async logout(t) { await fetch(SB_URL + "/auth/v1/logout", { method: "POST", headers: { apikey: SB_KEY, Authorization: "Bearer " + t, "Content-Type": "application/json" } }); },
  async getUser(t) { const r = await fetch(SB_URL + "/auth/v1/user", { headers: { apikey: SB_KEY, Authorization: "Bearer " + t } }); if (!r.ok) throw new Error("Expire"); return r.json(); }
};
const createApi = (t) => {
  const h = { apikey: SB_KEY, Authorization: "Bearer " + t, "Content-Type": "application/json", Prefer: "return=representation" };
  const b = SB_URL + "/rest/v1";
  return {
    async select(tb, q) { const r = await fetch(b + "/" + tb + "?" + (q || ""), { headers: h }); if (!r.ok) throw new Error(r.statusText); return r.json(); },
    async insert(tb, d) { const r = await fetch(b + "/" + tb, { method: "POST", headers: h, body: JSON.stringify(d) }); if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.statusText); } return r.json(); },
    async update(tb, id, d) { const r = await fetch(b + "/" + tb + "?id=eq." + id, { method: "PATCH", headers: h, body: JSON.stringify(d) }); if (!r.ok) throw new Error(r.statusText); return r.json(); },
    async remove(tb, id) { const r = await fetch(b + "/" + tb + "?id=eq." + id, { method: "DELETE", headers: h }); if (!r.ok) throw new Error(r.statusText); return true; }
  };
};

const STATUTS_SESSION = ["Planifiee", "En cours", "Terminee", "Deliberee", "Archivee"];
const SC = { "Planifiee": "#BDA56B", "En cours": "#F39C12", "Terminee": "#5DADE2", "Deliberee": "#2ECC71", "Archivee": "rgba(232,228,221,0.3)", "Inscrit": "#BDA56B", "Absent": "#C8102E", "Retire": "rgba(232,228,221,0.3)", "En attente": "#F39C12", "Admis": "#2ECC71", "Ajourne": "#C8102E" };

function moyColor(m) { if (m === null || m === undefined) return "var(--dim)"; return Number(m) >= PASS_MARK ? "var(--green)" : "var(--red-tn)"; }

function Badge({ children, color }) { return <span className="badge" style={{ background: (color || "#888") + "18", color: color || "#888" }}>{children}</span>; }
function Tag({ label }) { return <Badge color={SC[label]}>{label}</Badge>; }
function Empty({ text }) { return <div className="empty">{text}</div>; }
function KPI({ label, value, sub, color }) {
  return (<div className="kpi"><div className="kpi-bar" style={{ background: color }} /><div className="kpi-label">{label}</div><div className="kpi-value mono" style={{ color: color }}>{value}</div>{sub && <div className="kpi-sub">{sub}</div>}</div>);
}
function Modal({ onClose, title, width, children }) {
  return (<div className="modal-overlay" onClick={onClose}><div className="modal" style={{ width: width || 560 }} onClick={e => e.stopPropagation()}><div className="modal-header"><h3 className="modal-title">{title}</h3><button className="btn-icon" onClick={onClose} style={{ fontSize: 20 }}>&#10005;</button></div>{children}</div></div>);
}
function Field({ label, span, children }) { return <div className={span ? "form-span" : ""}><label className="label">{label}</label>{children}</div>; }
function Sel({ value, onChange, options }) { return <select className="select" value={value} onChange={e => onChange(e.target.value)}>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>; }
function ConfirmDelete({ item, onConfirm, onCancel }) {
  return (<Modal onClose={onCancel} title="Confirmer la suppression" width={420}><p style={{ color: "var(--muted)", fontSize: 14, marginBottom: 20 }}>Supprimer <strong style={{ color: "var(--red-tn)" }}>{item}</strong> ?</p><div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><button className="btn btn-outline" onClick={onCancel}>Annuler</button><button className="btn btn-red" onClick={onConfirm}>Supprimer</button></div></Modal>);
}
function FAB({ onClick, color }) { return <button className="btn-fab" style={{ background: color || "linear-gradient(135deg,var(--gold),var(--gold-dark))" }} onClick={onClick}>+</button>; }
function ResultBadge({ r }) { return <span className={r === "Admis" ? "result-admis" : r === "Ajourne" ? "result-ajourne" : "result-attente"}>{r}</span>; }

/* ===== LOGIN ===== */
function LoginScreen({ onLogin, onLookup }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [ld, setLd] = useState(false);
  const [err, setErr] = useState("");
  const go = async () => {
    if (!email || !pw) { setErr("Remplissez les deux champs"); return; }
    setLd(true); setErr("");
    try { const d = await authApi.login(email, pw); localStorage.setItem("ate_token", d.access_token); onLogin(d.access_token, d.user); }
    catch (e) { setErr(e.message === "Invalid login credentials" ? "Email ou mot de passe incorrect" : e.message); }
    setLd(false);
  };
  return (
    <div className="login-page"><div className="login-box">
      <div className="login-header">
        <div style={{ width: 64, height: 64, borderRadius: 16, background: "linear-gradient(135deg,var(--gold),var(--gold-dark))", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", fontSize: 28, boxShadow: "0 4px 24px rgba(36,99,235,0.3)" }}>&#9992;</div>
        <h1 className="login-title">Examens ATE</h1>
        <p className="login-sub">Direction Generale de l'Aviation Civile — Tunisie</p>
      </div>
      <div className="card card-padded">
        <div style={{ marginBottom: 18 }}><label className="label">Email</label><input className="input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="votre.email@dgac.tn" onKeyDown={e => e.key === "Enter" && go()} /></div>
        <div style={{ marginBottom: 18 }}><label className="label">Mot de passe</label><input className="input" type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && go()} /></div>
        {err && <div className="error-box">{err}</div>}
        <button className="btn btn-gold btn-full" onClick={go} disabled={ld}>{ld ? "Connexion..." : "Se connecter"}</button>
      </div>
      <div style={{ textAlign: "center", marginTop: 20 }}>

/* ===== CANDIDATE LOOKUP ===== */
function CandidatLookup({ onBack }) {
  const [cin, setCin] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [result, setResult] = useState(null);
  const [notes, setNotes] = useState([]);
  const [matieres, setMatieres] = useState([]);

  const search = async () => {
    if (!cin.trim()) { setErr("Entrez votre numero CIN"); return; }
    setLoading(true); setErr(""); setResult(null);
    const h = { apikey: SB_KEY, "Content-Type": "application/json" };
    const b = SB_URL + "/rest/v1";
    try {
      const cr = await fetch(b + "/candidats?cin=eq." + encodeURIComponent(cin.trim()), { headers: h });
      const cands = await cr.json();
      if (!cands || cands.length === 0) { setErr("Aucun candidat trouve avec ce CIN"); setLoading(false); return; }
      const cand = cands[0];
      const ir = await fetch(b + "/inscriptions?candidat_uuid=eq." + cand.id + "&order=created_at.desc&limit=1", { headers: h });
      const inscs = await ir.json();
      if (!inscs || inscs.length === 0) { setErr("Aucune inscription trouvee"); setLoading(false); return; }
      const insc = inscs[0];
      const nr = await fetch(b + "/notes?inscription_uuid=eq." + insc.id, { headers: h });
      const nts = await nr.json();
      const mr = await fetch(b + "/matieres?order=ordre.asc", { headers: h });
      const mats = await mr.json();
      setResult({ candidat: cand, inscription: insc });
      setNotes(nts);
      setMatieres(mats);
    } catch (e) { setErr("Erreur: " + e.message); }
    setLoading(false);
  };

  return (
    <div className="login-page"><div className="login-box" style={{ width: 520 }}>
      <div className="login-header">
        <div style={{ width: 64, height: 64, borderRadius: 16, background: "linear-gradient(135deg,var(--gold),var(--gold-dark))", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", fontSize: 28, boxShadow: "0 4px 24px rgba(36,99,235,0.3)" }}>&#9992;</div>
        <h1 className="login-title">Espace Candidat</h1>
        <p className="login-sub">Consultation des resultats — Examens ATE</p>
      </div>
      {!result ? (
        <div className="card card-padded">
          <div style={{ marginBottom: 18 }}><label className="label">Numero CIN</label><input className="input" value={cin} onChange={e => setCin(e.target.value)} placeholder="Entrez votre numero CIN" onKeyDown={e => e.key === "Enter" && search()} /></div>
          {err && <div className="error-box">{err}</div>}
          <button className="btn btn-gold btn-full" onClick={search} disabled={loading}>{loading ? "Recherche..." : "Consulter mes resultats"}</button>
          <div style={{ textAlign: "center", marginTop: 16 }}><button onClick={onBack} style={{ background: "none", border: "none", color: "var(--gold)", cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}>&#8592; Retour</button></div>
        </div>
      ) : (
        <div>
          <div className="card card-padded" style={{ marginBottom: 16 }}>
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 14, color: "var(--muted)" }}>{result.candidat.prenom} {result.candidat.nom}</div>
              <div className="moyenne-display" style={{ background: result.inscription.moyenne_ponderee !== null ? (Number(result.inscription.moyenne_ponderee) >= PASS_MARK ? "rgba(46,204,113,0.1)" : "rgba(200,16,46,0.1)") : "rgba(36,99,235,0.04)", color: result.inscription.moyenne_ponderee !== null ? (Number(result.inscription.moyenne_ponderee) >= PASS_MARK ? "var(--green)" : "var(--red-tn)") : "var(--dim)", margin: "12px 0" }}>
                {result.inscription.moyenne_ponderee !== null ? Number(result.inscription.moyenne_ponderee).toFixed(2) : "—"}
                <span style={{ fontSize: 16, fontWeight: 400, marginLeft: 8 }}>/20</span>
              </div>
              <div style={{ fontSize: 20, fontWeight: 700 }}><ResultBadge r={result.inscription.resultat} /></div>
            </div>
          </div>
          <div className="card card-padded">
            <div className="section-title" style={{ marginTop: 0 }}>Detail des notes</div>
            {matieres.map(m => {
              const n = notes.find(x => x.matiere_uuid === m.id);
              return (
                <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid var(--border)", fontSize: 13 }}>
                  <span>{m.nom} <span className="mono" style={{ color: "var(--gold)", fontSize: 10 }}>x{m.coefficient}</span></span>
                  <span className="mono" style={{ fontWeight: 700, color: n && n.absent ? "var(--red-tn)" : n && n.note !== null ? moyColor(n.note) : "var(--dim)" }}>{n && n.absent ? "ABS" : n && n.note !== null ? n.note + "/20" : "—"}</span>
                </div>
              );
            })}
          </div>
          <div style={{ textAlign: "center", marginTop: 20 }}><button onClick={() => { setResult(null); setCin(""); }} className="btn btn-outline">Nouvelle recherche</button></div>
        </div>
      )}
    </div></div>
  );
}

/* ===== DASHBOARD ===== */
function Dashboard({ sessions, candidats, inscriptions, matieres, onNav }) {
  const actives = sessions.filter(s => s.statut === "Planifiee" || s.statut === "En cours");

  const ajournes = inscriptions.filter(i => i.resultat === "Ajourne").length;
  const total = admis + ajournes;
  const taux = total > 0 ? Math.round((admis / total) * 100) : 0;
  const avecMoy = inscriptions.filter(i => i.moyenne_ponderee !== null);
  const moyG = avecMoy.length > 0 ? (avecMoy.reduce((s, i) => s + Number(i.moyenne_ponderee), 0) / avecMoy.length).toFixed(2) : "—";
  return (
    <div>
      <div className="kpi-grid">
        <KPI label="Sessions" value={sessions.length} sub={actives.length + " actives"} color="var(--gold)" />
        <KPI label="Candidats" value={candidats.length} sub="inscrits" color="var(--cyan)" />
        <KPI label="Taux reussite" value={taux + "%"} sub={admis + " admis / " + total} color="var(--green)" />
        <KPI label="Moyenne gen." value={moyG} sub="/20" color={Number(moyG) >= PASS_MARK ? "var(--green)" : "var(--orange)"} />

      <div className="grid-2">
        <div className="card card-padded">

        </div>
        <div className="card card-padded">
          <div className="section-title" style={{ marginTop: 0 }}>Resultats recents</div>
          {inscriptions.filter(i => i.resultat !== "En attente").length === 0 && <div style={{ color: "var(--dim)", fontSize: 13 }}>Aucun resultat</div>}
          {inscriptions.filter(i => i.resultat !== "En attente").slice(0, 8).map(i => {

/* ===== NOTES ENTRY ===== */
function NotesEntry({ api, inscription, matieres, existingNotes, onClose, onSaved }) {
  const [nv, setNv] = useState({});
  const [saving, setSaving] = useState(false);
  useEffect(() => {
    const o = {};
    matieres.forEach(m => { const ex = existingNotes.find(n => n.matiere_uuid === m.id); o[m.id] = ex ? { note: ex.note !== null ? String(ex.note) : "", absent: ex.absent || false } : { note: "", absent: false }; });
    setNv(o);
  }, [matieres, existingNotes]);
  const setNote = (mid, val) => setNv(p => ({ ...p, [mid]: { ...p[mid], note: val, absent: false } }));
  const toggleAbs = (mid) => setNv(p => ({ ...p, [mid]: { note: "", absent: !p[mid].absent } }));
  let tCN = 0, tC = 0;
  matieres.forEach(m => { const v = nv[m.id]; if (v && !v.absent && v.note !== "") { const n = parseFloat(v.note); if (!isNaN(n)) { tCN += n * m.coefficient; tC += m.coefficient; } } });
  const moy = tC > 0 ? tCN / tC : null;
  const moyStr = moy !== null ? moy.toFixed(2) : "—";
  const passed = moy !== null && moy >= PASS_MARK;
  const handleSave = async () => {
    setSaving(true);
    try {
      for (const m of matieres) { const v = nv[m.id] || {}; const nd = { inscription_uuid: inscription.id, matiere_uuid: m.id, note: v.absent ? null : (v.note !== "" ? parseFloat(v.note) : null), absent: v.absent || false }; const ex = existingNotes.find(x => x.matiere_uuid === m.id); if (ex) await api.update("notes", ex.id, nd); else await api.insert("notes", nd); }
      const res = moy !== null ? (moy >= PASS_MARK ? "Admis" : "Ajourne") : "En attente";
      await api.update("inscriptions", inscription.id, { moyenne_ponderee: moy, resultat: res });
      onSaved();
    } catch (e) { alert("Erreur: " + e.message); }
    setSaving(false);
  };
  return (<Modal onClose={onClose} title="Saisie des Notes" width={640}>
    <div className="moyenne-display" style={{ background: moy === null ? "rgba(36,99,235,0.04)" : passed ? "rgba(46,204,113,0.1)" : "rgba(200,16,46,0.1)", color: moy === null ? "var(--dim)" : passed ? "var(--green)" : "var(--red-tn)" }}>
      {moyStr}<span style={{ fontSize: 16, fontWeight: 400, marginLeft: 8 }}>/20 {moy !== null && (passed ? "— ADMIS" : "— AJOURNE")}</span>
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 60px 45px", gap: 8, padding: "6px 14px", fontSize: 10, color: "var(--gold)", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>
      <span>Matiere (coef)</span><span style={{ textAlign: "center" }}>Note</span><span style={{ textAlign: "center" }}>Abs.</span>
    </div>
    <div className="note-grid">
      {matieres.sort((a, b) => a.ordre - b.ordre).map(m => { const v = nv[m.id] || {}; return (
        <div key={m.id} className="note-row">
          <div><div className="matiere-name">{m.nom}</div><div className="coef">x{m.coefficient}</div></div>
          <input className={"note-input" + (v.absent ? " absent" : "")} type="number" min="0" max="20" step="0.25" value={v.absent ? "" : (v.note || "")} disabled={v.absent} onChange={e => setNote(m.id, e.target.value)} placeholder="—" />
          <div style={{ textAlign: "center" }}><input type="checkbox" checked={v.absent || false} onChange={() => toggleAbs(m.id)} style={{ cursor: "pointer", width: 18, height: 18 }} /></div>
        </div>); })}
    </div>
    <button className="btn btn-gold btn-full" style={{ marginTop: 18 }} onClick={handleSave} disabled={saving}>{saving ? "Enregistrement..." : "Enregistrer les notes"}</button>
  </Modal>);
}

/* ===== IMPORT EXCEL MODAL ===== */
function ImportExcelModal({ api, sessions, onClose, onDone }) {
  const [org, setOrg] = useState(ORGANISMES[0]);
  const [sess, setSess] = useState(sessions.length > 0 ? sessions[0].id : "");
  const [file, setFile] = useState(null);
  const [importing, setImporting] = useState(false);
  const [result, setResult] = useState(null);

  const normalize = (s) => (s || "").toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
  const findCol = (headers, poss) => { for (const h of headers) { const hn = normalize(h); for (const p of poss) { if (hn.includes(normalize(p))) return h; } } return null; };

  const doImport = async () => {
    if (!file || !sess) { alert("Selectionnez un fichier et une session"); return; }
    setImporting(true);
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      if (rows.length === 0) { setResult({ error: "Fichier vide" }); setImporting(false); return; }
      const headers = Object.keys(rows[0]);
      const colMat = findCol(headers, ["matricule", "mat", "code"]);
      const colNom = findCol(headers, ["nom", "family"]);
      const colPrenom = findCol(headers, ["prenom", "first"]);
      const colNP = findCol(headers, ["noms et prenom", "nom et prenom", "nomsetprenom", "nom prenom", "nom complet"]);
      const colCIN = findCol(headers, ["cin", "cin_pass", "cinpass", "carte", "passeport"]);
      const colDate = findCol(headers, ["date", "naissance", "birth"]);
      const colNat = findCol(headers, ["nationalite", "nationalité", "nation"]);

      if (!colNom && !colPrenom && !colNP) { setResult({ error: "Colonnes nom/prenom non trouvees. Colonnes: " + headers.join(", ") }); setImporting(false); return; }

      let imported = 0, skipped = 0, errors = 0;
      for (const row of rows) {
        let nom = "", prenom = "";
        if (colNP) {
          const full = String(row[colNP] || "").trim();
          if (!full) { skipped++; continue; }
          const words = full.split(/\s+/);
          if (words.length <= 2) { nom = words[0] || ""; prenom = words[1] || ""; }
          else { const up = words.filter(w => w === w.toUpperCase() && w.length > 1); const ot = words.filter(w => w !== w.toUpperCase() || w.length <= 1); if (up.length > 0 && ot.length > 0) { nom = up.join(" "); prenom = ot.join(" "); } else { prenom = words[words.length - 1]; nom = words.slice(0, -1).join(" "); } }
        } else { nom = colNom ? String(row[colNom] || "").trim() : ""; prenom = colPrenom ? String(row[colPrenom] || "").trim() : ""; }
        if (!nom && !prenom) { skipped++; continue; }

        let dateN = null;
        if (colDate && row[colDate]) {
          const raw = row[colDate];
          if (typeof raw === "number") { const d = new Date((raw - 25569) * 86400 * 1000); dateN = d.toISOString().slice(0, 10); }
          else { const s = String(raw).trim(); const p = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/); if (p) dateN = p[3] + "-" + p[2].padStart(2, "0") + "-" + p[1].padStart(2, "0"); else if (s.match(/^\d{4}-\d{2}-\d{2}$/)) dateN = s; }
        }
        try {
          const cand = { matricule: colMat ? String(row[colMat] || "").trim() : ("ATE-" + String(imported + 1).padStart(3, "0")), nom: nom, prenom: prenom, cin: colCIN ? String(row[colCIN] || "").trim() : "", date_naissance: dateN, organisme_formation: org, notes: colNat && row[colNat] ? "Nationalite: " + String(row[colNat]).trim() : "" };
          const created = await api.insert("candidats", cand);
          const candId = Array.isArray(created) ? created[0].id : created.id;
          await api.insert("inscriptions", { candidat_uuid: candId, session_uuid: sess, statut: "Inscrit" });
          imported++;
        } catch (err) { errors++; }
      }
      setResult({ imported: imported, skipped: skipped, errors: errors, total: rows.length });
    } catch (err) { setResult({ error: "Erreur: " + err.message }); }
    setImporting(false);
  };

  return (<Modal onClose={onClose} title="Importer depuis Excel" width={520}>
    <div className="form-grid">
      <Field label="Organisme *"><Sel value={org} onChange={setOrg} options={ORGANISMES} /></Field>
      <Field label="Session *"><select className="select" value={sess} onChange={e => setSess(e.target.value)}><option value="">—</option>{sessions.map(s => <option key={s.id} value={s.id}>{s.intitule}</option>)}</select></Field>
      <Field label="Fichier Excel" span>
        <input type="file" accept=".xlsx,.xls,.csv" onChange={e => setFile(e.target.files[0])} style={{ padding: 12, background: "rgba(36,99,235,0.04)", border: "1px dashed var(--border-light)", borderRadius: 8, width: "100%", color: "var(--text)", cursor: "pointer" }} />
      </Field>
    </div>
    <div style={{ marginTop: 12, padding: 14, background: "rgba(36,99,235,0.04)", borderRadius: 10, border: "1px solid var(--border)", fontSize: 12, color: "var(--muted)" }}>
      <strong style={{ color: "var(--gold)" }}>Colonnes attendues:</strong> Matricule | NOMS ET PRENOM | DATE DE NAISSANCE | CIN_PASS | Nationalite
    </div>
    {result && (
      <div style={{ marginTop: 14, padding: 14, borderRadius: 10, background: result.error ? "rgba(200,16,46,0.08)" : "rgba(46,204,113,0.08)", border: result.error ? "1px solid rgba(200,16,46,0.2)" : "1px solid rgba(46,204,113,0.2)" }}>
        {result.error ? <div style={{ color: "var(--red-tn)", fontSize: 13 }}>{result.error}</div> : (
          <div style={{ fontSize: 13 }}>
            <span style={{ color: "var(--green)", fontWeight: 700 }}>{result.imported} candidats importes et inscrits</span>
            {result.skipped > 0 && <span style={{ color: "var(--orange)", marginLeft: 12 }}>{result.skipped} ignores</span>}
            {result.errors > 0 && <span style={{ color: "var(--red-tn)", marginLeft: 12 }}>{result.errors} erreurs</span>}
          </div>
        )}
      </div>
    )}
    {!result ? (
      <button className="btn btn-gold btn-full" style={{ marginTop: 18 }} onClick={doImport} disabled={importing || !file || !sess}>{importing ? "Import en cours..." : "Importer et inscrire"}</button>
    ) : (
      <button className="btn btn-outline btn-full" style={{ marginTop: 18 }} onClick={onDone}>Fermer</button>
    )}
  </Modal>);
}

/* ===== CANDIDATS VIEW ===== */
function CandidatsView({ api, candidats, sessions, inscriptions, reload }) {
  // Parcours: Organisme -> Sessions -> Candidats de la session
  const [step, setStep] = useState("org"); // org | sessions | candidats
  const [selectedOrg, setSelectedOrg] = useState("");
  const [selectedSessionId, setSelectedSessionId] = useState("");

  // Conserver les actions "gestion candidat" (ajout / modification / suppression / import)
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [importModal, setImportModal] = useState(false);
  const [se, setSe] = useState("");

  const candById = useMemo(() => {
    const m = new Map();
    (candidats || []).forEach(c => m.set(c.id, c));
    return m;
  }, [candidats]);

  const goOrg = () => { setStep("org"); setSelectedOrg(""); setSelectedSessionId(""); setSe(""); };
  const goSessions = () => { setStep("sessions"); setSelectedSessionId(""); setSe(""); };

  const sessionsForOrg = useMemo(() => {
    if (!selectedOrg) return [];
    const sset = new Set();
    (inscriptions || []).forEach(i => {
      const c = candById.get(i.candidat_uuid);
      if (c && (c.organisme_formation || "") === selectedOrg) sset.add(i.session_uuid);
    });
    return (sessions || []).filter(s => sset.has(s.id));
  }, [selectedOrg, inscriptions, sessions, candById]);

  const candidatsForOrgSession = useMemo(() => {
    if (!selectedOrg || !selectedSessionId) return [];
    const rows = [];
    (inscriptions || [])
      .filter(i => i.session_uuid === selectedSessionId)
      .forEach(i => {
        const c = candById.get(i.candidat_uuid);
        if (c && (c.organisme_formation || "") === selectedOrg) rows.push({ inscription: i, candidat: c });
      });

    const q = (se || "").trim().toLowerCase();
    const filtered = !q ? rows : rows.filter(({ candidat }) => {
      return (candidat.nom || "").toLowerCase().includes(q) ||
             (candidat.prenom || "").toLowerCase().includes(q) ||
             (candidat.matricule || "").toLowerCase().includes(q) ||
             (candidat.cin || "").toLowerCase().includes(q);
    });

    filtered.sort((a, b) => {
      const an = `${a.candidat.nom || ""} ${a.candidat.prenom || ""}`.toLowerCase();
      const bn = `${b.candidat.nom || ""} ${b.candidat.prenom || ""}`.toLowerCase();
      return an.localeCompare(bn);
    });

    return filtered;
  }, [selectedOrg, selectedSessionId, inscriptions, candById, se]);

  const save = async (d) => {
    try {
      if (ed) await api.update("candidats", ed.id, d);
      else await api.insert("candidats", d);
      setSf(false); setEd(null);
      reload();
    } catch (e) { alert(e.message); }
  };

  const rm = async () => {
    if (del) {
      try { await api.remove("candidats", del.id); }
      catch (e) { alert(e.message); }
      setDel(null);
      reload();
    }
  };

  const session = (sessions || []).find(s => s.id === selectedSessionId);

  // STEP 1 — Organismes
  if (step === "org") {
    return (
      <div>
        <div className="filters">
          <div className="hint">Choisis un organisme de formation.</div>
          <div className="spacer" />
          <button className="btn-outline" onClick={() => setImportModal(true)}>Importer Excel</button>
          <button className="btn btn-gold" onClick={() => { setEd(null); setSf(true); }}>+ Nouveau candidat</button>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))", gap:16 }}>
          {ORGANISMES.map(org => {
            const nb = (candidats || []).filter(c => (c.organisme_formation || "") === org).length;
            return (
              <div
                key={org}
                className="card card-padded"
                style={{ cursor:"pointer" }}
                onClick={() => { setSelectedOrg(org); setStep("sessions"); }}
              >
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div className="label">Organisme</div>
                    <div style={{ fontSize: 24, fontWeight: 900, color:"var(--gold)" }}>{org}</div>
                    <div className="hint" style={{ marginTop: 6 }}>{nb} candidats (base)</div>
                  </div>
                  <div style={{
                    width:56, height:56, borderRadius:18,
                    display:"grid", placeItems:"center",
                    background:"rgba(36,99,235,0.10)",
                    border:"1px solid var(--border)"
                  }}>
                    <span style={{ fontSize: 26 }}>🏫</span>
                  </div>
                </div>
                <div style={{ marginTop: 14 }}>
                  <button className="btn-outline btn-sm">Voir les sessions →</button>
                </div>
              </div>
            );
          })}
        </div>

        {sf && <CandidatForm candidat={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
        {del && <ConfirmDelete item={del.prenom + " " + del.nom} onConfirm={rm} onCancel={() => setDel(null)} />}
        {importModal && <ImportExcelModal api={api} sessions={sessions} onClose={() => setImportModal(false)} onDone={() => { setImportModal(false); reload(); }} />}
      </div>
    );
  }

  // STEP 2 — Sessions pour organisme
  if (step === "sessions") {
    return (
      <div>
        <div className="filters">
          <button className="btn-outline" onClick={goOrg}>← Organismes</button>
          <div className="hint">Organisme: <b style={{ color:"var(--gold)" }}>{selectedOrg}</b></div>
          <div className="spacer" />
        </div>

        <div className="table-container">
          <div className="table-head" style={{ gridTemplateColumns: "140px 1fr 180px 140px" }}>
            <div>ID</div><div>Intitule</div><div>Dates / Lieu</div><div>Statut</div>
          </div>

          {sessionsForOrg.length === 0 ? (
            <Empty text="Aucune session trouvee pour cet organisme." />
          ) : (
            sessionsForOrg
              .slice()
              .sort((a,b)=> (String(b.created_at||"")).localeCompare(String(a.created_at||"")) || String(b.date_debut||"").localeCompare(String(a.date_debut||"")))
              .map(s => {
                const nb = (inscriptions || []).filter(i => {
                  if (i.session_uuid !== s.id) return false;
                  const c = candById.get(i.candidat_uuid);
                  return c && (c.organisme_formation || "") === selectedOrg;
                }).length;

                return (
                  <div
                    key={s.id}
                    className="table-row"
                    style={{ gridTemplateColumns: "140px 1fr 180px 140px" }}
                    onClick={() => { setSelectedSessionId(s.id); setStep("candidats"); }}
                  >
                    <div className="mono" style={{ fontWeight: 900 }}>{s.session_id || "—"}</div>
                    <div>
                      <div style={{ fontWeight: 900 }}>{s.intitule}</div>
                      <div className="hint">{s.lieu || "—"} · <span style={{ color:"var(--cyan)" }}>{nb} candidats</span></div>
                    </div>
                    <div className="hint">{fmtDate(s.date_debut)} → {fmtDate(s.date_fin)}</div>
                    <div><Tag label={s.statut} /></div>
                  </div>
                );
              })
          )}
        </div>
      </div>
    );
  }

  // STEP 3 — Candidats de la session sélectionnée
  return (
    <div>
      <div className="filters">
        <button className="btn-outline" onClick={goSessions}>← Sessions</button>
        <div className="hint">
          Organisme: <b style={{ color:"var(--gold)" }}>{selectedOrg}</b>
          {" "}· Session: <b>{session?.session_id || "—"}</b> — {session?.intitule || ""}
        </div>
        <div className="spacer" />
        <input className="input" style={{ maxWidth: 340 }} placeholder="Rechercher matricule/nom/CIN…" value={se} onChange={e => setSe(e.target.value)} />
      </div>

      <div className="table-container">
        <div className="table-head" style={{ gridTemplateColumns: "140px 1fr 160px 120px 120px" }}>
          <div>Matricule</div><div>Nom & Prenom</div><div>CIN</div><div>Moyenne</div><div>Action</div>
        </div>

        {candidatsForOrgSession.length === 0 ? (
          <Empty text="Aucun candidat de cet organisme n'est inscrit a cette session." />
        ) : (
          candidatsForOrgSession.map(({ candidat, inscription }) => (
            <div
              key={candidat.id}
              className="table-row"
              style={{ gridTemplateColumns: "140px 1fr 160px 120px 120px" }}
            >
              <div className="mono" style={{ fontWeight: 900 }}>{candidat.matricule || "—"}</div>
              <div>
                <div style={{ fontWeight: 900 }}>{candidat.prenom} {candidat.nom}</div>
                <div className="hint">{candidat.email || "—"} · {candidat.telephone || "—"}</div>
              </div>
              <div className="mono" style={{ color:"var(--muted)" }}>{candidat.cin || "—"}</div>
              <div style={{ fontWeight: 900, color: (inscription?.moyenne_ponderee ?? null) === null ? "var(--muted)" : (Number(inscription.moyenne_ponderee) >= PASS_MARK ? "var(--green)" : "var(--red-tn)") }}>
                {(inscription?.moyenne_ponderee ?? null) === null ? "—" : Number(inscription.moyenne_ponderee).toFixed(2)}
              </div>
              <div style={{ textAlign:"right", display:"flex", justifyContent:"flex-end", gap:8 }}>
                <button className="btn-outline btn-sm" onClick={() => { setEd(candidat); setSf(true); }}>Ouvrir</button>
                <button className="btn-outline btn-sm" onClick={() => setDel(candidat)} title="Supprimer">&#128465;</button>
              </div>
            </div>
          ))
        )}
      </div>

      {sf && <CandidatForm candidat={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item={del.prenom + " " + del.nom} onConfirm={rm} onCancel={() => setDel(null)} />}
    </div>
  );
}

          <div key={d.id} className="mobile-card" onClick={() => { setEd(d); setSf(true); }}>
            <div className="mobile-card-header"><div><div className="mobile-card-title">{s ? s.intitule : "—"}</div><div className="mobile-card-id">{d.date_deliberation}</div></div><span style={{ fontSize: 18 }}>{d.pv_valide ? "\u2705" : "\u23F3"}</span></div>
            <div className="mobile-card-meta"><Badge color="var(--green)">{ad} admis</Badge><Badge color="var(--red-tn)">{iS.length - ad} aj.</Badge></div>
          </div>); })}
        {deliberations.length === 0 && <Empty text="Aucune deliberation" />}
      </div>
      <FAB onClick={() => { setEd(null); setSf(true); }} color="linear-gradient(135deg,var(--purple),#7d3c98)" />
      {sf && <DeliberationForm delib={ed} sessions={sessions} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item="cette deliberation" onConfirm={rm} onCancel={() => setDel(null)} />}
    </div>
  );
}

/* ===== PDF EXPORT ===== */
function exportReleve(candidat, inscription, notesArr, matieres) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text("DGAC — Direction Generale de l'Aviation Civile", 14, 20);
  doc.setFontSize(11); doc.text("Republique Tunisienne", 14, 28);
  doc.setFontSize(14); doc.text("Releve de Notes — Examen ATE", 14, 42);
  doc.setFontSize(11);
  doc.text("Candidat: " + candidat.prenom + " " + candidat.nom, 14, 55);
  doc.text("Matricule: " + candidat.matricule + "    CIN: " + (candidat.cin || "—"), 14, 62);
  doc.text("Organisme: " + (candidat.organisme_formation || "—"), 14, 69);
  const rows = matieres.sort((a, b) => a.ordre - b.ordre).map(m => {
    const n = notesArr.find(x => x.matiere_uuid === m.id);
    return [m.nom, m.coefficient, n && n.absent ? "ABS" : n && n.note !== null ? n.note + "/20" : "—"];
  });
  doc.autoTable({ startY: 78, head: [["Matiere", "Coef", "Note"]], body: rows, styles: { fontSize: 9 }, headStyles: { fillColor: [18, 32, 61] } });
  const fy = doc.lastAutoTable.finalY + 14;
  const moy = inscription.moyenne_ponderee !== null ? Number(inscription.moyenne_ponderee).toFixed(2) : "—";
  doc.setFontSize(13); doc.text("Moyenne Ponderee: " + moy + "/20", 14, fy);
  doc.setFontSize(14); doc.text("Resultat: " + (inscription.resultat || "En attente"), 14, fy + 10);
  doc.save("Releve_" + candidat.matricule + ".pdf");
}

function exportPV(session, inscriptions, candidats, matieres, notes) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("l");
  doc.setFontSize(14); doc.text("DGAC — Proces-Verbal de Deliberation", 14, 18);
  doc.setFontSize(11); doc.text("Session: " + session.intitule, 14, 28);
  doc.text("Date: " + (session.date_debut || "—") + "    Lieu: " + (session.lieu || "—"), 14, 35);
  const sInscrits = inscriptions.filter(i => i.session_uuid === session.id).sort((a, b) => (b.moyenne_ponderee || 0) - (a.moyenne_ponderee || 0));
  const rows = sInscrits.map((i, idx) => {
    const c = candidats.find(x => x.id === i.candidat_uuid);
    return [idx + 1, c ? c.matricule : "", c ? c.prenom + " " + c.nom : "", c ? c.organisme_formation || "" : "", i.moyenne_ponderee !== null ? Number(i.moyenne_ponderee).toFixed(2) : "—", i.resultat || ""];
  });
  doc.autoTable({ startY: 44, head: [["#", "Matricule", "Candidat", "Organisme", "Moyenne", "Resultat"]], body: rows, styles: { fontSize: 9 }, headStyles: { fillColor: [18, 32, 61] } });
  const fy = doc.lastAutoTable.finalY + 14;
  const admis = sInscrits.filter(i => i.resultat === "Admis").length;
  doc.setFontSize(11);
  doc.text("Total: " + sInscrits.length + " candidats    Admis: " + admis + "    Ajournes: " + (sInscrits.length - admis), 14, fy);
  doc.text("President du Jury: " + (session.president_jury || "________________"), 14, fy + 12);
  doc.text("Signature:", 14, fy + 24);
  doc.save("PV_" + session.session_id + ".pdf");
}

/* ===== RESULTS VIEW ===== */
function ResultatsView({ sessions, candidats, inscriptions, notes, matieres }) {
  const [selS, setSelS] = useState("");
  const [orgF, setOrgF] = useState("Tous");
  const [detail, setDetail] = useState(null);
  const [showStats, setShowStats] = useState(false);
  const cur = selS || (sessions.length > 0 ? sessions[0].id : "");
  const session = sessions.find(s => s.id === cur);
  const allSI = inscriptions.filter(i => i.session_uuid === cur);
  const sI = allSI.filter(i => {
    if (orgF === "Tous") return true;
    const c = candidats.find(x => x.id === i.candidat_uuid);
    return c && c.organisme_formation === orgF;
  }).sort((a, b) => (b.moyenne_ponderee || 0) - (a.moyenne_ponderee || 0));
  const admis = sI.filter(i => i.resultat === "Admis").length;
  const total = sI.length;

  const matStats = matieres.sort((a, b) => a.ordre - b.ordre).map(m => {
    const matNotes = [];
    allSI.forEach(i => { const n = notes.find(x => x.inscription_uuid === i.id && x.matiere_uuid === m.id); if (n && n.note !== null && !n.absent) matNotes.push(n.note); });
    const max = matNotes.length > 0 ? Math.max(...matNotes) : null;
    const avg = matNotes.length > 0 ? (matNotes.reduce((a, b) => a + b, 0) / matNotes.length) : null;
    const sup13 = matNotes.filter(n => n >= 13).length;
    const pct = matNotes.length > 0 ? Math.round((sup13 / matNotes.length) * 100) : 0;
    return { nom: m.nom, coefficient: m.coefficient, max: max, avg: avg, sup13: sup13, pct: pct, total: matNotes.length };
  });

  const orgStats = ORGANISMES.map(o => {
    const oInscrits = allSI.filter(i => { const c = candidats.find(x => x.id === i.candidat_uuid); return c && c.organisme_formation === o; });
    const oAdmis = oInscrits.filter(i => i.resultat === "Admis").length;
    const oMoy = oInscrits.filter(i => i.moyenne_ponderee !== null);
    const avg = oMoy.length > 0 ? (oMoy.reduce((s, i) => s + Number(i.moyenne_ponderee), 0) / oMoy.length) : null;
    return { org: o, total: oInscrits.length, admis: oAdmis, taux: oInscrits.length > 0 ? Math.round((oAdmis / oInscrits.length) * 100) : 0, avg: avg };
  });

  return (
    <div>
      <div className="filters">
        <select className="select" value={cur} onChange={e => setSelS(e.target.value)} style={{ width: 260, maxWidth: "100%" }}>{sessions.map(s => <option key={s.id} value={s.id}>{s.intitule}</option>)}</select>
        <div className="filter-group">{["Tous", ...ORGANISMES].map(o => <button key={o} className={"filter-btn " + (orgF === o ? "active" : "")} onClick={() => setOrgF(o)}>{o}</button>)}</div>
        <div className="spacer" />
        <button className="btn btn-outline" onClick={() => setShowStats(!showStats)}>{showStats ? "Tableau" : "Statistiques"}</button>
        {session && <button className="btn btn-purple" onClick={() => exportPV(session, inscriptions, candidats, matieres, notes)}>PDF PV</button>}
      </div>
      {cur && (<div>
        <div className="kpi-grid">
          <KPI label="Candidats" value={total} color="var(--cyan)" />
          <KPI label="Admis" value={admis} color="var(--green)" />
          <KPI label="Ajournes" value={total - admis} color="var(--red-tn)" />
          <KPI label="Taux reussite" value={total > 0 ? Math.round((admis / total) * 100) + "%" : "—"} color="var(--green)" />
        </div>

        {!showStats ? (
          <div className="table-container">
            <div className="table-row" style={{ gridTemplateColumns: "40px 80px 1fr 80px 80px 80px 70px", background: "rgba(36,99,235,0.04)", fontWeight: 700, fontSize: 10, color: "var(--gold)", textTransform: "uppercase", letterSpacing: 1, cursor: "default" }}>
              <span>#</span><span>Matricule</span><span>Candidat</span><span>Organisme</span><span>Moyenne</span><span>Resultat</span><span>PDF</span>
            </div>
            {sI.map((i, idx) => { const c = candidats.find(x => x.id === i.candidat_uuid); return (
              <div key={i.id} className="table-row" style={{ gridTemplateColumns: "40px 80px 1fr 80px 80px 80px 70px" }} onClick={() => setDetail(i)}>
                <span className="mono" style={{ fontSize: 12, color: "var(--dim)" }}>{idx + 1}</span>
                <span className="mono" style={{ fontSize: 10, color: "var(--dim)" }}>{c ? c.matricule : "—"}</span>
                <span style={{ fontSize: 13, fontWeight: 500 }}>{c ? c.prenom + " " + c.nom : "—"}</span>
                <Badge color="var(--gold)">{c ? c.organisme_formation : "—"}</Badge>
                <span className="mono" style={{ fontSize: 14, fontWeight: 700, color: moyColor(i.moyenne_ponderee) }}>{i.moyenne_ponderee !== null ? Number(i.moyenne_ponderee).toFixed(2) : "—"}</span>
                <ResultBadge r={i.resultat} />
                <button className="btn btn-outline btn-sm" onClick={e => { e.stopPropagation(); if (c) exportReleve(c, i, notes.filter(n => n.inscription_uuid === i.id), matieres); }}>PDF</button>
              </div>); })}
            {sI.length === 0 && <Empty text="Aucun resultat" />}
          </div>
        ) : (
          <div>
            <div className="card card-padded">
              <div className="section-title" style={{ marginTop: 0 }}>Statistiques par module</div>
              <div style={{ overflowX: "auto" }}>
                <table className="stats-table">
                  <thead><tr><th>Matiere</th><th>Coef</th><th>Note Max</th><th>Moyenne</th><th>Nb &ge; 13</th><th>% &ge; 13</th></tr></thead>
                  <tbody>{matStats.map((m, i) => (
                    <tr key={i}><td style={{ fontWeight: 500 }}>{m.nom}</td><td className="mono">{m.coefficient}</td><td className="mono" style={{ color: "var(--gold)" }}>{m.max !== null ? m.max.toFixed(2) : "—"}</td><td className="mono" style={{ color: m.avg !== null && m.avg >= 13 ? "var(--green)" : "var(--orange)" }}>{m.avg !== null ? m.avg.toFixed(2) : "—"}</td><td className="mono">{m.sup13}/{m.total}</td><td className="mono" style={{ color: m.pct >= 50 ? "var(--green)" : "var(--red-tn)" }}>{m.pct}%</td></tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
            <div className="card card-padded" style={{ marginTop: 20 }}>
              <div className="section-title" style={{ marginTop: 0 }}>Statistiques par organisme</div>
              <table className="stats-table">
                <thead><tr><th>Organisme</th><th>Candidats</th><th>Admis</th><th>Ajournes</th><th>Taux</th><th>Moyenne</th></tr></thead>
                <tbody>{orgStats.map((o, i) => (
                  <tr key={i}><td style={{ fontWeight: 700, color: "var(--gold)" }}>{o.org}</td><td className="mono">{o.total}</td><td className="mono" style={{ color: "var(--green)" }}>{o.admis}</td><td className="mono" style={{ color: "var(--red-tn)" }}>{o.total - o.admis}</td><td className="mono" style={{ color: o.taux >= 50 ? "var(--green)" : "var(--red-tn)" }}>{o.taux}%</td><td className="mono" style={{ color: o.avg !== null && o.avg >= 13 ? "var(--green)" : "var(--orange)" }}>{o.avg !== null ? o.avg.toFixed(2) : "—"}</td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        )}
      </div>)}
      {detail && (<Modal onClose={() => setDetail(null)} title="Detail des notes" width={560}>
        {(() => { const c = candidats.find(x => x.id === detail.candidat_uuid); const iNotes = notes.filter(n => n.inscription_uuid === detail.id); return (<div>
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 600 }}>{c ? c.prenom + " " + c.nom : "—"}</div>
            <div style={{ fontSize: 12, color: "var(--dim)" }}>{c ? c.matricule : ""} — {c ? c.organisme_formation : ""}</div>
            <div className="moyenne-display" style={{ background: detail.moyenne_ponderee !== null ? (Number(detail.moyenne_ponderee) >= PASS_MARK ? "rgba(46,204,113,0.1)" : "rgba(200,16,46,0.1)") : "rgba(36,99,235,0.04)", color: moyColor(detail.moyenne_ponderee), margin: "12px 0" }}>
              {detail.moyenne_ponderee !== null ? Number(detail.moyenne_ponderee).toFixed(2) : "—"}<span style={{ fontSize: 16, fontWeight: 400, marginLeft: 8 }}>/20</span>
            </div>
            <ResultBadge r={detail.resultat} />
          </div>
          {matieres.sort((a, b) => a.ordre - b.ordre).map(m => { const n = iNotes.find(x => x.matiere_uuid === m.id); return (
            <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid var(--border)", fontSize: 13 }}>
              <span>{m.nom} <span className="mono" style={{ color: "var(--gold)", fontSize: 10 }}>x{m.coefficient}</span></span>
              <span className="mono" style={{ fontWeight: 700, color: n && n.absent ? "var(--red-tn)" : n && n.note !== null ? moyColor(n.note) : "var(--dim)" }}>{n && n.absent ? "ABS" : n && n.note !== null ? n.note + "/20" : "—"}</span>
            </div>); })}
          <div style={{ textAlign: "center", marginTop: 18 }}><button className="btn btn-purple" onClick={() => { if (c) exportReleve(c, detail, iNotes, matieres); }}>Telecharger PDF</button></div>
        </div>); })()}
      </Modal>)}
    </div>
  );
}

/* ===== MAIN APP ===== */
function normalizeTab(tabValue) {
  const raw = String(tabValue || "").trim().toLowerCase();
  const aliases = {
    accueil: "dashboard",
    home: "dashboard",
    session: "sessions",
    candidat: "candidats",
    candidats: "candidats",
    canadidat: "candidats",
    canadidats: "candidats",
    note: "notes",
    resultat: "resultats",
    deliberation: "deliberations"
  };
  return aliases[raw] || "dashboard";
}

function App() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [api, setApi] = useState(null);
  const [tab, setTab] = useState(() => normalizeTab((window.location.hash || "").replace(/^#/, "")));
  const [sessions, setSessions] = useState([]);
  const [candidats, setCandidats] = useState([]);
  const [inscriptions, setInscriptions] = useState([]);
  const [notes, setNotes] = useState([]);
  const [matieres, setMatieres] = useState([]);
  const [deliberations, setDeliberations] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [cs, setCs] = useState(true);
  const [lookup, setLookup] = useState(false);

  const loadAll = useCallback(async (ar) => {
    const a = ar || api; if (!a) return;
    setLoading(true); setError("");
    try {
      const [se, ca, ins, no, ma, de] = await Promise.all([
        a.select("sessions", "order=created_at.desc"), a.select("candidats", "order=nom.asc"),
        a.select("inscriptions", "order=created_at.desc"), a.select("notes", ""),
        a.select("matieres", "order=ordre.asc"), a.select("deliberations", "order=date_deliberation.desc")
      ]);
      setSessions(se); setCandidats(ca); setInscriptions(ins); setNotes(no); setMatieres(ma); setDeliberations(de);
    } catch (e) { setError("Erreur: " + e.message); }
    setLoading(false);
  }, [api]);

  const setTabSafe = (nextTab) => setTab(normalizeTab(nextTab));

  const handleLogin = (t, u) => { const a = createApi(t); setToken(t); setUser(u); setApi(a); loadAll(a); };
  const handleLogout = async () => { try { if (token) await authApi.logout(token); } catch (e) {} localStorage.removeItem("ate_token"); setUser(null); setToken(null); setApi(null); setTabSafe("dashboard"); };

  useEffect(() => {
    const t = localStorage.getItem("ate_token");
    if (t) { authApi.getUser(t).then(u => { const a = createApi(t); setToken(t); setUser(u); setApi(a); loadAll(a); setCs(false); }).catch(() => { localStorage.removeItem("ate_token"); setCs(false); }); }
    else setCs(false);
  }, []);

  useEffect(() => {
    if (!tab) return;
    window.location.hash = tab;
  }, [tab]);

  if (cs) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)" }}><div style={{ textAlign: "center" }}><div style={{ fontSize: 48, marginBottom: 12 }}>&#9992;</div><div style={{ color: "var(--muted)", fontSize: 14 }}>Chargement...</div></div></div>;
  if (lookup) return <CandidatLookup onBack={() => setLookup(false)} />;
  if (!user) return <LoginScreen onLogin={handleLogin} onLookup={() => setLookup(true)} />;

  const tabs = [
    { id: "dashboard", label: "Accueil", ml: "Accueil", icon: "\u2302" },
    { id: "sessions", label: "Sessions", ml: "Sessions", icon: "\uD83D\uDCC5", count: sessions.filter(s => s.statut !== "Archivee").length },
    { id: "candidats", label: "Candidats", ml: "Candidats", icon: "\uD83D\uDC65", count: candidats.length },
    { id: "notes", label: "Notes", ml: "Notes", icon: "\u270F" },
    { id: "resultats", label: "Resultats", ml: "Resultats", icon: "\uD83D\uDCCA" },
    { id: "deliberations", label: "Deliberations", ml: "Delib.", icon: "\u2696", count: deliberations.filter(d => !d.pv_valide).length }
  ];

  return (
    <div>
      <div className="tn-stripe"></div>
      <header className="header">
        <div className="header-left">
          <div className="logo-mark">&#9992;</div>
          <div><div className="header-title">Examens ATE — DGAC</div><div className="header-sub">Agent Technique d'Exploitation</div></div>
        </div>
        <div className="desktop-tabs">{tabs.map(t => <button key={t.id} className={"tab-btn " + (tab === t.id ? "active" : "")} onClick={() => setTabSafe(t.id)}><span>{t.icon}</span> {t.label}{t.count > 0 && <span className="tab-count">{t.count}</span>}</button>)}</div>
        <div className="header-right">
          <div className="user-badge"><div className="user-dot" />{user.email}</div>
          <button className="btn-outline btn-sm" onClick={() => loadAll()}>{loading ? "\u23F3" : "\u21BB"}</button>
          <button className="btn-outline btn-outline-red btn-sm" onClick={handleLogout}>Deconnexion</button>
        </div>
      </header>
      <nav className="mobile-nav">
        {tabs.map(t => <button key={t.id} className={"mobile-nav-btn " + (tab === t.id ? "active" : "")} onClick={() => setTabSafe(t.id)}><span className="nav-icon">{t.icon}</span>{t.ml}{t.count > 0 && tab !== t.id && <span className="nav-badge">{t.count}</span>}</button>)}
        <button className="mobile-nav-btn" onClick={handleLogout}><span className="nav-icon">&#x1F6AA;</span>Sortir</button>
      </nav>
      {error && <div className="error-box" style={{ margin: "12px 16px 0" }}>{error}</div>}
      <main style={{ padding: "28px 32px", maxWidth: 1400, margin: "0 auto" }}>
        {tab === "dashboard" && <Dashboard sessions={sessions} candidats={candidats} inscriptions={inscriptions} matieres={matieres} onNav={setTabSafe} />}
        {tab === "sessions" && <SessionsView api={api} sessions={sessions} inscriptions={inscriptions} reload={() => loadAll()} />}
        {tab === "candidats" && <CandidatsView api={api} candidats={candidats} sessions={sessions} inscriptions={inscriptions} reload={() => loadAll()} />}
        {tab === "notes" && <NotesView api={api} sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} matieres={matieres} reload={() => loadAll()} />}
        {tab === "resultats" && <ResultatsView sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} matieres={matieres} />}
        {tab === "deliberations" && <DeliberationsView api={api} sessions={sessions} inscriptions={inscriptions} deliberations={deliberations} reload={() => loadAll()} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</script>
</body>
</html>
