<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGAC — Examens ATE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎓</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATE Exams">
<meta name="theme-color" content="#0A0F1E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0A0F1E;--card:#111833;--card-hover:#152040;--border:rgba(255,255,255,0.06);--border-light:rgba(255,255,255,0.1);--text:#E2E8F0;--muted:rgba(255,255,255,0.4);--dim:rgba(255,255,255,0.25);--accent:#6366F1;--accent-dark:#4338CA;--red:#EF4444;--orange:#F59E0B;--green:#10B981;--purple:#A78BFA;--cyan:#22D3EE;--teal:#14B8A6;--pink:#EC4899;--safe-bottom:env(safe-area-inset-bottom,0px)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.header{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(10,15,30,0.97);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.header-title{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:10px;color:var(--dim);letter-spacing:0.5px}
.header-right{display:flex;gap:8px;align-items:center}
.desktop-tabs{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.03);border-radius:10px;padding:3px;flex-wrap:wrap}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,30,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:4px 2px;padding-bottom:calc(4px + var(--safe-bottom));z-index:100;justify-content:space-around}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;color:var(--muted);font-size:9px;font-family:inherit;font-weight:600;cursor:pointer;padding:4px 3px;border-radius:8px;min-width:42px;position:relative}
.mobile-nav-btn.active{color:var(--accent)}
.mobile-nav-btn .nav-icon{font-size:18px}
.mobile-nav-btn .nav-badge{position:absolute;top:0;right:0;font-size:8px;font-weight:700;background:var(--red);color:#fff;padding:1px 4px;border-radius:8px}
.tab-btn{padding:6px 12px;border-radius:7px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;background:transparent;color:var(--muted);transition:all 0.15s;white-space:nowrap}
.tab-btn.active{background:rgba(99,102,241,0.2);color:var(--accent)}
.tab-count{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,0.06)}
.tab-btn.active .tab-count{background:rgba(99,102,241,0.3);color:var(--accent)}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.btn:hover{opacity:0.85}.btn:disabled{opacity:0.5;cursor:not-allowed}.btn:active{transform:scale(0.97)}
.btn-accent{background:var(--accent);color:#fff}.btn-orange{background:var(--orange);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-purple{background:var(--purple);color:#fff}.btn-red{background:var(--red);color:#fff}.btn-teal{background:var(--teal);color:#fff}
.btn-outline{padding:7px 14px;background:transparent;border:1px solid rgba(99,102,241,0.3);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--accent)}
.btn-outline-red{border-color:rgba(239,68,68,0.3);color:var(--red)}
.btn-sm{padding:5px 12px;font-size:11px}.btn-full{width:100%;padding:12px 0}
.btn-icon{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:8px}
.btn-fab{position:fixed;bottom:76px;right:16px;width:50px;height:50px;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:90;display:none;align-items:center;justify-content:center;color:#fff}
.input,.select,.textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border-light);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.input:focus,.select:focus,.textarea:focus{border-color:var(--accent)}.select{cursor:pointer}.textarea{min-height:70px;resize:vertical}
.label{font-size:11px;color:var(--muted);margin-bottom:4px;display:block;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px}.card-padded{padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:14px 0 0 14px}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:600}
.kpi-value{font-size:26px;font-weight:700;margin-top:3px}.kpi-sub{font-size:11px;color:var(--dim);margin-top:2px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.table-container{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-row{display:grid;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.1s}
.table-row:hover{background:var(--card-hover)}
.mobile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer}
.mobile-card:active{border-color:rgba(99,102,241,0.3)}
.mobile-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.mobile-card-title{font-size:14px;font-weight:600}
.mobile-card-id{font-size:11px;color:var(--dim);margin-top:2px}
.mobile-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mobile-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:10px}
.modal{background:#111833;border:1px solid var(--border-light);border-radius:16px;padding:24px;max-width:94vw;max-height:90vh;overflow-y:auto;width:540px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form-span{grid-column:1/-1}
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;gap:3px;background:rgba(255,255,255,0.03);border-radius:8px;padding:3px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--muted);white-space:nowrap}
.filter-btn.active{background:rgba(99,102,241,0.2);color:var(--accent)}.spacer{flex:1}
.empty{padding:40px 20px;text-align:center;color:var(--dim);font-size:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:420px;max-width:100%}.login-header{text-align:center;margin-bottom:32px}
.login-icon{font-size:48px;margin-bottom:14px}.login-title{font-size:22px;font-weight:700}
.login-sub{color:var(--muted);font-size:14px;margin-top:6px}
.error-box{padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:12px;margin-bottom:14px}
.user-badge{display:flex;align-items:center;gap:8px;padding:5px 12px;background:rgba(255,255,255,0.04);border-radius:8px;font-size:12px;color:var(--muted)}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.note-grid{display:grid;gap:6px;margin:16px 0}
.note-row{display:grid;grid-template-columns:1fr 80px 50px;gap:8px;align-items:center;padding:8px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px}
.note-row .matiere-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.note-row .coef{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.note-input{width:100%;padding:6px 8px;background:rgba(255,255,255,0.06);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-size:14px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none}
.note-input:focus{border-color:var(--accent)}
.note-input.absent{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red)}
.result-admis{color:var(--green);font-weight:700}.result-ajourne{color:var(--red);font-weight:700}.result-attente{color:var(--orange);font-weight:700}
.moyenne-display{font-size:28px;font-weight:700;text-align:center;padding:16px;border-radius:12px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;margin-bottom:14px;margin-top:24px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border:none}
@media(max-width:768px){
  .header{padding:10px 14px}.header-title{font-size:13px}.header-sub{display:none}
  .desktop-tabs{display:none!important}.header-right .user-badge{display:none}.header-right .btn-outline:not(.btn-outline-red){display:none}
  .mobile-nav{display:flex!important}.btn-fab{display:flex!important}
  main{padding:14px 12px 90px 12px!important}
  .filters{gap:6px}.filter-group{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .filter-btn{padding:5px 9px;font-size:10px;flex-shrink:0}
  .form-grid{grid-template-columns:1fr}.form-span{grid-column:1}
  .grid-2{grid-template-columns:1fr}
  .modal{padding:20px 16px;width:100%;max-width:100%;border-radius:14px 14px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:92vh}
  .modal-overlay{align-items:flex-end;padding:0}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}.kpi{padding:12px 14px}.kpi-value{font-size:22px}.kpi-label{font-size:8px}
  .desktop-only{display:none!important}.mobile-only{display:block!important}
  .input,.select,.textarea{font-size:16px;padding:12px}.btn{padding:10px 18px;font-size:14px}.btn-full{padding:14px 0}
  .note-row{grid-template-columns:1fr 60px 45px}.note-row .matiere-name{font-size:11px}
}
@media(min-width:769px){.mobile-only{display:none!important}.mobile-nav{display:none!important}.btn-fab{display:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const SB_URL = "https://rvsldfentjjuukgozrzv.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2c2xkZmVudGpqdXVrZ296cnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzA0MDEsImV4cCI6MjA4NzI0NjQwMX0.PAFfUgH1-cmrd7HULo0H46Bzs9q3fwX3qoxjBgnvCdQ";
const PASS_MARK = 13;

const authApi = {
  async login(e, p) {
    const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: "POST", headers: { apikey: SB_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email: e, password: p })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error_description || d.msg || "Échec");
    return d;
  },
  async logout(t) {
    await fetch(`${SB_URL}/auth/v1/logout`, {
      method: "POST", headers: { apikey: SB_KEY, Authorization: `Bearer ${t}`, "Content-Type": "application/json" }
    });
  },
  async getUser(t) {
    const r = await fetch(`${SB_URL}/auth/v1/user`, { headers: { apikey: SB_KEY, Authorization: `Bearer ${t}` } });
    if (!r.ok) throw new Error("Expiré");
    return r.json();
  }
};

const createApi = (t) => {
  const h = { apikey: SB_KEY, Authorization: `Bearer ${t}`, "Content-Type": "application/json", Prefer: "return=representation" };
  const b = `${SB_URL}/rest/v1`;
  return {
    async select(tb, q = "") { const r = await fetch(`${b}/${tb}?${q}`, { headers: h }); if (!r.ok) throw new Error(r.statusText); return r.json(); },
    async insert(tb, d) { const r = await fetch(`${b}/${tb}`, { method: "POST", headers: h, body: JSON.stringify(d) }); if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.statusText); } return r.json(); },
    async update(tb, id, d) { const r = await fetch(`${b}/${tb}?id=eq.${id}`, { method: "PATCH", headers: h, body: JSON.stringify(d) }); if (!r.ok) throw new Error(r.statusText); return r.json(); },
    async remove(tb, id) { const r = await fetch(`${b}/${tb}?id=eq.${id}`, { method: "DELETE", headers: h }); if (!r.ok) throw new Error(r.statusText); return true; }
  };
};

const STATUTS_SESSION = ["Planifiée", "En cours", "Terminée", "Délibérée", "Archivée"];
const STATUTS_INSCRIPTION = ["Inscrit", "Absent", "Retiré"];
const RESULTATS = ["En attente", "Admis", "Ajourné"];
const SC = { "Planifiée": "#6366F1", "En cours": "#F59E0B", "Terminée": "#22D3EE", "Délibérée": "#10B981", "Archivée": "rgba(255,255,255,0.3)", "Inscrit": "#6366F1", "Absent": "#EF4444", "Retiré": "rgba(255,255,255,0.3)", "En attente": "#F59E0B", "Admis": "#10B981", "Ajourné": "#EF4444" };

/* ===== SHARED UI ===== */
function Badge({ children, color }) {
  return <span className="badge" style={{ background: `${color || '#888'}18`, color: color || '#888' }}>{children}</span>;
}
function Tag({ label }) { return <Badge color={SC[label]}>{label}</Badge>; }
function Empty({ text }) { return <div className="empty">{text}</div>; }
function KPI({ label, value, sub, color }) {
  return (
    <div className="kpi">
      <div className="kpi-bar" style={{ background: color }} />
      <div className="kpi-label">{label}</div>
      <div className="kpi-value mono" style={{ color }}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}
function Modal({ onClose, title, width, children }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ width: width || 540 }} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h3 className="modal-title">{title}</h3>
          <button className="btn-icon" onClick={onClose} style={{ fontSize: 20 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Field({ label, span, children }) { return <div className={span ? "form-span" : ""}><label className="label">{label}</label>{children}</div>; }
function Sel({ value, onChange, options }) { return <select className="select" value={value} onChange={e => onChange(e.target.value)}>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>; }
function ConfirmDelete({ item, onConfirm, onCancel }) {
  return (
    <Modal onClose={onCancel} title="Supprimer ?" width={400}>
      <p style={{ color: 'var(--muted)', fontSize: 14 }}>Supprimer <strong style={{ color: 'var(--red)' }}>{item}</strong> ?</p>
      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 20 }}>
        <button className="btn btn-outline" onClick={onCancel}>Annuler</button>
        <button className="btn btn-red" onClick={onConfirm}>Supprimer</button>
      </div>
    </Modal>
  );
}
function FAB({ onClick, color }) { return <button className="btn-fab" style={{ background: color || 'var(--accent)' }} onClick={onClick}>+</button>; }
function ResultBadge({ r }) {
  const cls = r === "Admis" ? "result-admis" : r === "Ajourné" ? "result-ajourne" : "result-attente";
  return <span className={cls}>{r}</span>;
}

function moyenneColor(moy) {
  if (moy === null || moy === undefined) return 'var(--dim)';
  return Number(moy) >= PASS_MARK ? 'var(--green)' : 'var(--red)';
}

/* ===== LOGIN ===== */
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [ld, setLd] = useState(false);
  const [err, setErr] = useState("");
  const go = async () => {
    if (!email || !pw) { setErr("Remplissez les deux champs"); return; }
    setLd(true); setErr("");
    try {
      const d = await authApi.login(email, pw);
      localStorage.setItem("ate_token", d.access_token);
      localStorage.setItem("ate_email", d.user.email);
      onLogin(d.access_token, d.user);
    } catch (e) { setErr(e.message === "Invalid login credentials" ? "Email ou mot de passe incorrect" : e.message); }
    setLd(false);
  };
  return (
    <div className="login-page"><div className="login-box">
      <div className="login-header"><div className="login-icon">🎓</div><h1 className="login-title">Examens ATE — DGAC</h1><p className="login-sub">Agent Technique d'Exploitation</p></div>
      <div className="card card-padded">
        <div style={{ marginBottom: 16 }}><label className="label">Email</label><input className="input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="votre.email@dgac.tn" onKeyDown={e => e.key === 'Enter' && go()} /></div>
        <div style={{ marginBottom: 16 }}><label className="label">Mot de passe</label><input className="input" type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && go()} /></div>
        {err && <div className="error-box">{err}</div>}
        <button className="btn btn-accent btn-full" onClick={go} disabled={ld} style={{ background: 'linear-gradient(135deg,#6366F1,#4338CA)' }}>{ld ? "Connexion..." : "Se connecter"}</button>
      </div>
      <p style={{ textAlign: 'center', marginTop: 14, fontSize: 12, color: 'var(--dim)' }}>Direction Générale de l'Aviation Civile — Tunisie</p>
    </div></div>
  );
}

/* ===== DASHBOARD ===== */
function Dashboard({ sessions, candidats, inscriptions, notes, matieres, onNav }) {
  const sessionsActives = sessions.filter(s => ["Planifiée", "En cours"].includes(s.statut));
  const admis = inscriptions.filter(i => i.resultat === "Admis").length;
  const ajournes = inscriptions.filter(i => i.resultat === "Ajourné").length;
  const total = admis + ajournes;
  const tauxReussite = total > 0 ? Math.round((admis / total) * 100) : 0;
  const inscrAvecMoy = inscriptions.filter(i => i.moyenne_ponderee !== null);
  const moyGen = inscrAvecMoy.length > 0 ? (inscrAvecMoy.reduce((s, i) => s + Number(i.moyenne_ponderee), 0) / inscrAvecMoy.length).toFixed(2) : "-";
  return (
    <div>
      <div className="kpi-grid">
        <KPI label="Sessions" value={sessions.length} sub={sessionsActives.length + " actives"} color="#6366F1" />
        <KPI label="Candidats" value={candidats.length} sub="inscrits" color="#22D3EE" />
        <KPI label="Taux réussite" value={tauxReussite + "%"} sub={admis + " admis / " + total} color="#10B981" />
        <KPI label="Moyenne gén." value={moyGen} sub="/20" color={Number(moyGen) >= PASS_MARK ? "#10B981" : "#F59E0B"} />
      </div>
      <div className="grid-2">
        <div className="card card-padded">
          <div className="section-title" style={{ marginTop: 0 }}>📅 Sessions actives</div>
          {sessionsActives.length === 0 && <div style={{ color: 'var(--dim)', fontSize: 13 }}>Aucune session active</div>}
          {sessionsActives.slice(0, 5).map(s => {
            const nb = inscriptions.filter(i => i.session_uuid === s.id).length;
            return (
              <div key={s.id} className="stat-row">

/* ===== NOTES ENTRY ===== */
function NotesEntry({ api, inscription, matieres, existingNotes, onClose, onSaved }) {
  const [noteValues, setNoteValues] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    const nv = {};
    matieres.forEach(m => {
      const ex = existingNotes.find(n => n.matiere_uuid === m.id);
      if (ex) {
        nv[m.id] = { note: ex.note !== null ? String(ex.note) : "", absent: ex.absent || false };
      } else {
        nv[m.id] = { note: "", absent: false };
      }
    });
    setNoteValues(nv);
  }, [matieres, existingNotes]);

  const setNote = (mid, val) => setNoteValues(p => ({ ...p, [mid]: { ...p[mid], note: val, absent: false } }));
  const toggleAbsent = (mid) => setNoteValues(p => ({ ...p, [mid]: { note: "", absent: !p[mid].absent } }));

  let totalCN = 0, totalC = 0;
  matieres.forEach(m => {
    const v = noteValues[m.id];
    if (v && !v.absent && v.note !== "") {
      const n = parseFloat(v.note);
      if (!isNaN(n)) { totalCN += n * m.coefficient; totalC += m.coefficient; }
    }
  });
  const moy = totalC > 0 ? (totalCN / totalC) : null;
  const moyStr = moy !== null ? moy.toFixed(2) : "-";
  const passed = moy !== null && moy >= PASS_MARK;

  const handleSave = async () => {
    setSaving(true);
    try {
      for (const m of matieres) {
        const v = noteValues[m.id] || {};
        const noteData = {
          inscription_uuid: inscription.id,
          matiere_uuid: m.id,
          note: v.absent ? null : (v.note !== "" ? parseFloat(v.note) : null),
          absent: v.absent || false
        };
        const ex = existingNotes.find(x => x.matiere_uuid === m.id);
        if (ex) { await api.update("notes", ex.id, noteData); }
        else { await api.insert("notes", noteData); }
      }
      const result = moy !== null ? (moy >= PASS_MARK ? "Admis" : "Ajourné") : "En attente";
      await api.update("inscriptions", inscription.id, { moyenne_ponderee: moy, resultat: result });
      onSaved();
    } catch (e) { alert("Erreur: " + e.message); }
    setSaving(false);
  };

  const moyBg = moy === null ? 'rgba(255,255,255,0.04)' : passed ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)';
  const moyColor = moy === null ? 'var(--dim)' : passed ? 'var(--green)' : 'var(--red)';
  const moyLabel = moy !== null ? (passed ? "— ADMIS" : "— AJOURNÉ") : "";

  return (
    <Modal onClose={onClose} title="Saisie des Notes" width={640}>
      <div className="moyenne-display" style={{ background: moyBg, color: moyColor }}>
        {moyStr}<span style={{ fontSize: 14, fontWeight: 400, marginLeft: 8 }}>/20 {moyLabel}</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 60px 45px', gap: 8, padding: '6px 12px', fontSize: 10, color: 'var(--dim)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1 }}>
        <span>Matière (coef)</span><span style={{ textAlign: 'center' }}>Note</span><span style={{ textAlign: 'center' }}>Abs.</span>
      </div>
      <div className="note-grid">
        {matieres.sort((a, b) => a.ordre - b.ordre).map(m => {
          const v = noteValues[m.id] || {};
          return (
            <div key={m.id} className="note-row">
              <div><div className="matiere-name">{m.nom}</div><div className="coef">coef ×{m.coefficient}</div></div>
              <input className={"note-input" + (v.absent ? " absent" : "")} type="number" min="0" max="20" step="0.25" value={v.absent ? "" : (v.note || "")} disabled={v.absent} onChange={e => setNote(m.id, e.target.value)} placeholder="—" />
              <div style={{ textAlign: 'center' }}><input type="checkbox" checked={v.absent || false} onChange={() => toggleAbsent(m.id)} style={{ cursor: 'pointer', width: 18, height: 18 }} /></div>
            </div>
          );
        })}
      </div>
      <button className="btn btn-accent btn-full" style={{ marginTop: 16 }} onClick={handleSave} disabled={saving}>{saving ? "Enregistrement..." : "💾 Enregistrer les notes"}</button>
    </Modal>
  );
}

/* ===== CANDIDATS VIEW ===== */
function CandidatsView({ api, candidats, reload }) {
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [se, setSe] = useState("");
  const [importing, setImporting] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const fl = candidats.filter(c => { if (!se) return true; const q = se.toLowerCase(); return c.nom.toLowerCase().includes(q) || c.prenom.toLowerCase().includes(q) || c.matricule.toLowerCase().includes(q); });
  const save = async (d) => { try { if (ed) await api.update("candidats", ed.id, d); else await api.insert("candidats", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("candidats", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };

  const normalize = (str) => {
    if (!str) return "";
    return str.toString().trim().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]/g, "");
  };

  const findColumn = (headers, possibilities) => {
    for (const h of headers) {
      const hn = normalize(h);
      for (const p of possibilities) {
        if (hn.includes(normalize(p))) return h;
      }
    }
    return null;
  };

  const handleImport = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true);
    setImportResult(null);
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

      if (rows.length === 0) { setImportResult({ error: "Fichier vide" }); setImporting(false); return; }

      const headers = Object.keys(rows[0]);
      const colMatricule = findColumn(headers, ["matricule", "mat", "code"]);
      const colNom = findColumn(headers, ["nom", "family", "last"]);
      const colPrenom = findColumn(headers, ["prenom", "prénom", "first", "given"]);
      const colNomPrenom = findColumn(headers, ["noms et prenom", "nom et prenom", "nomsetprenom", "nometprenom", "nom prenom", "nomprenom", "nom complet", "full name"]);
      const colCIN = findColumn(headers, ["cin", "cin_pass", "cinpass", "carte", "identite", "identité", "passeport", "passport"]);
      const colDateNais = findColumn(headers, ["date", "naissance", "birth", "datenaissance", "datedenaissance"]);
      const colNationalite = findColumn(headers, ["nationalite", "nationalité", "nation", "pays"]);

      // Need either separate nom+prenom OR combined column
      if (!colNom && !colPrenom && !colNomPrenom) {
        setImportResult({ error: "Colonnes 'Nom'/'Prénom' ou 'Noms et Prénom' non trouvées. Colonnes détectées: " + headers.join(", ") });
        setImporting(false);
        return;
      }

      let imported = 0, skipped = 0, errors = 0;
      for (const row of rows) {
        let nom = "", prenom = "";

        if (colNomPrenom) {
          // Combined column: split "BEN ALI Mohamed" or "Mohamed BEN ALI"
          const full = String(row[colNomPrenom] || "").trim();
          if (!full) { skipped++; continue; }
          const words = full.split(/\s+/);
          if (words.length === 1) {
            nom = words[0]; prenom = "";
          } else if (words.length === 2) {
            nom = words[0]; prenom = words[1];
          } else {
            // Heuristic: uppercase words = nom, rest = prenom
            const upperWords = words.filter(w => w === w.toUpperCase() && w.length > 1);
            const otherWords = words.filter(w => w !== w.toUpperCase() || w.length <= 1);
            if (upperWords.length > 0 && otherWords.length > 0) {
              nom = upperWords.join(" ");
              prenom = otherWords.join(" ");
            } else {
              // Default: last word = prenom, rest = nom
              prenom = words[words.length - 1];
              nom = words.slice(0, -1).join(" ");
            }
          }
        } else {
          nom = colNom ? String(row[colNom] || "").trim() : "";
          prenom = colPrenom ? String(row[colPrenom] || "").trim() : "";
        }

        if (!nom && !prenom) { skipped++; continue; }

        let dateNais = "";
        if (colDateNais && row[colDateNais]) {
          const raw = row[colDateNais];
          if (typeof raw === "number") {
            // Excel serial date
            const d = new Date((raw - 25569) * 86400 * 1000);
            dateNais = d.toISOString().slice(0, 10);
          } else {
            const s = String(raw).trim();
            // Try DD/MM/YYYY
            const parts = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
            if (parts) {
              dateNais = parts[3] + "-" + parts[2].padStart(2, "0") + "-" + parts[1].padStart(2, "0");
            } else if (s.match(/^\d{4}-\d{2}-\d{2}$/)) {
              dateNais = s;
            }
          }
        }

        const candidat = {
          matricule: colMatricule ? String(row[colMatricule] || "").trim() : ("ATE-" + String(imported + 1).padStart(3, "0")),
          nom: nom,
          prenom: prenom,
          cin: colCIN ? String(row[colCIN] || "").trim() : "",
          date_naissance: dateNais || null,
          notes: colNationalite && row[colNationalite] ? "Nationalité: " + String(row[colNationalite]).trim() : ""
        };

        try {
          await api.insert("candidats", candidat);
          imported++;
        } catch (err) {
          errors++;
        }
      }
      setImportResult({ imported, skipped, errors, total: rows.length });
      reload();
    } catch (err) {
      setImportResult({ error: "Erreur de lecture: " + err.message });
    }
    setImporting(false);
    e.target.value = "";
  };

  return (
    <div>
      <div className="filters">
        <input className="input" value={se} onChange={e => setSe(e.target.value)} placeholder="Rechercher..." style={{ width: 220, maxWidth: '100%' }} />
        <div className="spacer" />
        <label className="btn btn-purple" style={{ cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 6, opacity: importing ? 0.5 : 1 }}>
          📥 {importing ? "Import..." : "Importer Excel"}
          <input type="file" accept=".xlsx,.xls,.csv" onChange={handleImport} style={{ display: 'none' }} disabled={importing} />
        </label>
        <button className="btn btn-teal" onClick={() => { setEd(null); setSf(true); }}>+ Candidat</button>
      </div>

      {importResult && (
        <div style={{ padding: '12px 16px', borderRadius: 10, marginBottom: 16, background: importResult.error ? 'rgba(239,68,68,0.08)' : 'rgba(16,185,129,0.08)', border: importResult.error ? '1px solid rgba(239,68,68,0.2)' : '1px solid rgba(16,185,129,0.2)' }}>
          {importResult.error ? (
            <div style={{ color: 'var(--red)', fontSize: 13 }}>❌ {importResult.error}</div>
          ) : (
            <div style={{ fontSize: 13 }}>
              <span style={{ color: 'var(--green)', fontWeight: 700 }}>✅ {importResult.imported} candidats importés</span>
              {importResult.skipped > 0 && <span style={{ color: 'var(--orange)', marginLeft: 12 }}>⚠ {importResult.skipped} lignes ignorées</span>}
              {importResult.errors > 0 && <span style={{ color: 'var(--red)', marginLeft: 12 }}>❌ {importResult.errors} erreurs</span>}
              <span style={{ color: 'var(--dim)', marginLeft: 12 }}>({importResult.total} lignes lues)</span>
            </div>
          )}
          <button className="btn-icon" onClick={() => setImportResult(null)} style={{ float: 'right', marginTop: -24 }}>✕</button>
        </div>
      )}

      <div className="table-container desktop-only">
        {fl.map(c => (
          <div key={c.id} className="table-row" style={{ gridTemplateColumns: '100px 1fr 100px 100px 120px 36px' }} onClick={() => { setEd(c); setSf(true); }}>
            <span className="mono" style={{ fontSize: 10, color: 'var(--dim)' }}>{c.matricule}</span>
            <div><div style={{ fontSize: 13, fontWeight: 600 }}>{c.prenom} {c.nom}</div><div style={{ fontSize: 11, color: 'var(--dim)' }}>CIN: {c.cin || "—"}</div></div>
            <span style={{ fontSize: 11, color: 'var(--dim)' }}>{c.date_naissance || "—"}</span>
            <span style={{ fontSize: 11, color: 'var(--dim)' }}>{c.telephone || "—"}</span>
            <span style={{ fontSize: 11, color: 'var(--dim)' }}>{c.organisme_formation || "—"}</span>
            <button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(c); }}>🗑</button>
          </div>
        ))}
        {fl.length === 0 && <Empty text="Aucun candidat" />}
      </div>
      <div className="mobile-only">
        {fl.map(c => (
          <div key={c.id} className="mobile-card" onClick={() => { setEd(c); setSf(true); }}>
            <div className="mobile-card-header"><div><div className="mobile-card-title">{c.prenom} {c.nom}</div><div className="mobile-card-id mono">{c.matricule}</div></div><button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(c); }}>🗑</button></div>
            <div className="mobile-card-footer"><span style={{ fontSize: 11, color: 'var(--dim)' }}>CIN: {c.cin || "—"}</span><span style={{ fontSize: 11, color: 'var(--dim)' }}>{c.date_naissance || "—"}</span></div>
          </div>
        ))}
        {fl.length === 0 && <Empty text="Aucun candidat" />}
      </div>
      <FAB onClick={() => { setEd(null); setSf(true); }} color="var(--teal)" />
      {sf && <CandidatForm candidat={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item={del.prenom + " " + del.nom} onConfirm={rm} onCancel={() => setDel(null)} />}
    </div>
  );
}

/* ===== NOTES VIEW ===== */
function NotesView({ api, sessions, candidats, inscriptions, notes, matieres, reload }) {
  const [selSession, setSelSession] = useState("");
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [notesModal, setNotesModal] = useState(null);
  const curSession = selSession || (sessions.length > 0 ? sessions[0].id : "");
  const sessionInscr = inscriptions.filter(i => i.session_uuid === curSession);
  const save = async (d) => { try { if (ed) await api.update("inscriptions", ed.id, d); else await api.insert("inscriptions", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("inscriptions", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };
  return (
    <div>
      <div className="filters">
        <select className="select" value={curSession} onChange={e => setSelSession(e.target.value)} style={{ width: 240, maxWidth: '100%' }}>
          <option value="">— Choisir une session —</option>
          {sessions.map(s => <option key={s.id} value={s.id}>{s.intitule}</option>)}
        </select>
        <div className="spacer" /><button className="btn btn-orange" onClick={() => { setEd(null); setSf(true); }}>+ Inscrire</button>
      </div>
      {curSession && (
        <div>
          <div className="table-container desktop-only">
            {sessionInscr.map(i => {
              const c = candidats.find(x => x.id === i.candidat_uuid);
              const nbNotes = notes.filter(n => n.inscription_uuid === i.id && n.note !== null).length;
              return (
                <div key={i.id} className="table-row" style={{ gridTemplateColumns: '90px 1fr 80px 80px 80px 70px 36px' }}>
                  <span className="mono" style={{ fontSize: 10, color: 'var(--dim)' }}>{c ? c.matricule : "—"}</span>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{c ? c.prenom + " " + c.nom : "—"}</div>
                  <Tag label={i.statut} />
                  <span style={{ fontSize: 11, color: 'var(--dim)' }}>{nbNotes}/{matieres.length}</span>
                  <span className="mono" style={{ fontSize: 14, fontWeight: 700, color: moyenneColor(i.moyenne_ponderee) }}>{i.moyenne_ponderee !== null ? Number(i.moyenne_ponderee).toFixed(2) : "—"}</span>
                  <button className="btn btn-accent btn-sm" onClick={() => setNotesModal(i)}>📝</button>
                  <button className="btn-icon" onClick={() => setDel(i)}>🗑</button>
                </div>
              );
            })}
            {sessionInscr.length === 0 && <Empty text="Aucun candidat inscrit" />}
          </div>
          <div className="mobile-only">
            {sessionInscr.map(i => {
              const c = candidats.find(x => x.id === i.candidat_uuid);
              const nbNotes = notes.filter(n => n.inscription_uuid === i.id && n.note !== null).length;
              return (
                <div key={i.id} className="mobile-card">
                  <div className="mobile-card-header">
                    <div><div className="mobile-card-title">{c ? c.prenom + " " + c.nom : "—"}</div><div className="mobile-card-id mono">{c ? c.matricule : ""}</div></div>
                    <button className="btn btn-accent btn-sm" onClick={() => setNotesModal(i)}>📝 Notes</button>
                  </div>
                  <div className="mobile-card-meta"><Tag label={i.statut} /><Badge color="#22D3EE">{nbNotes}/{matieres.length}</Badge>{i.resultat !== "En attente" && <ResultBadge r={i.resultat} />}</div>
                  <div className="mobile-card-footer">
                    <span className="mono" style={{ fontSize: 16, fontWeight: 700, color: moyenneColor(i.moyenne_ponderee) }}>{i.moyenne_ponderee !== null ? Number(i.moyenne_ponderee).toFixed(2) : "—"}/20</span>
                    <button className="btn-icon" onClick={() => setDel(i)}>🗑</button>
                  </div>
                </div>
              );
            })}
            {sessionInscr.length === 0 && <Empty text="Aucun candidat inscrit" />}
          </div>
        </div>
      )}
      <FAB onClick={() => { setEd(null); setSf(true); }} color="var(--orange)" />
      {sf && <InscriptionForm sessions={sessions} candidats={candidats} inscription={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item="cette inscription" onConfirm={rm} onCancel={() => setDel(null)} />}
      {notesModal && <NotesEntry api={api} inscription={notesModal} matieres={matieres} existingNotes={notes.filter(n => n.inscription_uuid === notesModal.id)} onClose={() => setNotesModal(null)} onSaved={() => { setNotesModal(null); reload(); }} />}
    </div>
  );
}

/* ===== DELIBERATIONS VIEW ===== */
function DeliberationsView({ api, sessions, inscriptions, candidats, deliberations, reload }) {
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const save = async (d) => { try { if (ed) await api.update("deliberations", ed.id, d); else await api.insert("deliberations", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("deliberations", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };
  return (
    <div>
      <div className="filters"><div className="spacer" /><button className="btn btn-purple" onClick={() => { setEd(null); setSf(true); }}>+ Délibération</button></div>
      <div className="table-container desktop-only">
        {deliberations.map(d => {
          const s = sessions.find(x => x.id === d.session_uuid);
          const inscrS = inscriptions.filter(i => i.session_uuid === d.session_uuid);
          const adm = inscrS.filter(i => i.resultat === "Admis").length;
          return (
            <div key={d.id} className="table-row" style={{ gridTemplateColumns: '1fr 80px 80px 80px 50px 36px' }} onClick={() => { setEd(d); setSf(true); }}>
              <div><div style={{ fontSize: 13, fontWeight: 600 }}>{s ? s.intitule : "—"}</div><div style={{ fontSize: 11, color: 'var(--dim)' }}>{d.date_deliberation}</div></div>
              <span style={{ fontSize: 11, color: 'var(--dim)' }}>{inscrS.length} cand.</span>
              <Badge color="#10B981">{adm} admis</Badge>
              <Badge color="#EF4444">{inscrS.length - adm} aj.</Badge>
              <span style={{ fontSize: 14 }}>{d.pv_valide ? "✅" : "⏳"}</span>
              <button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(d); }}>🗑</button>
            </div>
          );
        })}
        {deliberations.length === 0 && <Empty text="Aucune délibération" />}
      </div>
      <div className="mobile-only">
        {deliberations.map(d => {
          const s = sessions.find(x => x.id === d.session_uuid);
          const inscrS = inscriptions.filter(i => i.session_uuid === d.session_uuid);
          const adm = inscrS.filter(i => i.resultat === "Admis").length;
          return (
            <div key={d.id} className="mobile-card" onClick={() => { setEd(d); setSf(true); }}>
              <div className="mobile-card-header"><div><div className="mobile-card-title">{s ? s.intitule : "—"}</div><div className="mobile-card-id">{d.date_deliberation}</div></div><span style={{ fontSize: 18 }}>{d.pv_valide ? "✅" : "⏳"}</span></div>
              <div className="mobile-card-meta"><Badge color="#10B981">{adm} admis</Badge><Badge color="#EF4444">{inscrS.length - adm} aj.</Badge></div>
            </div>
          );
        })}
        {deliberations.length === 0 && <Empty text="Aucune délibération" />}
      </div>
      <FAB onClick={() => { setEd(null); setSf(true); }} color="var(--purple)" />
      {sf && <DeliberationForm delib={ed} sessions={sessions} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item="cette délibération" onConfirm={rm} onCancel={() => setDel(null)} />}
    </div>
  );
}

/* ===== RESULTATS VIEW ===== */
function ResultatsView({ sessions, candidats, inscriptions }) {
  const [selSession, setSelSession] = useState("");
  const curSession = selSession || (sessions.length > 0 ? sessions[0].id : "");
  const sessionInscr = inscriptions.filter(i => i.session_uuid === curSession).sort((a, b) => (b.moyenne_ponderee || 0) - (a.moyenne_ponderee || 0));
  const admis = sessionInscr.filter(i => i.resultat === "Admis").length;
  const total = sessionInscr.length;
  return (
    <div>
      <div className="filters">
        <select className="select" value={curSession} onChange={e => setSelSession(e.target.value)} style={{ width: 240, maxWidth: '100%' }}>
          {sessions.map(s => <option key={s.id} value={s.id}>{s.intitule}</option>)}
        </select>
      </div>
      {curSession && (
        <div>
          <div className="kpi-grid" style={{ marginBottom: 16 }}>
            <KPI label="Candidats" value={total} color="#22D3EE" />
            <KPI label="Admis" value={admis} color="#10B981" />
            <KPI label="Ajournés" value={total - admis} color="#EF4444" />
            <KPI label="Taux réussite" value={total > 0 ? Math.round((admis / total) * 100) + "%" : "—"} color="#10B981" />
          </div>
          <div className="table-container">
            <div className="table-row" style={{ gridTemplateColumns: '40px 90px 1fr 80px 80px', background: 'rgba(255,255,255,0.02)', fontWeight: 700, fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: 1, cursor: 'default' }}>
              <span>#</span><span>Matricule</span><span>Candidat</span><span>Moyenne</span><span>Résultat</span>
            </div>
            {sessionInscr.map((i, idx) => {
              const c = candidats.find(x => x.id === i.candidat_uuid);
              return (
                <div key={i.id} className="table-row" style={{ gridTemplateColumns: '40px 90px 1fr 80px 80px', cursor: 'default' }}>
                  <span className="mono" style={{ fontSize: 12, color: 'var(--dim)' }}>{idx + 1}</span>
                  <span className="mono" style={{ fontSize: 10, color: 'var(--dim)' }}>{c ? c.matricule : "—"}</span>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{c ? c.prenom + " " + c.nom : "—"}</span>
                  <span className="mono" style={{ fontSize: 14, fontWeight: 700, color: moyenneColor(i.moyenne_ponderee) }}>{i.moyenne_ponderee !== null ? Number(i.moyenne_ponderee).toFixed(2) : "—"}</span>
                  <ResultBadge r={i.resultat} />
                </div>
              );
            })}
            {sessionInscr.length === 0 && <Empty text="Aucun résultat" />}
          </div>
        </div>
      )}
    </div>
  );
}

/* ===== MAIN APP ===== */
function App() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [api, setApi] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [sessions, setSessions] = useState([]);
  const [candidats, setCandidats] = useState([]);
  const [inscriptions, setInscriptions] = useState([]);
  const [notes, setNotes] = useState([]);
  const [matieres, setMatieres] = useState([]);
  const [deliberations, setDeliberations] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [cs, setCs] = useState(true);

  const loadAll = useCallback(async (ar) => {
    const a = ar || api; if (!a) return;
    setLoading(true); setError("");
    try {
      const [se, ca, ins, no, ma, de] = await Promise.all([
        a.select("sessions", "order=created_at.desc"),
        a.select("candidats", "order=nom.asc"),
        a.select("inscriptions", "order=created_at.desc"),
        a.select("notes", ""),
        a.select("matieres", "order=ordre.asc"),
        a.select("deliberations", "order=date_deliberation.desc")
      ]);
      setSessions(se); setCandidats(ca); setInscriptions(ins); setNotes(no); setMatieres(ma); setDeliberations(de);
    } catch (e) { setError("Erreur: " + e.message); }
    setLoading(false);
  }, [api]);

  const handleLogin = (t, u) => { const a = createApi(t); setToken(t); setUser(u); setApi(a); loadAll(a); };
  const handleLogout = async () => { try { if (token) await authApi.logout(token); } catch (e) {} localStorage.removeItem("ate_token"); localStorage.removeItem("ate_email"); setUser(null); setToken(null); setApi(null); };

  useEffect(() => {
    const t = localStorage.getItem("ate_token");
    if (t) {
      authApi.getUser(t).then(u => { const a = createApi(t); setToken(t); setUser(u); setApi(a); loadAll(a); setCs(false); }).catch(() => { localStorage.removeItem("ate_token"); setCs(false); });
    } else { setCs(false); }
  }, []);

  if (cs) return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)' }}><div style={{ textAlign: 'center' }}><div style={{ fontSize: 48, marginBottom: 12 }}>🎓</div><div style={{ color: 'var(--muted)', fontSize: 14 }}>Chargement...</div></div></div>;
  if (!user) return <LoginScreen onLogin={handleLogin} />;

  const tabs = [
    { id: "dashboard", label: "Accueil", icon: "🏠", ml: "Accueil" },
    { id: "sessions", label: "Sessions", icon: "📅", ml: "Sessions", count: sessions.filter(s => s.statut !== "Archivée").length },
    { id: "candidats", label: "Candidats", icon: "👤", ml: "Candidats", count: candidats.length },
    { id: "notes", label: "Notes", icon: "📝", ml: "Notes" },
    { id: "resultats", label: "Résultats", icon: "📊", ml: "Résultats" },
    { id: "deliberations", label: "Délibérations", icon: "⚖️", ml: "Délib.", count: deliberations.filter(d => !d.pv_valide).length },
  ];

  return (
    <div>
      <header className="header">
        <div className="header-left"><div className="logo">🎓</div><div><div className="header-title">Examens ATE — DGAC</div><div className="header-sub">Agent Technique d'Exploitation</div></div></div>
        <div className="desktop-tabs">{tabs.map(t => <button key={t.id} className={"tab-btn " + (tab === t.id ? "active" : "")} onClick={() => setTab(t.id)}><span>{t.icon}</span> {t.label}{t.count > 0 && <span className="tab-count">{t.count}</span>}</button>)}</div>
        <div className="header-right"><div className="user-badge"><div className="user-dot" />{user.email}</div><button className="btn-outline btn-sm" onClick={() => loadAll()}>{loading ? "⏳" : "🔄"}</button><button className="btn-outline btn-outline-red btn-sm" onClick={handleLogout}>Déconnexion</button></div>
      </header>
      <nav className="mobile-nav">
        {tabs.map(t => <button key={t.id} className={"mobile-nav-btn " + (tab === t.id ? "active" : "")} onClick={() => setTab(t.id)}><span className="nav-icon">{t.icon}</span>{t.ml}{t.count > 0 && tab !== t.id && <span className="nav-badge">{t.count}</span>}</button>)}
        <button className="mobile-nav-btn" onClick={handleLogout}><span className="nav-icon">🚪</span>Sortir</button>
      </nav>
      {error && <div className="error-box" style={{ margin: '12px 16px 0' }}>{error}</div>}
      <main style={{ padding: '24px 28px', maxWidth: 1360, margin: '0 auto' }}>
        {tab === "dashboard" && <Dashboard sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} matieres={matieres} onNav={setTab} />}
        {tab === "sessions" && <SessionsView api={api} sessions={sessions} inscriptions={inscriptions} reload={() => loadAll()} />}
        {tab === "candidats" && <CandidatsView api={api} candidats={candidats} reload={() => loadAll()} />}
        {tab === "notes" && <NotesView api={api} sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} matieres={matieres} reload={() => loadAll()} />}
        {tab === "resultats" && <ResultatsView sessions={sessions} candidats={candidats} inscriptions={inscriptions} />}
        {tab === "deliberations" && <DeliberationsView api={api} sessions={sessions} inscriptions={inscriptions} candidats={candidats} deliberations={deliberations} reload={() => loadAll()} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
