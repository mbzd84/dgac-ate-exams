/* ===== NOTES ENTRY ===== */
function NotesEntry({ api, inscription, modules, existingNotes, onClose, onSaved }) {
  const [nv, setNv] = useState({});
  const [saving, setSaving] = useState(false);
  useEffect(() => {
    const o = {};
    modules.forEach(m => { const ex = existingNotes.find(n => n.matiere_uuid === m.id); o[m.id] = ex ? { note: ex.note !== null ? String(ex.note) : "", absent: ex.absent || false } : { note: "", absent: false }; });
    setNv(o);
  }, [modules, existingNotes]);
  const setNote = (mid, val) => setNv(p => ({ ...p, [mid]: { ...p[mid], note: val, absent: false } }));
  const toggleAbs = (mid) => setNv(p => ({ ...p, [mid]: { note: "", absent: !p[mid].absent } }));
  let tCN = 0, tC = 0;
  modules.forEach(m => { const v = nv[m.id]; if (v && !v.absent && v.note !== "") { const n = parseFloat(v.note); if (!isNaN(n)) { tCN += n * m.coefficient; tC += m.coefficient; } } });
  const moy = tC > 0 ? tCN / tC : null;
  const moyStr = moy !== null ? moy.toFixed(2) : "—";
  const passed = moy !== null && moy >= PASS_MARK;
  const handleSave = async () => {
    setSaving(true);
    try {
      for (const m of modules) { const v = nv[m.id] || {}; const nd = { inscription_uuid: inscription.id, matiere_uuid: m.id, note: v.absent ? null : (v.note !== "" ? parseFloat(v.note) : null), absent: v.absent || false }; const ex = existingNotes.find(x => x.matiere_uuid === m.id); if (ex) await api.update("notes", ex.id, nd); else await api.insert("notes", nd); }
      const res = moy !== null ? (moy >= PASS_MARK ? "Admis" : "Ajourne") : "En attente";
      await api.update("inscriptions", inscription.id, { moyenne_ponderee: moy, resultat: res });
      onSaved();
    } catch (e) { alert("Erreur: " + e.message); }
    setSaving(false);
  };
  return (<Modal onClose={onClose} title="Saisie des Notes" width={640}>
    <div className="moyenne-display" style={{ background: moy === null ? "rgba(36,99,235,0.04)" : passed ? "rgba(46,204,113,0.1)" : "rgba(200,16,46,0.1)", color: moy === null ? "var(--dim)" : passed ? "var(--green)" : "var(--red-tn)" }}>
      {moyStr}<span style={{ fontSize: 16, fontWeight: 400, marginLeft: 8 }}>/20 {moy !== null && (passed ? "— ADMIS" : "— AJOURNE")}</span>
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 60px 45px", gap: 8, padding: "6px 14px", fontSize: 10, color: "var(--accent)", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>
      <span>Module (coef)</span><span style={{ textAlign: "center" }}>Note</span><span style={{ textAlign: "center" }}>Abs.</span>
    </div>
    <div className="note-grid">
      {modules.sort((a, b) => a.ordre - b.ordre).map(m => { const v = nv[m.id] || {}; return (
        <div key={m.id} className="note-row">
          <div><div className="module-name">{m.nom}</div><div className="coef">x{m.coefficient}</div></div>
          <input className={"note-input" + (v.absent ? " absent" : "")} type="number" min="0" max="20" step="0.25" value={v.absent ? "" : (v.note || "")} disabled={v.absent} onChange={e => setNote(m.id, e.target.value)} placeholder="—" />
          <div style={{ textAlign: "center" }}><input type="checkbox" checked={v.absent || false} onChange={() => toggleAbs(m.id)} style={{ cursor: "pointer", width: 18, height: 18 }} /></div>
        </div>); })}
    </div>
    <button className="btn btn-accent btn-full" style={{ marginTop: 18 }} onClick={handleSave} disabled={saving}>{saving ? "Enregistrement..." : "Enregistrer les notes"}</button>
  </Modal>);
}

/* ===== IMPORT EXCEL MODAL ===== */
function ImportExcelModal({ api, sessions, onClose, onDone }) {
  const [org, setOrg] = useState(ORGANISMES[0]);
  const [sess, setSess] = useState(sessions.length > 0 ? sessions[0].id : "");
  const [file, setFile] = useState(null);
  const [importing, setImporting] = useState(false);
  const [result, setResult] = useState(null);

  const normalize = (s) => (s || "").toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
  const findCol = (headers, poss) => { for (const h of headers) { const hn = normalize(h); for (const p of poss) { if (hn.includes(normalize(p))) return h; } } return null; };

  const doImport = async () => {
    if (!file || !sess) { alert("Selectionnez un fichier et une session"); return; }
    setImporting(true);
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      if (rows.length === 0) { setResult({ error: "Fichier vide" }); setImporting(false); return; }
      const headers = Object.keys(rows[0]);
      const colMat = findCol(headers, ["matricule", "mat", "code"]);
      const colNom = findCol(headers, ["nom", "family"]);
      const colPrenom = findCol(headers, ["prenom", "first"]);
      const colNP = findCol(headers, ["noms et prenom", "nom et prenom", "nomsetprenom", "nom prenom", "nom complet"]);
      const colCIN = findCol(headers, ["cin", "cin_pass", "cinpass", "carte", "passeport"]);
      const colDate = findCol(headers, ["date", "naissance", "birth"]);
      const colNat = findCol(headers, ["nationalite", "nationalité", "nation"]);

      if (!colNom && !colPrenom && !colNP) { setResult({ error: "Colonnes nom/prenom non trouvees. Colonnes: " + headers.join(", ") }); setImporting(false); return; }

      let imported = 0, skipped = 0, errors = 0;
      /* FIX #6: Collect error details for better feedback */
      const errorDetails = [];
      for (const row of rows) {
        let nom = "", prenom = "";
        if (colNP) {
          const full = String(row[colNP] || "").trim();
          if (!full) { skipped++; continue; }
          const words = full.split(/\s+/);
          if (words.length <= 2) { nom = words[0] || ""; prenom = words[1] || ""; }
          else { const up = words.filter(w => w === w.toUpperCase() && w.length > 1); const ot = words.filter(w => w !== w.toUpperCase() || w.length <= 1); if (up.length > 0 && ot.length > 0) { nom = up.join(" "); prenom = ot.join(" "); } else { prenom = words[words.length - 1]; nom = words.slice(0, -1).join(" "); } }
        } else { nom = colNom ? String(row[colNom] || "").trim() : ""; prenom = colPrenom ? String(row[colPrenom] || "").trim() : ""; }
        if (!nom && !prenom) { skipped++; continue; }

        let dateN = null;
        if (colDate && row[colDate]) {
          const raw = row[colDate];
          if (typeof raw === "number") { const d = new Date((raw - 25569) * 86400 * 1000); dateN = d.toISOString().slice(0, 10); }
          else { const s = String(raw).trim(); const p = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/); if (p) dateN = p[3] + "-" + p[2].padStart(2, "0") + "-" + p[1].padStart(2, "0"); else if (s.match(/^\d{4}-\d{2}-\d{2}$/)) dateN = s; }
        }
        try {
          const mat = colMat ? String(row[colMat] || "").trim() : ("ATE-" + String(imported + 1).padStart(3, "0"));
          const cand = { matricule: mat, nom: nom, prenom: prenom, cin: colCIN ? String(row[colCIN] || "").trim() : "", date_naissance: dateN, organisme_formation: org, notes: colNat && row[colNat] ? "Nationalite: " + String(row[colNat]).trim() : "" };
          const created = await api.insert("candidats", cand);
          const candId = Array.isArray(created) ? created[0].id : created.id;
          await api.insert("inscriptions", { candidat_uuid: candId, session_uuid: sess, statut: "Inscrit" });
          imported++;
        } catch (err) {
          errors++;
          const rowLabel = (nom + " " + prenom).trim() || ("Ligne " + (imported + skipped + errors));
          errorDetails.push(rowLabel + ": " + err.message);
        }
      }
      setResult({ imported, skipped, errors, total: rows.length, errorDetails });
    } catch (err) { setResult({ error: "Erreur: " + err.message }); }
    setImporting(false);
  };

  return (<Modal onClose={onClose} title="Importer depuis Excel" width={520}>
    <div className="form-grid">
      <Field label="Organisme *"><Sel value={org} onChange={setOrg} options={ORGANISMES} /></Field>
      <Field label="Session *"><select className="select" value={sess} onChange={e => setSess(e.target.value)}><option value="">—</option>{sessions.map(s => <option key={s.id} value={s.id}>{s.intitule}</option>)}</select></Field>
      <Field label="Fichier Excel" span>
        <input type="file" accept=".xlsx,.xls,.csv" onChange={e => setFile(e.target.files[0])} style={{ padding: 12, background: "rgba(36,99,235,0.04)", border: "1px dashed var(--border-light)", borderRadius: 8, width: "100%", color: "var(--text)", cursor: "pointer" }} />
      </Field>
    </div>
    <div style={{ marginTop: 12, padding: 14, background: "rgba(36,99,235,0.04)", borderRadius: 10, border: "1px solid var(--border)", fontSize: 12, color: "var(--muted)" }}>
      <strong style={{ color: "var(--accent)" }}>Colonnes attendues:</strong> Matricule | NOMS ET PRENOM | DATE DE NAISSANCE | CIN_PASS | Nationalite
    </div>
    {result && (
      <div style={{ marginTop: 14, padding: 14, borderRadius: 10, background: result.error ? "rgba(200,16,46,0.08)" : "rgba(46,204,113,0.08)", border: result.error ? "1px solid rgba(200,16,46,0.2)" : "1px solid rgba(46,204,113,0.2)" }}>
        {result.error ? <div style={{ color: "var(--red-tn)", fontSize: 13 }}>{result.error}</div> : (
          <div style={{ fontSize: 13 }}>
            <span style={{ color: "var(--green)", fontWeight: 700 }}>{result.imported} candidats importes et inscrits</span>
            {result.skipped > 0 && <span style={{ color: "var(--orange)", marginLeft: 12 }}>{result.skipped} ignores</span>}
            {result.errors > 0 && <span style={{ color: "var(--red-tn)", marginLeft: 12 }}>{result.errors} erreurs</span>}
            {/* FIX #6: Show error details */}
            {result.errorDetails && result.errorDetails.length > 0 && (
              <div style={{ marginTop: 8, padding: 8, background: "rgba(200,16,46,0.06)", borderRadius: 6, fontSize: 11, color: "var(--red-tn)", maxHeight: 120, overflowY: "auto" }}>
                {result.errorDetails.slice(0, 10).map((e, i) => <div key={i}>• {e}</div>)}
                {result.errorDetails.length > 10 && <div style={{ fontStyle: "italic", marginTop: 4 }}>...et {result.errorDetails.length - 10} autres erreurs</div>}
              </div>
            )}
          </div>
        )}
      </div>
    )}
    {!result ? (
      <button className="btn btn-accent btn-full" style={{ marginTop: 18 }} onClick={doImport} disabled={importing || !file || !sess}>{importing ? "Import en cours..." : "Importer et inscrire"}</button>
    ) : (
      <button className="btn btn-outline btn-full" style={{ marginTop: 18 }} onClick={onDone}>Fermer</button>
    )}
  </Modal>);
}

/* ===== SESSIONS VIEW ===== */
function SessionsView({ api, sessions, inscriptions, candidats, notes, modules, planning, reload }) {
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [fil, setFil] = useState("Tous");
  const [detail, setDetail] = useState(null);
  const [planForm, setPlanForm] = useState(null);
  const [planEdit, setPlanEdit] = useState(null);
  const [selectedEpreuve, setSelectedEpreuve] = useState(null);
  const fl = sessions.filter(s => fil === "Tous" || s.statut === fil);
  const save = async (d) => { try { if (ed) await api.update("sessions", ed.id, d); else await api.insert("sessions", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("sessions", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };

  /* Status colors for session cards */
  const statusBg = {
    "Planifiee": { bg: "rgba(37,99,235,0.06)", border: "rgba(37,99,235,0.2)", accent: "var(--accent)" },
    "En cours": { bg: "rgba(234,88,12,0.06)", border: "rgba(234,88,12,0.2)", accent: "var(--orange)" },
    "Terminee": { bg: "rgba(8,145,178,0.06)", border: "rgba(8,145,178,0.2)", accent: "var(--cyan)" },
    "Deliberee": { bg: "rgba(22,163,74,0.06)", border: "rgba(22,163,74,0.2)", accent: "var(--green)" },
    "Archivee": { bg: "rgba(148,163,184,0.06)", border: "rgba(148,163,184,0.2)", accent: "var(--dim)" }
  };

  /* Planning CRUD */
  const savePlan = async (data) => {
    try {
      if (planEdit) await api.update("planning_epreuves", planEdit.id, data);
      else await api.insert("planning_epreuves", data);
      setPlanForm(null); setPlanEdit(null); reload();
    } catch (e) { alert("Erreur: " + e.message); }
  };
  const rmPlan = async (id) => {
    try { await api.remove("planning_epreuves", id); reload(); } catch (e) { alert(e.message); }
  };

  /* ===== SESSION DETAIL VIEW ===== */
  if (detail) {
    const s = detail;
    const sInscs = (inscriptions||[]).filter(i => i.session_uuid === s.id);
    const sAdmis = sInscs.filter(i => i.resultat === "Admis").length;
    const sAj = sInscs.filter(i => i.resultat === "Ajourne").length;
    const sTotal = sAdmis + sAj;
    const sTaux = sTotal > 0 ? Math.round((sAdmis / sTotal) * 100) : 0;
    const sBg = statusBg[s.statut] || statusBg["Planifiee"];

    /* Calendar: generate days — exact days between date_debut and date_fin */
    const sessionPlanning = (planning||[]).filter(p => p.session_uuid === s.id);
    let calDays = [];
    if (s.date_debut && s.date_fin) {
      const start = new Date(s.date_debut);
      const end = new Date(s.date_fin);
      const nbDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
      for (let i = 0; i < nbDays; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        const ds = d.toISOString().slice(0, 10);
        const dayPlan = sessionPlanning.filter(p => p.date_epreuve === ds);
        calDays.push({ date: ds, dayNum: i + 1, planning: dayPlan });
      }
    } else if (s.date_debut) {
      const start = new Date(s.date_debut);
      for (let i = 0; i < 5; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const ds = d.toISOString().slice(0, 10);
        calDays.push({ date: ds, dayNum: i + 1, planning: sessionPlanning.filter(p => p.date_epreuve === ds) });
      }
    }

    const dayNames = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

    /* Epreuve stats helper */
    const getModuleStats = (matiere_uuid) => {
      const mNotes = [];
      sInscs.forEach(i => { const n = (notes||[]).find(x => x.inscription_uuid === i.id && x.matiere_uuid === matiere_uuid); if (n && n.note !== null && !n.absent) mNotes.push(n.note); });
      const best = mNotes.length > 0 ? Math.max(...mNotes) : null;
      const sup13 = mNotes.filter(n => n >= PASS_MARK).length;
      const pct = mNotes.length > 0 ? Math.round((sup13 / mNotes.length) * 100) : 0;
      return { best, sup13, total: mNotes.length, pct };
    };

    return (
      <div>
        <div className="filters">
          <button className="btn-outline" onClick={() => setDetail(null)}>← Sessions</button>
          <div className="spacer" />
          <button className="btn-outline" onClick={() => { setEd(s); setSf(true); }}>Modifier</button>
        </div>

        {/* Session header with status color */}
        <div style={{ padding: 20, borderRadius: 14, background: sBg.bg, border: "1.5px solid " + sBg.border, marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ fontSize: 20, fontWeight: 800 }}>{s.intitule}</h2>
              <div className="hint" style={{ marginTop: 4 }}>{s.session_id} · {fmtDate(s.date_debut)} → {fmtDate(s.date_fin)} · {s.lieu || "—"}</div>
              <div className="hint">President: {s.president_jury || "—"}</div>
            </div>
            <Tag label={s.statut} />
          </div>
        </div>

        <div className="kpi-grid">
          <KPI label="Candidats" value={sInscs.length} color="var(--cyan)" />
          <KPI label="Admis" value={sAdmis} color="var(--green)" />
          <KPI label="Ajournes" value={sAj} color="var(--red-tn)" />
          <KPI label="Taux" value={sTaux + "%"} color={sTaux >= 50 ? "var(--green)" : "var(--red-tn)"} />
        </div>

        {/* ===== CALENDRIER DES EPREUVES (grille) ===== */}
        <div className="section-title">📅 Calendrier des epreuves — {calDays.length} jours</div>

        {calDays.length === 0 ? (
          <div className="card card-padded"><div className="hint">Definissez les dates de debut et fin de la session pour generer le calendrier.</div></div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 8, marginBottom: 24 }}>
            {calDays.map(day => {
              const dt = new Date(day.date);
              const dayName = dayNames[dt.getDay()];
              const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
              const hasEpreuves = day.planning.length > 0;
              return (
                <div key={day.date} style={{ borderRadius: 12, border: "1.5px solid " + (hasEpreuves ? "var(--accent)" : "var(--border)"), background: isWeekend ? "var(--bg)" : "#fff", opacity: isWeekend ? 0.45 : 1, overflow: "hidden", minHeight: 120 }}>
                  {/* Day header */}
                  <div style={{ padding: "8px 10px", background: hasEpreuves ? "rgba(37,99,235,0.08)" : "var(--bg)", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: 13, color: hasEpreuves ? "var(--accent)" : "var(--text)" }}>J{day.dayNum}</div>
                      <div style={{ fontSize: 10, color: "var(--muted)" }}>{dayName} {fmtDate(day.date)}</div>
                    </div>
                    {!isWeekend && <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, color: "var(--accent)", padding: 2 }} onClick={() => setPlanForm({ session_uuid: s.id, date_epreuve: day.date, matiere_uuid: "", heure_debut: "08:00", duree_minutes: 120 })} title="Ajouter">+</button>}
                  </div>
                  {/* Epreuves */}
                  <div style={{ padding: "6px 8px" }}>
                    {day.planning.map(p => {
                      const mod = (modules||[]).find(m => m.id === p.matiere_uuid);
                      return (
                        <div key={p.id} onClick={() => setSelectedEpreuve(p)} style={{ padding: "5px 6px", marginBottom: 4, borderRadius: 6, background: "rgba(37,99,235,0.06)", cursor: "pointer", fontSize: 10, transition: "var(--tr)" }}>
                          <div style={{ fontWeight: 700, fontSize: 11, color: "var(--text)", lineHeight: 1.3 }}>{mod ? mod.nom : "?"}</div>
                          <div style={{ color: "var(--muted)", marginTop: 2 }}>{p.heure_debut ? p.heure_debut.slice(0, 5) : ""} · {p.duree_minutes}min</div>
                        </div>
                      );
                    })}
                    {day.planning.length === 0 && !isWeekend && (
                      <div style={{ fontSize: 10, color: "var(--dim)", fontStyle: "italic", padding: "8px 0" }}>—</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Epreuve detail modal */}
        {selectedEpreuve && (() => {
          const ep = selectedEpreuve;
          const mod = (modules||[]).find(m => m.id === ep.matiere_uuid);
          const stats = getModuleStats(ep.matiere_uuid);
          return (
            <Modal onClose={() => setSelectedEpreuve(null)} title={mod ? mod.nom : "Epreuve"} width={480}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
                <div style={{ textAlign: "center", padding: 14, borderRadius: 10, background: "rgba(37,99,235,0.06)" }}>
                  <div style={{ fontSize: 9, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 1 }}>Meilleure note</div>
                  <div className="mono" style={{ fontSize: 22, fontWeight: 800, color: stats.best !== null && stats.best >= PASS_MARK ? "var(--green)" : "var(--orange)", marginTop: 4 }}>{stats.best !== null ? stats.best.toFixed(2) : "—"}</div>
                  <div style={{ fontSize: 10, color: "var(--dim)" }}>/20</div>
                </div>
                <div style={{ textAlign: "center", padding: 14, borderRadius: 10, background: "rgba(22,163,74,0.06)" }}>
                  <div style={{ fontSize: 9, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 1 }}>≥ 13/20</div>
                  <div className="mono" style={{ fontSize: 22, fontWeight: 800, color: stats.pct >= 50 ? "var(--green)" : "var(--red-tn)", marginTop: 4 }}>{stats.pct}%</div>
                  <div style={{ fontSize: 10, color: "var(--dim)" }}>{stats.sup13}/{stats.total} candidats</div>
                </div>
                <div style={{ textAlign: "center", padding: 14, borderRadius: 10, background: "rgba(8,145,178,0.06)" }}>
                  <div style={{ fontSize: 9, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 1 }}>Coefficient</div>
                  <div className="mono" style={{ fontSize: 22, fontWeight: 800, color: "var(--cyan)", marginTop: 4 }}>{mod ? mod.coefficient : "—"}</div>
                  <div style={{ fontSize: 10, color: "var(--dim)" }}>x</div>
                </div>
              </div>
              <div style={{ padding: 14, borderRadius: 10, background: "var(--bg)", border: "1px solid var(--border)", marginBottom: 14 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 12 }}>
                  <div><span className="hint">Date:</span> <strong>{fmtDate(ep.date_epreuve)}</strong></div>
                  <div><span className="hint">Heure:</span> <strong>{ep.heure_debut ? ep.heure_debut.slice(0, 5) : "—"}</strong></div>
                  <div><span className="hint">Duree:</span> <strong>{ep.duree_minutes} min</strong></div>
                  <div><span className="hint">Salle:</span> <strong>{ep.salle || "—"}</strong></div>
                </div>
                {ep.notes && <div style={{ marginTop: 8, fontSize: 12 }}><span className="hint">Notes:</span> {ep.notes}</div>}
              </div>
              {/* PDF placeholder */}
              <div style={{ padding: 16, borderRadius: 10, border: "1.5px dashed var(--border-light)", textAlign: "center", color: "var(--dim)", fontSize: 12 }}>
                📄 Sujet d'examen — Upload bientot disponible
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
                <button className="btn-outline" style={{ flex: 1 }} onClick={() => { setPlanEdit(ep); setPlanForm({ ...ep }); setSelectedEpreuve(null); }}>✏️ Modifier</button>
                <button className="btn-outline btn-outline-red" style={{ flex: 1 }} onClick={() => { if (confirm("Supprimer cette epreuve ?")) { rmPlan(ep.id); setSelectedEpreuve(null); } }}>🗑 Supprimer</button>
              </div>
            </Modal>
          );
        })()}

        {/* Candidats inscrits */}
        <div className="section-title">Candidats inscrits</div>
        <div className="table-container">
          <div className="table-head" style={{ gridTemplateColumns: "30px 80px 1fr 70px 70px 60px" }}><div>#</div><div>Matricule</div><div>Candidat</div><div>Centre</div><div>Moyenne</div><div>Resultat</div></div>
          {sInscs.sort((a, b) => (b.moyenne_ponderee || 0) - (a.moyenne_ponderee || 0)).map((ins, idx) => { const c = (candidats||[]).find(x => x.id === ins.candidat_uuid); return (
            <div key={ins.id} className="table-row" style={{ gridTemplateColumns: "30px 80px 1fr 70px 70px 60px", cursor: "default" }}>
              <span className="mono" style={{ fontSize: 11, color: "var(--dim)" }}>{idx + 1}</span>
              <span className="mono" style={{ fontSize: 10, color: "var(--dim)" }}>{c ? c.matricule : "—"}</span>
              <span style={{ fontSize: 12, fontWeight: 600 }}>{c ? c.prenom + " " + c.nom : "—"}</span>
              <span>{c ? <Badge color={ORGANISMES_DATA[c.organisme_formation]?.color}>{c.organisme_formation}</Badge> : "—"}</span>
              <span className="mono" style={{ fontSize: 12, fontWeight: 700, color: moyColor(ins.moyenne_ponderee) }}>{ins.moyenne_ponderee !== null ? Number(ins.moyenne_ponderee).toFixed(2) : "—"}</span>
              <ResultBadge r={ins.resultat} />
            </div>); })}
          {sInscs.length === 0 && <Empty text="Aucun candidat" />}
        </div>

        {sf && <SessionForm session={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}

        {/* Planning form modal */}
        {planForm && (
          <Modal onClose={() => { setPlanForm(null); setPlanEdit(null); }} title={planEdit ? "Modifier epreuve" : "Programmer une epreuve"} width={480}>
            <div className="form-grid">
              <Field label="Module *">
                <select className="select" value={planForm.matiere_uuid} onChange={e => setPlanForm({ ...planForm, matiere_uuid: e.target.value })}>
                  <option value="">— Choisir un module —</option>
                  {(modules||[]).sort((a, b) => a.ordre - b.ordre).map(m => <option key={m.id} value={m.id}>{m.nom}</option>)}
                </select>
              </Field>
              <Field label="Date"><input type="date" className="input" value={planForm.date_epreuve} onChange={e => setPlanForm({ ...planForm, date_epreuve: e.target.value })} /></Field>
              <Field label="Heure debut"><input type="time" className="input" value={planForm.heure_debut || "08:00"} onChange={e => setPlanForm({ ...planForm, heure_debut: e.target.value })} /></Field>
              <Field label="Duree (min)"><input type="number" className="input" value={planForm.duree_minutes || 120} onChange={e => setPlanForm({ ...planForm, duree_minutes: parseInt(e.target.value) || 120 })} /></Field>
              <Field label="Salle"><input className="input" value={planForm.salle || ""} onChange={e => setPlanForm({ ...planForm, salle: e.target.value })} placeholder="Optionnel" /></Field>
              <Field label="Notes"><input className="input" value={planForm.notes || ""} onChange={e => setPlanForm({ ...planForm, notes: e.target.value })} placeholder="Optionnel" /></Field>
            </div>
            <button className="btn btn-accent btn-full" style={{ marginTop: 16 }} onClick={() => {
              if (!planForm.matiere_uuid) { alert("Choisissez un module"); return; }
              const data = { session_uuid: planForm.session_uuid || detail.id, matiere_uuid: planForm.matiere_uuid, date_epreuve: planForm.date_epreuve, heure_debut: planForm.heure_debut, duree_minutes: planForm.duree_minutes, salle: planForm.salle || null, notes: planForm.notes || null };
              savePlan(data);
            }}>{planEdit ? "Enregistrer" : "Programmer"}</button>
          </Modal>
        )}
      </div>
    );
  }

  /* ===== SESSIONS LIST (colored by status) ===== */
  return (
    <div>
      <div className="filters">
        <div className="filter-group">{["Tous", ...STATUTS_SESSION].map(s => <button key={s} className={"filter-btn " + (fil === s ? "active" : "")} onClick={() => setFil(s)}>{s}</button>)}</div>
        <div className="spacer" /><button className="btn btn-accent" onClick={() => { setEd(null); setSf(true); }}>+ Session</button>
      </div>

      {/* Desktop: colored session cards */}
      <div className="desktop-only" style={{ display: "grid", gap: 10 }}>
        {fl.map(s => {
          const nb = inscriptions.filter(i => i.session_uuid === s.id).length;
          const sb = statusBg[s.statut] || statusBg["Planifiee"];
          return (
            <div key={s.id} style={{ padding: "16px 20px", borderRadius: 14, background: sb.bg, border: "1.5px solid " + sb.border, cursor: "pointer", transition: "var(--tr)", display: "grid", gridTemplateColumns: "70px 1fr 100px 90px 60px 36px", alignItems: "center", gap: 10 }} onClick={() => setDetail(s)}>
              <span className="mono" style={{ fontSize: 10, color: "var(--dim)" }}>{s.session_id}</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700 }}>{s.intitule}</div>
                <div className="hint">{s.lieu || "—"} — {s.president_jury || "—"}</div>
              </div>
              <span className="hint">{fmtDate(s.date_debut)}</span>
              <Tag label={s.statut} />
              <Badge color="var(--cyan)">{nb}</Badge>
              <button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(s); }}>🗑</button>
            </div>
          );
        })}
        {fl.length === 0 && <Empty text="Aucune session" />}
      </div>

      {/* Mobile: colored cards */}
      <div className="mobile-only">
        {fl.map(s => {
          const nb = inscriptions.filter(i => i.session_uuid === s.id).length;
          const sb = statusBg[s.statut] || statusBg["Planifiee"];
          return (
            <div key={s.id} style={{ padding: 16, borderRadius: 14, background: sb.bg, border: "1.5px solid " + sb.border, marginBottom: 10, cursor: "pointer" }} onClick={() => setDetail(s)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{s.intitule}</div>
                  <div className="hint" style={{ marginTop: 2 }}>{s.session_id}</div>
                </div>
                <button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(s); }}>🗑</button>
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}><Tag label={s.statut} /><Badge color="var(--cyan)">{nb}</Badge></div>
              <div className="hint" style={{ marginTop: 8 }}>{s.lieu || "—"} — {fmtDate(s.date_debut)}</div>
            </div>
          );
        })}
        {fl.length === 0 && <Empty text="Aucune session" />}
      </div>

      <FAB onClick={() => { setEd(null); setSf(true); }} />
      {sf && <SessionForm session={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item={del.session_id} onConfirm={rm} onCancel={() => setDel(null)} />}
    </div>
  );
}

/* ===== BULK INSCRIPTION MODAL ===== */
function BulkInscriptionModal({ api, selectedCandidats, sessions, inscriptions, onClose, onDone }) {
  const [targetSession, setTargetSession] = useState("");
  const [processing, setProcessing] = useState(false);
  const [result, setResult] = useState(null);

  // Pre-check: which candidates are already inscribed to the target session
  const alreadyInscribed = useMemo(() => {
    if (!targetSession) return new Set();
    const set = new Set();
    (inscriptions || []).forEach(i => {
      if (i.session_uuid === targetSession) set.add(i.candidat_uuid);
    });
    return set;
  }, [targetSession, inscriptions]);

  const toInscribe = selectedCandidats.filter(c => !alreadyInscribed.has(c.id));
  const alreadyCount = selectedCandidats.length - toInscribe.length;

  const doInscribe = async () => {
    if (!targetSession) { alert("Selectionnez une session cible"); return; }
    if (toInscribe.length === 0) { alert("Tous les candidats selectionnes sont deja inscrits a cette session"); return; }
    setProcessing(true);
    let ok = 0, errors = 0;
    const errorDetails = [];
    for (const c of toInscribe) {
      try {
        await api.insert("inscriptions", { candidat_uuid: c.id, session_uuid: targetSession, statut: "Inscrit" });
        ok++;
      } catch (err) {
        errors++;
        errorDetails.push((c.prenom + " " + c.nom) + ": " + err.message);
      }
    }
    setResult({ ok, errors, errorDetails, alreadySkipped: alreadyCount });
    setProcessing(false);
  };

  const sess = sessions.find(s => s.id === targetSession);

  return (
    <Modal onClose={onClose} title="Affecter a une session" width={560}>
      <div style={{ marginBottom: 18, padding: 16, background: "rgba(36,99,235,0.04)", borderRadius: 12, border: "1px solid var(--border)" }}>
        <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 4 }}>Candidats selectionnes</div>
        <div style={{ fontSize: 28, fontWeight: 800, color: "var(--accent)", fontFamily: "'Playfair Display',serif" }}>{selectedCandidats.length}</div>
        <div style={{ marginTop: 8, maxHeight: 120, overflowY: "auto", fontSize: 12, color: "var(--dim)" }}>
          {selectedCandidats.map((c, i) => (
            <span key={c.id}>{c.prenom} {c.nom}{i < selectedCandidats.length - 1 ? " · " : ""}</span>
          ))}
        </div>
      </div>

      {!result ? (
        <div>
          <Field label="Session cible *">
            <select className="select" value={targetSession} onChange={e => setTargetSession(e.target.value)}>
              <option value="">— Choisir une session —</option>
              {sessions
                .filter(s => s.statut !== "Archivee")
                .sort((a,b) => String(b.date_debut||"").localeCompare(String(a.date_debut||"")))
                .map(s => <option key={s.id} value={s.id}>{s.intitule} ({s.session_id})</option>)
              }
            </select>
          </Field>

          {targetSession && (
            <div style={{ marginTop: 14, padding: 14, borderRadius: 10, background: alreadyCount > 0 ? "rgba(245,158,11,0.08)" : "rgba(34,197,94,0.08)", border: alreadyCount > 0 ? "1px solid rgba(245,158,11,0.2)" : "1px solid rgba(34,197,94,0.2)", fontSize: 13 }}>
              {toInscribe.length > 0 && (
                <div style={{ color: "var(--green)", fontWeight: 700 }}>
                  ✓ {toInscribe.length} candidat{toInscribe.length > 1 ? "s" : ""} seront inscrits a "{sess?.intitule}"
                </div>
              )}
              {alreadyCount > 0 && (
                <div style={{ color: "var(--orange)", marginTop: 4 }}>
                  ⚠ {alreadyCount} candidat{alreadyCount > 1 ? "s" : ""} deja inscrit{alreadyCount > 1 ? "s" : ""} a cette session (seront ignores)
                </div>
              )}
              {toInscribe.length === 0 && (
                <div style={{ color: "var(--orange)", fontWeight: 700 }}>
                  Tous les candidats selectionnes sont deja inscrits a cette session.
                </div>
              )}
            </div>
          )}

          <button
            className="btn btn-accent btn-full"
            style={{ marginTop: 18 }}
            onClick={doInscribe}
            disabled={processing || !targetSession || toInscribe.length === 0}
          >
            {processing ? "Inscription en cours..." : "Inscrire " + toInscribe.length + " candidat" + (toInscribe.length > 1 ? "s" : "")}
          </button>
        </div>
      ) : (
        <div>
          <div style={{ padding: 16, borderRadius: 10, background: result.errors > 0 ? "rgba(200,16,46,0.08)" : "rgba(34,197,94,0.08)", border: result.errors > 0 ? "1px solid rgba(200,16,46,0.2)" : "1px solid rgba(34,197,94,0.2)", fontSize: 13 }}>
            <div style={{ color: "var(--green)", fontWeight: 700, fontSize: 16 }}>
              ✓ {result.ok} candidat{result.ok > 1 ? "s" : ""} inscrit{result.ok > 1 ? "s" : ""} avec succes
            </div>
            {result.alreadySkipped > 0 && (
              <div style={{ color: "var(--orange)", marginTop: 6 }}>{result.alreadySkipped} ignore{result.alreadySkipped > 1 ? "s" : ""} (deja inscrits)</div>
            )}
            {result.errors > 0 && (
              <div style={{ marginTop: 8 }}>
                <div style={{ color: "var(--red-tn)" }}>{result.errors} erreur{result.errors > 1 ? "s" : ""}</div>
                <div style={{ marginTop: 4, fontSize: 11, color: "var(--red-tn)", maxHeight: 80, overflowY: "auto" }}>
                  {result.errorDetails.map((e, i) => <div key={i}>• {e}</div>)}
                </div>
              </div>
            )}
          </div>
          <button className="btn btn-accent btn-full" style={{ marginTop: 18 }} onClick={onDone}>Fermer et actualiser</button>
        </div>
      )}
    </Modal>
  );
}

/* ===== CANDIDATS VIEW ===== */
function CandidatsView({ api, candidats, sessions, inscriptions, reload }) {
  const [step, setStep] = useState("org");
  const [selectedOrg, setSelectedOrg] = useState("");
  const [selectedSessionId, setSelectedSessionId] = useState("");
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [importModal, setImportModal] = useState(false);
  const [se, setSe] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [bulkModal, setBulkModal] = useState(false);

  const candById = useMemo(() => { const m = new Map(); (candidats||[]).forEach(c => m.set(c.id, c)); return m; }, [candidats]);
  const goOrg = () => { setStep("org"); setSelectedOrg(""); setSelectedSessionId(""); setSe(""); setSelected(new Set()); };
  const goSessions = () => { setStep("sessions"); setSelectedSessionId(""); setSe(""); setSelected(new Set()); };

  const sessionsForOrg = useMemo(() => {
    if (!selectedOrg) return [];
    const sset = new Set();
    (inscriptions||[]).forEach(i => { const c = candById.get(i.candidat_uuid); if (c && (c.organisme_formation||"") === selectedOrg) sset.add(i.session_uuid); });
    return (sessions||[]).filter(s => sset.has(s.id)).sort((a, b) => String(b.date_debut||"").localeCompare(String(a.date_debut||"")));
  }, [selectedOrg, inscriptions, sessions, candById]);

  const candidatsForSession = useMemo(() => {
    if (!selectedOrg || !selectedSessionId) return [];
    let rows = [];
    (inscriptions||[]).filter(i => i.session_uuid === selectedSessionId).forEach(i => {
      const c = candById.get(i.candidat_uuid);
      if (c && (c.organisme_formation||"") === selectedOrg) rows.push({ candidat: c, inscription: i });
    });
    const q = (se||"").trim().toLowerCase();
    if (q) rows = rows.filter(({ candidat: c }) => (c.nom||"").toLowerCase().includes(q) || (c.prenom||"").toLowerCase().includes(q) || (c.matricule||"").toLowerCase().includes(q) || (c.cin||"").toLowerCase().includes(q));
    rows.sort((a, b) => `${a.candidat.nom} ${a.candidat.prenom}`.toLowerCase().localeCompare(`${b.candidat.nom} ${b.candidat.prenom}`.toLowerCase()));
    return rows;
  }, [selectedOrg, selectedSessionId, inscriptions, candById, se]);

  const save = async (d) => { try { if (ed) await api.update("candidats", ed.id, d); else await api.insert("candidats", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("candidats", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };
  const toggleSelect = id => setSelected(p => { const n = new Set(p); if (n.has(id)) n.delete(id); else n.add(id); return n; });
  const toggleSelectAll = () => { if (selected.size === candidatsForSession.length) setSelected(new Set()); else setSelected(new Set(candidatsForSession.map(r => r.candidat.id))); };
  const someSelected = selected.size > 0;
  const selectedObjs = candidatsForSession.filter(r => selected.has(r.candidat.id)).map(r => r.candidat);

  if (step === "org") {
    return (<div>
      <div className="filters"><div className="hint">Choisis un centre de formation</div><div className="spacer" /><button className="btn-outline" onClick={() => setImportModal(true)}>Importer Excel</button><button className="btn btn-accent" onClick={() => { setEd(null); setSf(true); }}>+ Candidat</button></div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 14 }}>
        {ORGANISMES.map(org => {
          const nb = (candidats||[]).filter(c => (c.organisme_formation||"") === org).length;
          const nbI = (inscriptions||[]).filter(i => { const c = candById.get(i.candidat_uuid); return c && (c.organisme_formation||"") === org; }).length;
          return (<div key={org} className="centre-card" onClick={() => { setSelectedOrg(org); setStep("sessions"); }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}><OrgIcon org={org} size={48} /><div style={{ flex: 1 }}><div style={{ fontWeight: 800, fontSize: 18 }}>{org}</div><div className="hint">{nb} candidats · {nbI} inscriptions</div></div><div style={{ fontSize: 24, color: "var(--dim)" }}>→</div></div>
          </div>);
        })}
      </div>
      {sf && <CandidatForm candidat={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item={del.prenom + " " + del.nom} onConfirm={rm} onCancel={() => setDel(null)} />}
      {importModal && <ImportExcelModal api={api} sessions={sessions} onClose={() => setImportModal(false)} onDone={() => { setImportModal(false); reload(); }} />}
    </div>);
  }

  if (step === "sessions") {
    return (<div>
      <div className="filters"><button className="btn-outline" onClick={goOrg}>← Centres</button><div style={{ display: "flex", alignItems: "center", gap: 8 }}><OrgIcon org={selectedOrg} size={28} /><strong>{selectedOrg}</strong></div><div className="spacer" /></div>
      {sessionsForOrg.length === 0 ? (<div className="card card-padded"><Empty text={"Aucune session pour " + selectedOrg} /></div>) : (
        <div style={{ display: "grid", gap: 10 }}>
          {sessionsForOrg.map(s => {
            const nb = (inscriptions||[]).filter(i => { if (i.session_uuid !== s.id) return false; const c = candById.get(i.candidat_uuid); return c && (c.organisme_formation||"") === selectedOrg; }).length;
            return (<div key={s.id} className="card" style={{ padding: "16px 20px", cursor: "pointer" }} onClick={() => { setSelectedSessionId(s.id); setStep("candidats"); setSelected(new Set()); }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><div style={{ fontWeight: 700, fontSize: 14 }}>{s.intitule}</div><div className="hint">{s.session_id} · {fmtDate(s.date_debut)} → {fmtDate(s.date_fin)} · {s.lieu || "—"}</div></div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Tag label={s.statut} /><Badge color={ORGANISMES_DATA[selectedOrg]?.color}>{nb} cand.</Badge><span style={{ color: "var(--dim)" }}>→</span></div>
              </div>
            </div>);
          })}
        </div>
      )}
    </div>);
  }

  const session = (sessions||[]).find(s => s.id === selectedSessionId);
  return (<div>
    <div className="filters">
      <button className="btn-outline" onClick={goSessions}>← Sessions {selectedOrg}</button>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}><OrgIcon org={selectedOrg} size={24} /><div><strong>{selectedOrg}</strong><span className="hint" style={{ marginLeft: 8 }}>{session?.intitule || ""}</span></div></div>
      <div className="spacer" /><input className="input" style={{ maxWidth: 240 }} placeholder="Rechercher…" value={se} onChange={e => setSe(e.target.value)} />
    </div>
    {someSelected && (<div style={{ marginBottom: 12, padding: "10px 16px", borderRadius: 12, background: "rgba(37,99,235,0.06)", border: "1px solid rgba(37,99,235,0.2)", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
      <strong style={{ color: "var(--accent)", fontSize: 13 }}>{selected.size} selectionne{selected.size > 1 ? "s" : ""}</strong><div className="spacer" />
      <button className="btn btn-accent btn-sm" onClick={() => setBulkModal(true)}>Affecter a une session</button>
      <button className="btn-outline btn-sm" onClick={() => setSelected(new Set())}>Deselectionner</button>
    </div>)}
    <div className="hint" style={{ marginBottom: 10 }}>{candidatsForSession.length} candidat{candidatsForSession.length !== 1 ? "s" : ""}</div>
    <div className="table-container desktop-only">
      <div className="table-head" style={{ gridTemplateColumns: "36px 100px 1fr 110px 80px 80px" }}>
        <div style={{ textAlign: "center" }}><input type="checkbox" checked={candidatsForSession.length > 0 && selected.size === candidatsForSession.length} onChange={toggleSelectAll} style={{ width: 15, height: 15, cursor: "pointer", accentColor: "var(--accent)" }} /></div>
        <div>Matricule</div><div>Nom & Prenom</div><div>CIN</div><div>Moyenne</div><div>Action</div>
      </div>
      {candidatsForSession.length === 0 ? <Empty text="Aucun candidat" /> : candidatsForSession.map(({ candidat: c, inscription: ins }) => {
        const isChk = selected.has(c.id);
        return (<div key={c.id + ins.id} className="table-row" style={{ gridTemplateColumns: "36px 100px 1fr 110px 80px 80px", background: isChk ? "rgba(37,99,235,0.04)" : undefined }} onClick={() => toggleSelect(c.id)}>
          <div style={{ textAlign: "center" }} onClick={e => e.stopPropagation()}><input type="checkbox" checked={isChk} onChange={() => toggleSelect(c.id)} style={{ width: 15, height: 15, cursor: "pointer", accentColor: "var(--accent)" }} /></div>
          <div className="mono" style={{ fontWeight: 700, fontSize: 10 }}>{c.matricule || "—"}</div>
          <div><div style={{ fontWeight: 700, fontSize: 12 }}>{c.prenom} {c.nom}</div><div className="hint">{c.email || c.telephone || "—"}</div></div>
          <div className="mono" style={{ color: "var(--muted)", fontSize: 10 }}>{c.cin || "—"}</div>
          <div className="mono" style={{ fontWeight: 800, fontSize: 12, color: (ins?.moyenne_ponderee ?? null) === null ? "var(--dim)" : (Number(ins.moyenne_ponderee) >= PASS_MARK ? "var(--green)" : "var(--red-tn)") }}>{(ins?.moyenne_ponderee ?? null) === null ? "—" : Number(ins.moyenne_ponderee).toFixed(2)}</div>
          <div style={{ display: "flex", gap: 4 }} onClick={e => e.stopPropagation()}><button className="btn-outline btn-sm" onClick={() => { setEd(c); setSf(true); }}>✏️</button><button className="btn-outline btn-sm" onClick={() => setDel(c)}>🗑</button></div>
        </div>);
      })}
    </div>
    <div className="mobile-only">{candidatsForSession.length === 0 ? <Empty text="Aucun candidat" /> : candidatsForSession.map(({ candidat: c, inscription: ins }) => {
      const isChk = selected.has(c.id);
      return (<div key={c.id + ins.id} className="mobile-card" style={{ border: isChk ? "2px solid var(--accent)" : undefined }} onClick={() => toggleSelect(c.id)}>
        <div className="mobile-card-header"><div style={{ display: "flex", alignItems: "center", gap: 8 }}><input type="checkbox" checked={isChk} onChange={() => toggleSelect(c.id)} onClick={e => e.stopPropagation()} style={{ width: 16, height: 16, accentColor: "var(--accent)", flexShrink: 0 }} /><div><div className="mobile-card-title">{c.prenom} {c.nom}</div><div className="mobile-card-id">{c.matricule} · {c.cin || "—"}</div></div></div><button className="btn-outline btn-sm" onClick={e => { e.stopPropagation(); setEd(c); setSf(true); }}>✏️</button></div>
        <div className="mobile-card-footer"><span className="mono" style={{ fontSize: 14, fontWeight: 700, color: (ins?.moyenne_ponderee ?? null) === null ? "var(--dim)" : (Number(ins.moyenne_ponderee) >= PASS_MARK ? "var(--green)" : "var(--red-tn)") }}>{(ins?.moyenne_ponderee ?? null) === null ? "—" : Number(ins.moyenne_ponderee).toFixed(2) + "/20"}</span><button className="btn-icon" onClick={e => { e.stopPropagation(); setDel(c); }}>🗑</button></div>
      </div>);
    })}</div>
    <FAB onClick={() => { setEd(null); setSf(true); }} />
    {sf && <CandidatForm candidat={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
    {del && <ConfirmDelete item={del.prenom + " " + del.nom} onConfirm={rm} onCancel={() => setDel(null)} />}
    {importModal && <ImportExcelModal api={api} sessions={sessions} onClose={() => setImportModal(false)} onDone={() => { setImportModal(false); reload(); }} />}
    {bulkModal && <BulkInscriptionModal api={api} selectedCandidats={selectedObjs} sessions={sessions} inscriptions={inscriptions} onClose={() => setBulkModal(false)} onDone={() => { setBulkModal(false); setSelected(new Set()); reload(); }} />}
  </div>);
}

            </div>); })}
          {sInscr.length === 0 && <Empty text="Aucun candidat inscrit" />}
        </div>
      </div>)}
      <FAB onClick={() => { setEd(null); setSf(true); }} color="linear-gradient(135deg,var(--orange),#e67e22)" />
      {sf && <InscriptionForm sessions={sessions} candidats={candidats} inscription={ed} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item="cette inscription" onConfirm={rm} onCancel={() => setDel(null)} />}
      {nm && <NotesEntry api={api} inscription={nm} modules={modules} existingNotes={notes.filter(n => n.inscription_uuid === nm.id)} onClose={() => setNm(null)} onSaved={() => { setNm(null); reload(); }} />}
    </div>
  );
}

/* ===== DELIBERATIONS VIEW ===== */
function DeliberationsView({ api, sessions, candidats, inscriptions, deliberations, reload }) {
  const [sf, setSf] = useState(false);
  const [ed, setEd] = useState(null);
  const [del, setDel] = useState(null);
  const [rachatModal, setRachatModal] = useState(null);
  const [rachatMotif, setRachatMotif] = useState("");
  const save = async (d) => { try { if (ed) await api.update("deliberations", ed.id, d); else await api.insert("deliberations", d); setSf(false); setEd(null); reload(); } catch (e) { alert(e.message); } };
  const rm = async () => { if (del) { try { await api.remove("deliberations", del.id); } catch (e) { alert(e.message); } setDel(null); reload(); } };

  /* Rachat (#15) */
  const doRachat = async () => {
    if (!rachatModal) return;
    try {
      await api.update("inscriptions", rachatModal.id, { resultat: "Admis", observations: (rachatModal.observations || "") + "\n[RACHAT] " + rachatMotif });
      setRachatModal(null); setRachatMotif(""); reload();
    } catch (e) { alert(e.message); }
  };

  return (
    <div>
      <div className="filters"><div className="spacer" /><button className="btn btn-purple" onClick={() => { setEd(null); setSf(true); }}>+ Deliberation</button></div>
      {deliberations.map(d => {
        const s = sessions.find(x => x.id === d.session_uuid);
        const iS = inscriptions.filter(i => i.session_uuid === d.session_uuid);
        const ad = iS.filter(i => i.resultat === "Admis").length;
        /* Cas limites (#14): moyenne entre 12 et 13 */
        const casLimites = iS.filter(i => i.moyenne_ponderee !== null && Number(i.moyenne_ponderee) >= 12 && Number(i.moyenne_ponderee) < 13);
        return (
          <div key={d.id} className="card card-padded" style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 800, fontSize: 15 }}>{s ? s.intitule : "—"}</div>
                <div className="hint">{d.date_deliberation} · {d.pv_valide ? "✅ PV valide" : "⏳ PV en attente"}</div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button className="btn-outline btn-sm" onClick={() => { setEd(d); setSf(true); }}>Modifier</button>
                <button className="btn-icon" onClick={() => setDel(d)}>🗑</button>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
              <Badge color="var(--green)">{ad} admis</Badge>
              <Badge color="var(--red-tn)">{iS.length - ad} aj.</Badge>
              <Badge color="var(--cyan)">{iS.length} total</Badge>
              {casLimites.length > 0 && <Badge color="var(--orange)">⚠ {casLimites.length} cas limite{casLimites.length > 1 ? "s" : ""}</Badge>}
            </div>
            {/* Cas limites detail */}
            {casLimites.length > 0 && (
              <div style={{ marginTop: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--orange)", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Cas limites (12-13)</div>
                {casLimites.map(i => {
                  const c = (candidats||[]).find(x => x.id === i.candidat_uuid);
                  return (
                    <div key={i.id} className="cas-limite" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", borderRadius: 8, marginBottom: 4, border: "1px solid var(--border)", fontSize: 12 }}>
                      <div><span style={{ fontWeight: 700 }}>{c ? c.prenom + " " + c.nom : "—"}</span><span className="hint" style={{ marginLeft: 6 }}>{c ? c.organisme_formation : ""}</span></div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span className="mono" style={{ fontWeight: 700, color: "var(--orange)" }}>{Number(i.moyenne_ponderee).toFixed(2)}</span>
                        <ResultBadge r={i.resultat} />
                        {i.resultat === "Ajourne" && <button className="btn btn-green btn-sm" onClick={() => { setRachatModal(i); setRachatMotif(""); }}>Rachat</button>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
      {deliberations.length === 0 && <Empty text="Aucune deliberation" />}
      <FAB onClick={() => { setEd(null); setSf(true); }} color="var(--purple)" />
      {sf && <DeliberationForm delib={ed} sessions={sessions} onClose={() => { setSf(false); setEd(null); }} onSave={save} />}
      {del && <ConfirmDelete item="cette deliberation" onConfirm={rm} onCancel={() => setDel(null)} />}
      {rachatModal && (
        <Modal onClose={() => setRachatModal(null)} title="Rachat — Decision du jury" width={460}>
          {(() => { const c = (candidats||[]).find(x => x.id === rachatModal.candidat_uuid); return (
            <div>
              <div style={{ marginBottom: 14, fontSize: 13 }}><strong>{c ? c.prenom + " " + c.nom : "—"}</strong> — Moyenne: <strong className="mono" style={{ color: "var(--orange)" }}>{Number(rachatModal.moyenne_ponderee).toFixed(2)}/20</strong></div>
              <Field label="Motif du rachat *" span><textarea className="textarea" value={rachatMotif} onChange={e => setRachatMotif(e.target.value)} placeholder="Decision du jury: proximite du seuil, progression, circonstances..." /></Field>
              <button className="btn btn-green btn-full" style={{ marginTop: 14 }} onClick={doRachat} disabled={!rachatMotif.trim()}>Confirmer le rachat → Admis</button>
            </div>
          ); })()}
        </Modal>
      )}
    </div>
  );
}

/* ===== PDF EXPORT ===== */
function exportReleve(candidat, inscription, notesArr, modules) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text("DGAC — Direction Generale de l'Aviation Civile", 14, 20);
  doc.setFontSize(11); doc.text("Republique Tunisienne", 14, 28);
  doc.setFontSize(14); doc.text("Releve de Notes — Examen ATE", 14, 42);
  doc.setFontSize(11);
  doc.text("Candidat: " + candidat.prenom + " " + candidat.nom, 14, 55);
  doc.text("Matricule: " + candidat.matricule + "    CIN: " + (candidat.cin || "—"), 14, 62);
  doc.text("Organisme: " + (candidat.organisme_formation || "—"), 14, 69);
  const rows = modules.sort((a, b) => a.ordre - b.ordre).map(m => {
    const n = notesArr.find(x => x.matiere_uuid === m.id);
    return [m.nom, m.coefficient, n && n.absent ? "ABS" : n && n.note !== null ? n.note + "/20" : "—"];
  });
  doc.autoTable({ startY: 78, head: [["Module", "Coef", "Note"]], body: rows, styles: { fontSize: 9 }, headStyles: { fillColor: [18, 32, 61] } });
  const fy = doc.lastAutoTable.finalY + 14;
  const moy = inscription.moyenne_ponderee !== null ? Number(inscription.moyenne_ponderee).toFixed(2) : "—";
  doc.setFontSize(13); doc.text("Moyenne Ponderee: " + moy + "/20", 14, fy);
  doc.setFontSize(14); doc.text("Resultat: " + (inscription.resultat || "En attente"), 14, fy + 10);
  doc.save("Releve_" + candidat.matricule + ".pdf");
}

function exportPV(session, inscriptions, candidats, modules, notes) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("l");
  doc.setFontSize(14); doc.text("DGAC — Proces-Verbal de Deliberation", 14, 18);
  doc.setFontSize(11); doc.text("Session: " + session.intitule, 14, 28);
  doc.text("Date: " + (session.date_debut || "—") + "    Lieu: " + (session.lieu || "—"), 14, 35);
  const sInscrits = inscriptions.filter(i => i.session_uuid === session.id).sort((a, b) => (b.moyenne_ponderee || 0) - (a.moyenne_ponderee || 0));
  const rows = sInscrits.map((i, idx) => {
    const c = candidats.find(x => x.id === i.candidat_uuid);
    return [idx + 1, c ? c.matricule : "", c ? c.prenom + " " + c.nom : "", c ? c.organisme_formation || "" : "", i.moyenne_ponderee !== null ? Number(i.moyenne_ponderee).toFixed(2) : "—", i.resultat || ""];
  });
  doc.autoTable({ startY: 44, head: [["#", "Matricule", "Candidat", "Organisme", "Moyenne", "Resultat"]], body: rows, styles: { fontSize: 9 }, headStyles: { fillColor: [18, 32, 61] } });
  const fy = doc.lastAutoTable.finalY + 14;
  const admis = sInscrits.filter(i => i.resultat === "Admis").length;
  doc.setFontSize(11);
  doc.text("Total: " + sInscrits.length + " candidats    Admis: " + admis + "    Ajournes: " + (sInscrits.length - admis), 14, fy);
  doc.text("President du Jury: " + (session.president_jury || "________________"), 14, fy + 12);
  doc.text("Signature:", 14, fy + 24);
  doc.save("PV_" + session.session_id + ".pdf");
}

/* ===== RESULTS VIEW ===== */
function ResultatsView({ sessions, candidats, inscriptions, notes, modules }) {
  const [selS, setSelS] = useState("");
  const [orgF, setOrgF] = useState("Tous");
  const [detail, setDetail] = useState(null);
  const [showStats, setShowStats] = useState(false);
  const cur = selS || (sessions.length > 0 ? sessions[0].id : "");
  const session = sessions.find(s => s.id === cur);
  const allSI = inscriptions.filter(i => i.session_uuid === cur);
  const sI = allSI.filter(i => {
    if (orgF === "Tous") return true;
    const c = candidats.find(x => x.id === i.candidat_uuid);
    return c && c.organisme_formation === orgF;
  }).sort((a, b) => (b.moyenne_ponderee || 0) - (a.moyenne_ponderee || 0));
  const admis = sI.filter(i => i.resultat === "Admis").length;
  const total = sI.length;

  const matStats = modules.sort((a, b) => a.ordre - b.ordre).map(m => {
    const matNotes = [];
    allSI.forEach(i => { const n = notes.find(x => x.inscription_uuid === i.id && x.matiere_uuid === m.id); if (n && n.note !== null && !n.absent) matNotes.push(n.note); });
    const max = matNotes.length > 0 ? Math.max(...matNotes) : null;
    const avg = matNotes.length > 0 ? (matNotes.reduce((a, b) => a + b, 0) / matNotes.length) : null;
    const sup13 = matNotes.filter(n => n >= 13).length;
    const pct = matNotes.length > 0 ? Math.round((sup13 / matNotes.length) * 100) : 0;
    return { nom: m.nom, coefficient: m.coefficient, max: max, avg: avg, sup13: sup13, pct: pct, total: matNotes.length };
  });

  const orgStats = ORGANISMES.map(o => {
    const oInscrits = allSI.filter(i => { const c = candidats.find(x => x.id === i.candidat_uuid); return c && c.organisme_formation === o; });
    const oAdmis = oInscrits.filter(i => i.resultat === "Admis").length;
    const oMoy = oInscrits.filter(i => i.moyenne_ponderee !== null);
    const avg = oMoy.length > 0 ? (oMoy.reduce((s, i) => s + Number(i.moyenne_ponderee), 0) / oMoy.length) : null;
    return { org: o, total: oInscrits.length, admis: oAdmis, taux: oInscrits.length > 0 ? Math.round((oAdmis / oInscrits.length) * 100) : 0, avg: avg };
  });

  return (
    <div>
      <div className="filters">
        <select className="select" value={cur} onChange={e => setSelS(e.target.value)} style={{ width: 260, maxWidth: "100%" }}>{sessions.map(s => <option key={s.id} value={s.id}>{s.intitule}</option>)}</select>
        <div className="filter-group">{["Tous", ...ORGANISMES].map(o => <button key={o} className={"filter-btn " + (orgF === o ? "active" : "")} onClick={() => setOrgF(o)}>{o}</button>)}</div>
        <div className="spacer" />
        <button className="btn btn-outline" onClick={() => setShowStats(!showStats)}>{showStats ? "Tableau" : "Statistiques"}</button>
        {session && <button className="btn btn-purple" onClick={() => exportPV(session, inscriptions, candidats, modules, notes)}>PDF PV</button>}
      </div>
      {cur && (<div>
        <div className="kpi-grid">
          <KPI label="Candidats" value={total} color="var(--cyan)" />
          <KPI label="Admis" value={admis} color="var(--green)" />
          <KPI label="Ajournes" value={total - admis} color="var(--red-tn)" />
          <KPI label="Taux reussite" value={total > 0 ? Math.round((admis / total) * 100) + "%" : "—"} color="var(--green)" />
        </div>

        {!showStats ? (
          <div className="table-container">
            <div className="table-row" style={{ gridTemplateColumns: "40px 80px 1fr 80px 80px 80px 70px", background: "rgba(36,99,235,0.04)", fontWeight: 700, fontSize: 10, color: "var(--accent)", textTransform: "uppercase", letterSpacing: 1, cursor: "default" }}>
              <span>#</span><span>Matricule</span><span>Candidat</span><span>Organisme</span><span>Moyenne</span><span>Resultat</span><span>PDF</span>
            </div>
            {sI.map((i, idx) => { const c = candidats.find(x => x.id === i.candidat_uuid); return (
              <div key={i.id} className="table-row" style={{ gridTemplateColumns: "40px 80px 1fr 80px 80px 80px 70px" }} onClick={() => setDetail(i)}>
                <span className="mono" style={{ fontSize: 12, color: "var(--dim)" }}>{idx + 1}</span>
                <span className="mono" style={{ fontSize: 10, color: "var(--dim)" }}>{c ? c.matricule : "—"}</span>
                <span style={{ fontSize: 13, fontWeight: 500 }}>{c ? c.prenom + " " + c.nom : "—"}</span>
                <Badge color="var(--accent)">{c ? c.organisme_formation : "—"}</Badge>
                <span className="mono" style={{ fontSize: 14, fontWeight: 700, color: moyColor(i.moyenne_ponderee) }}>{i.moyenne_ponderee !== null ? Number(i.moyenne_ponderee).toFixed(2) : "—"}</span>
                <ResultBadge r={i.resultat} />
                <button className="btn btn-outline btn-sm" onClick={e => { e.stopPropagation(); if (c) exportReleve(c, i, notes.filter(n => n.inscription_uuid === i.id), modules); }}>PDF</button>
              </div>); })}
            {sI.length === 0 && <Empty text="Aucun resultat" />}
          </div>
        ) : (
          <div>
            <div className="card card-padded">
              <div className="section-title" style={{ marginTop: 0 }}>Statistiques par module</div>
              <div style={{ overflowX: "auto" }}>
                <table className="stats-table">
                  <thead><tr><th>Module</th><th>Coef</th><th>Note Max</th><th>Moyenne</th><th>Nb &ge; 13</th><th>% &ge; 13</th></tr></thead>
                  <tbody>{matStats.map((m, i) => (
                    <tr key={i}><td style={{ fontWeight: 500 }}>{m.nom}</td><td className="mono">{m.coefficient}</td><td className="mono" style={{ color: "var(--accent)" }}>{m.max !== null ? m.max.toFixed(2) : "—"}</td><td className="mono" style={{ color: m.avg !== null && m.avg >= 13 ? "var(--green)" : "var(--orange)" }}>{m.avg !== null ? m.avg.toFixed(2) : "—"}</td><td className="mono">{m.sup13}/{m.total}</td><td className="mono" style={{ color: m.pct >= 50 ? "var(--green)" : "var(--red-tn)" }}>{m.pct}%</td></tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
            <div className="card card-padded" style={{ marginTop: 20 }}>
              <div className="section-title" style={{ marginTop: 0 }}>Statistiques par organisme</div>
              <table className="stats-table">
                <thead><tr><th>Organisme</th><th>Candidats</th><th>Admis</th><th>Ajournes</th><th>Taux</th><th>Moyenne</th></tr></thead>
                <tbody>{orgStats.map((o, i) => (
                  <tr key={i}><td style={{ fontWeight: 700, color: "var(--accent)" }}>{o.org}</td><td className="mono">{o.total}</td><td className="mono" style={{ color: "var(--green)" }}>{o.admis}</td><td className="mono" style={{ color: "var(--red-tn)" }}>{o.total - o.admis}</td><td className="mono" style={{ color: o.taux >= 50 ? "var(--green)" : "var(--red-tn)" }}>{o.taux}%</td><td className="mono" style={{ color: o.avg !== null && o.avg >= 13 ? "var(--green)" : "var(--orange)" }}>{o.avg !== null ? o.avg.toFixed(2) : "—"}</td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        )}
      </div>)}
      {detail && (<Modal onClose={() => setDetail(null)} title="Detail des notes" width={560}>
        {(() => { const c = candidats.find(x => x.id === detail.candidat_uuid); const iNotes = notes.filter(n => n.inscription_uuid === detail.id); return (<div>
          <div style={{ textAlign: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 600 }}>{c ? c.prenom + " " + c.nom : "—"}</div>
            <div style={{ fontSize: 12, color: "var(--dim)" }}>{c ? c.matricule : ""} — {c ? c.organisme_formation : ""}</div>
            <div className="moyenne-display" style={{ background: detail.moyenne_ponderee !== null ? (Number(detail.moyenne_ponderee) >= PASS_MARK ? "rgba(46,204,113,0.1)" : "rgba(200,16,46,0.1)") : "rgba(36,99,235,0.04)", color: moyColor(detail.moyenne_ponderee), margin: "12px 0" }}>
              {detail.moyenne_ponderee !== null ? Number(detail.moyenne_ponderee).toFixed(2) : "—"}<span style={{ fontSize: 16, fontWeight: 400, marginLeft: 8 }}>/20</span>
            </div>
            <ResultBadge r={detail.resultat} />
          </div>
          {modules.sort((a, b) => a.ordre - b.ordre).map(m => { const n = iNotes.find(x => x.matiere_uuid === m.id); return (
            <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid var(--border)", fontSize: 13 }}>
              <span>{m.nom} <span className="mono" style={{ color: "var(--accent)", fontSize: 10 }}>x{m.coefficient}</span></span>
              <span className="mono" style={{ fontWeight: 700, color: n && n.absent ? "var(--red-tn)" : n && n.note !== null ? moyColor(n.note) : "var(--dim)" }}>{n && n.absent ? "ABS" : n && n.note !== null ? n.note + "/20" : "—"}</span>
            </div>); })}
          <div style={{ textAlign: "center", marginTop: 18 }}><button className="btn btn-purple" onClick={() => { if (c) exportReleve(c, detail, iNotes, modules); }}>Telecharger PDF</button></div>
        </div>); })()}
      </Modal>)}
    </div>
  );
}

/* ===== MAIN APP ===== */
function App() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [sessions, setSessions] = useState([]);
  const [candidats, setCandidats] = useState([]);
  const [inscriptions, setInscriptions] = useState([]);
  const [notes, setNotes] = useState([]);
  const [modules, setModules] = useState([]);
  const [deliberations, setDeliberations] = useState([]);
  const [planning, setPlanning] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [cs, setCs] = useState(true);
  const [lookup, setLookup] = useState(false);

  /* FIX #5: Use a ref to always have the latest api instance available to loadAll,
     avoiding stale closure issues with useCallback depending on api state */
  const apiRef = useRef(null);

  const loadAll = useCallback(async (overrideApi) => {
    const a = overrideApi || apiRef.current;
    if (!a) return;
    setLoading(true); setError("");
    try {
      const [se, ca, ins, no, ma, de, pl] = await Promise.all([
        a.select("sessions", "order=created_at.desc"), a.select("candidats", "order=nom.asc"),
        a.select("inscriptions", "order=created_at.desc"), a.select("notes", ""),
        a.select("matieres", "order=ordre.asc"), a.select("deliberations", "order=date_deliberation.desc"),
        a.select("planning_epreuves", "order=date_epreuve.asc,heure_debut.asc").catch(() => [])
      ]);
      setSessions(se); setCandidats(ca); setInscriptions(ins); setNotes(no); setModules(ma); setDeliberations(de); setPlanning(pl);
    } catch (e) { setError("Erreur: " + e.message); }
    setLoading(false);
  }, []);

  const handleLogin = (t, u) => {
    const a = createApi(t);
    setToken(t);
    setUser(u);
    apiRef.current = a;
    loadAll(a);
  };

  const handleLogout = async () => {
    try { if (token) await authApi.logout(token); } catch (e) {}
    localStorage.removeItem("ate_token");
    setUser(null);
    setToken(null);
    apiRef.current = null;
  };

  useEffect(() => {
    const t = localStorage.getItem("ate_token");
    if (t) {
      authApi.getUser(t).then(u => {
        const a = createApi(t);
        setToken(t);
        setUser(u);
        apiRef.current = a;
        loadAll(a);
        setCs(false);
      }).catch(() => { localStorage.removeItem("ate_token"); setCs(false); });
    } else setCs(false);
  }, []);

  if (cs) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "var(--bg)" }}><div style={{ textAlign: "center" }}><div style={{ fontSize: 48, marginBottom: 12 }}>&#9992;</div><div style={{ color: "var(--muted)", fontSize: 14 }}>Chargement...</div></div></div>;
  if (lookup) return <CandidatLookup onBack={() => setLookup(false)} />;
  if (!user) return <LoginScreen onLogin={handleLogin} onLookup={() => setLookup(true)} />;

  const tabs = [
    { id: "dashboard", label: "Accueil", ml: "Accueil", icon: "\u2302" },
    { id: "sessions", label: "Sessions", ml: "Sessions", icon: "\uD83D\uDCC5", count: sessions.filter(s => s.statut !== "Archivee").length },
    { id: "candidats", label: "Candidats", ml: "Candidats", icon: "\uD83D\uDC65" },
    { id: "notes", label: "Notes", ml: "Notes", icon: "\u270F" },
    { id: "resultats", label: "Resultats", ml: "Resultats", icon: "\uD83D\uDCCA" },
    { id: "deliberations", label: "Deliberations", ml: "Delib.", icon: "\u2696", count: deliberations.filter(d => !d.pv_valide).length }
  ];

  /* FIX #4: Removed duplicate tn-stripe — the one in static HTML body is sufficient */
  return (
    <div>
      <header className="header">
        <div className="header-left">
          <div className="logo-mark">✈</div>
          <div><div className="header-title">Examens ATE</div><div className="header-sub">Agent Technique d'Exploitation</div></div>
        </div>
        <div className="desktop-tabs">{tabs.map(t => <button key={t.id} className={"tab-btn " + (tab === t.id ? "active" : "")} onClick={() => setTab(t.id)}><span>{t.icon}</span> {t.label}{t.count > 0 && <span className="tab-count">{t.count}</span>}</button>)}</div>
        <div className="header-right">
          <div className="user-badge"><div className="user-dot" />{user.email}</div>
          <button className="btn-outline btn-sm" onClick={() => loadAll()}>{loading ? "\u23F3" : "\u21BB"}</button>
          <button className="btn-outline btn-outline-red btn-sm" onClick={handleLogout}>Deconnexion</button>
        </div>
      </header>
      <nav className="mobile-nav">
        {tabs.map(t => <button key={t.id} className={"mobile-nav-btn " + (tab === t.id ? "active" : "")} onClick={() => setTab(t.id)}><span className="nav-icon">{t.icon}</span>{t.ml}{t.count > 0 && tab !== t.id && <span className="nav-badge">{t.count}</span>}</button>)}
        <button className="mobile-nav-btn" onClick={handleLogout}><span className="nav-icon">&#x1F6AA;</span>Sortir</button>
      </nav>
      {error && <div className="error-box" style={{ margin: "12px 16px 0" }}>{error}</div>}
      <main style={{ padding: "28px 32px", maxWidth: 1400, margin: "0 auto" }}>
        {tab === "dashboard" && <Dashboard sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} modules={modules} deliberations={deliberations} onNav={setTab} />}
        {tab === "sessions" && <SessionsView api={apiRef.current} sessions={sessions} inscriptions={inscriptions} candidats={candidats} notes={notes} modules={modules} planning={planning} reload={() => loadAll()} />}
        {tab === "candidats" && <CandidatsView api={apiRef.current} candidats={candidats} sessions={sessions} inscriptions={inscriptions} reload={() => loadAll()} />}
        {tab === "notes" && <NotesView api={apiRef.current} sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} modules={modules} reload={() => loadAll()} />}
        {tab === "resultats" && <ResultatsView sessions={sessions} candidats={candidats} inscriptions={inscriptions} notes={notes} modules={modules} />}
        {tab === "deliberations" && <DeliberationsView api={apiRef.current} sessions={sessions} candidats={candidats} inscriptions={inscriptions} deliberations={deliberations} reload={() => loadAll()} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</script>
</body>
</html>
