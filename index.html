<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DGAC — Examens ATE</title>
  <meta name="theme-color" content="#0B1528" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0B1528;--card:#12203D;--card-hover:#162847;
      --border:rgba(189,165,107,0.08);--border-light:rgba(189,165,107,0.15);
      --text:#E8E4DD;--muted:rgba(232,228,221,0.55);--dim:rgba(232,228,221,0.35);
      --gold:#BDA56B;--gold-light:#D4C088;--gold-dark:#96833F;
      --red-tn:#C8102E;--green:#2ECC71;--orange:#F39C12;--cyan:#5DADE2;--purple:#9B59B6;
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --tr:all .25s cubic-bezier(.4,0,.2,1);
    }

    body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.55}
    h1,h2,h3,.serif{font-family:'Playfair Display',serif}
    .mono{font-family:'JetBrains Mono',monospace}
    ::selection{background:rgba(189,165,107,.30)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(189,165,107,0.20);border-radius:6px}

    .tn-stripe{height:3px;background:linear-gradient(90deg,var(--red-tn),var(--gold),var(--red-tn));opacity:.65}

    .header{
      padding:0 26px;height:64px;border-bottom:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
      background:rgba(11,21,40,0.97);backdrop-filter:blur(16px);
      position:sticky;top:0;z-index:100;
    }
    .header-left{display:flex;align-items:center;gap:14px}
    .logo-mark{
      width:38px;height:38px;border-radius:10px;
      background:linear-gradient(135deg,var(--gold),var(--gold-dark));
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 12px rgba(189,165,107,0.2);
      font-size:18px;flex-shrink:0;color:#0B1528;
    }
    .header-title{font-size:15px;font-weight:800;color:var(--gold-light);letter-spacing:.2px}
    .header-sub{font-size:10px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;font-weight:600;margin-top:2px}
    .header-right{display:flex;align-items:center;gap:10px}

    .desktop-tabs{display:flex;gap:2px;padding:3px;border-radius:10px;background:rgba(189,165,107,0.04);border:1px solid var(--border)}
    .tab-btn{
      padding:8px 14px;border-radius:8px;border:none;background:transparent;
      font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);
      transition:var(--tr);white-space:nowrap;letter-spacing:.3px;text-transform:uppercase;
      display:flex;align-items:center;gap:6px;
    }
    .tab-btn:hover{color:var(--text)}
    .tab-btn.active{background:rgba(189,165,107,0.12);color:var(--gold)}
    .tab-count{
      font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;
      background:rgba(189,165,107,0.15);color:var(--gold)
    }

    main{padding:22px 26px 26px}

    .btn{
      padding:10px 18px;border:none;border-radius:8px;font-size:12px;font-weight:800;
      cursor:pointer;font-family:inherit;transition:var(--tr);
      letter-spacing:.5px;text-transform:uppercase;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 26px rgba(0,0,0,.22)}
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

    .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0B1528}
    .btn-red{background:var(--red-tn);color:#fff}
    .btn-green{background:var(--green);color:#0B1528}
    .btn-outline{
      background:transparent;border:1px solid rgba(189,165,107,0.28);color:var(--gold);
      padding:9px 14px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;transition:var(--tr);
      text-transform:uppercase;letter-spacing:.5px
    }
    .btn-outline:hover{border-color:var(--gold)}
    .btn-outline-red{border-color:rgba(200,16,46,.35);color:var(--red-tn)}
    .btn-sm{padding:6px 12px;font-size:10px}
    .btn-full{width:100%;padding:14px 0}

    .btn-icon{background:none;border:none;color:var(--dim);cursor:pointer;padding:8px;border-radius:8px;transition:var(--tr)}
    .btn-icon:hover{color:var(--gold);background:rgba(189,165,107,0.06)}

    .input,.select,.textarea{
      width:100%;padding:12px 14px;background:rgba(189,165,107,0.04);
      border:1px solid var(--border-light);border-radius:10px;color:var(--text);
      font-size:14px;outline:none;font-family:inherit;transition:var(--tr)
    }
    .input:focus,.select:focus,.textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(189,165,107,0.09)}
    .select{cursor:pointer}
    .textarea{min-height:88px;resize:vertical}

    .label{font-size:10px;color:var(--gold);margin-bottom:6px;display:block;font-weight:900;letter-spacing:1.4px;text-transform:uppercase}

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:var(--tr)}
    .card-padded{padding:22px}
    .card:hover{border-color:var(--border-light)}

    .section-title{
      font-size:18px;font-weight:800;color:var(--gold-light);
      margin:26px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border)
    }
    .section-title:first-child{margin-top:0}

    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:var(--tr)}
    .kpi:hover{transform:translateY(-2px)}
    .kpi-bar{position:absolute;top:0;left:0;width:3px;height:100%}
    .kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:900}
    .kpi-value{font-size:28px;font-weight:900;margin-top:6px}
    .kpi-sub{font-size:12px;color:var(--dim);margin-top:4px}

    .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;white-space:nowrap}
    .empty{padding:44px 20px;text-align:center;color:var(--dim);font-size:14px;font-style:italic}

    .table-container{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .table-head,.table-row{display:grid;gap:12px;padding:12px 18px;align-items:center}
    .table-head{background:rgba(189,165,107,0.06);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);font-weight:900}
    .table-row{border-bottom:1px solid var(--border);cursor:pointer;transition:var(--tr)}
    .table-row:hover{background:var(--card-hover)}
    .table-row:last-child{border-bottom:none}

    .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
    .spacer{flex:1}
    .pill{
      display:flex;gap:3px;background:rgba(189,165,107,0.04);border-radius:10px;padding:3px;border:1px solid var(--border)
    }
    .pill-btn{
      padding:7px 12px;border-radius:8px;border:none;font-size:11px;font-weight:900;
      cursor:pointer;background:transparent;color:var(--muted);transition:var(--tr);white-space:nowrap
    }
    .pill-btn.active{background:rgba(189,165,107,0.12);color:var(--gold)}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-span{grid-column:1/-1}

    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.60);
      backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
      z-index:1000;padding:12px;animation:fadeIn .18s;
    }
    .modal{
      background:linear-gradient(180deg,#152240,#0F1C33);
      border:1px solid var(--border-light);border-radius:18px;padding:22px;
      width:min(720px,94vw);max-height:90vh;overflow:auto;
      animation:slideUp .25s cubic-bezier(.4,0,.2,1);
    }
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .modal-title{font-size:18px;font-weight:900;color:var(--gold-light)}
    .hint{color:var(--muted);font-size:13px}
    .error-box{padding:12px 14px;background:rgba(200,16,46,0.10);border:1px solid rgba(200,16,46,0.25);border-radius:12px;color:var(--red-tn);font-size:12px;margin:10px 0}
    .success-box{padding:12px 14px;background:rgba(46,204,113,0.10);border:1px solid rgba(46,204,113,0.22);border-radius:12px;color:var(--green);font-size:12px;margin:10px 0}
    .user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(189,165,107,0.06);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--muted)}
    .user-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

    .note-grid{display:grid;gap:8px;margin-top:12px}
    .note-row{
      display:grid;grid-template-columns:1fr 90px 100px;gap:10px;align-items:center;
      padding:10px 12px;background:rgba(189,165,107,0.03);border:1px solid var(--border);border-radius:12px
    }
    .note-row .matiere-name{font-size:13px;font-weight:700}
    .note-row .coef{font-size:10px;color:var(--gold);font-weight:900}
    .note-input{
      width:100%;padding:9px;background:rgba(189,165,107,0.06);
      border:1px solid var(--border-light);border-radius:10px;
      color:var(--text);font-size:14px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;
      transition:var(--tr)
    }
    .note-input:focus{border-color:var(--gold)}
    .note-input.absent{background:rgba(200,16,46,0.10);border-color:rgba(200,16,46,0.28);color:var(--red-tn)}
    .chk{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
    .chk input{width:18px;height:18px}

    .result-admis{color:var(--green);font-weight:900}
    .result-ajourne{color:var(--red-tn);font-weight:900}
    .result-attente{color:var(--orange);font-weight:900}

    .toast-wrap{position:fixed;top:14px;right:14px;z-index:2000;display:grid;gap:10px}
    .toast{
      width:min(360px,92vw);padding:12px 14px;border-radius:14px;
      background:rgba(18,32,61,0.94);backdrop-filter:blur(10px);
      border:1px solid var(--border-light);box-shadow:0 12px 30px rgba(0,0,0,0.35);
      display:flex;gap:10px;align-items:flex-start
    }
    .toast .dot{width:10px;height:10px;border-radius:50%;margin-top:4px}
    .toast .t-title{font-weight:900;font-size:12px;color:var(--gold-light);text-transform:uppercase;letter-spacing:.8px}
    .toast .t-msg{font-size:12px;color:var(--text);opacity:.95;margin-top:2px}

    .login-page{
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
      background:linear-gradient(160deg,#0B1528,#132240,#0B1528);
    }
    .login-box{width:460px;max-width:100%}
    .login-header{text-align:center;margin-bottom:26px}
    .login-title{font-size:26px;font-weight:900;color:var(--gold-light)}
    .login-sub{color:var(--muted);font-size:14px;margin-top:10px}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:768px){
      .header{padding:0 14px;height:56px}
      main{padding:16px 14px 18px}
      .desktop-tabs{display:none!important}
      .grid-2{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .note-row{grid-template-columns:1fr 80px 110px}
    }
  </style>
</head>

<body>
  <div class="tn-stripe"></div>
  <div id="app"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useState, useCallback } = React;

    /* =========================================================
      ✅ PRÉFÉRENCES (tu modifies ici, puis tu push sur GitHub)
    ========================================================== */
    const APP = {
      BRAND_TITLE: "Examens ATE",
      BRAND_SUBTITLE: "Direction Générale de l'Aviation Civile — Tunisie",

      // Supabase (identique à ton fichier)
      SB_URL: "https://rvsldfentjjuukgozrzv.supabase.co",
      SB_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2c2xkZmVudGpqdXVrZ296cnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzA0MDEsImV4cCI6MjA4NzI0NjQwMX0.PAFfUgH1-cmrd7HULo0H46Bzs9q3fwX3qoxjBgnvCdQ",

      PASS_MARK: 13,
      ORGANISMES: ["CIFAC", "AFA", "OSC"],

      // ⚠️ Sécurité : si tu n’as pas mis une RLS/Edge Function,
      // laisse FALSE pour éviter la consultation par CIN en public.
      ENABLE_CANDIDAT_PORTAL: false,

      DEFAULT_TAB: "dashboard", // dashboard | sessions | candidats | matieres
    };

    const STATUTS_SESSION = ["Planifiee", "En cours", "Terminee", "Deliberee", "Archivee"];
    const SC = {
      "Planifiee": "#BDA56B",
      "En cours": "#F39C12",
      "Terminee": "#5DADE2",
      "Deliberee": "#2ECC71",
      "Archivee": "rgba(232,228,221,0.30)",
      "Inscrit": "#BDA56B",
      "Absent": "#C8102E",
      "Retire": "rgba(232,228,221,0.30)",
      "En attente": "#F39C12",
      "Admis": "#2ECC71",
      "Ajourne": "#C8102E"
    };

    function moyColor(m) {
      if (m === null || m === undefined || m === "") return "var(--dim)";
      return Number(m) >= APP.PASS_MARK ? "var(--green)" : "var(--red-tn)";
    }

    function fmtDate(d) { return d || "—"; }

    function safeNum(v) {
      if (v === null || v === undefined || v === "") return null;
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function computeMoyenne(matieres, notesByMatiere) {
      // Règle simple :
      // - si une matière est ABS => note = 0 et coef compté
      // - si une matière est vide => "incomplet" => moyenne null
      let sumCoef = 0;
      let sum = 0;
      for (const m of matieres) {
        const n = notesByMatiere[m.id];
        if (!n) return null; // pas de ligne => incomplet
        if (n.absent) {
          sumCoef += Number(m.coefficient || 1);
          sum += 0;
          continue;
        }
        const val = safeNum(n.note);
        if (val === null) return null; // incomplet
        sumCoef += Number(m.coefficient || 1);
        sum += val * Number(m.coefficient || 1);
      }
      if (sumCoef <= 0) return null;
      return Number((sum / sumCoef).toFixed(2));
    }

    function computeResult(moy) {
      if (moy === null || moy === undefined) return "En attente";
      return Number(moy) >= APP.PASS_MARK ? "Admis" : "Ajourne";
    }

    async function fetchJson(url, opts = {}, timeoutMs = 25000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const r = await fetch(url, { ...opts, signal: ctrl.signal });
        const txt = await r.text();
        let data = null;
        try { data = txt ? JSON.parse(txt) : null; } catch { data = txt; }
        if (!r.ok) {
          const msg = (data && (data.message || data.error_description || data.error)) || r.statusText || "Erreur";
          throw new Error(msg);
        }
        return data;
      } finally {
        clearTimeout(t);
      }
    }

    const authApi = {
      async login(email, password) {
        const url = APP.SB_URL + "/auth/v1/token?grant_type=password";
        const d = await fetchJson(url, {
          method: "POST",
          headers: { apikey: APP.SB_KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        return d;
      },
      async logout(token) {
        const url = APP.SB_URL + "/auth/v1/logout";
        await fetchJson(url, {
          method: "POST",
          headers: { apikey: APP.SB_KEY, Authorization: "Bearer " + token, "Content-Type": "application/json" }
        });
      },
      async getUser(token) {
        const url = APP.SB_URL + "/auth/v1/user";
        return fetchJson(url, { headers: { apikey: APP.SB_KEY, Authorization: "Bearer " + token } });
      }
    };

    const createApi = (token) => {
      const base = APP.SB_URL + "/rest/v1";
      const headers = {
        apikey: APP.SB_KEY,
        Authorization: "Bearer " + token,
        "Content-Type": "application/json",
        Prefer: "return=representation"
      };

      return {
        async select(table, query) {
          const url = base + "/" + table + (query ? "?" + query : "");
          return fetchJson(url, { headers });
        },
        async insert(table, payload) {
          const url = base + "/" + table;
          return fetchJson(url, { method: "POST", headers, body: JSON.stringify(payload) });
        },
        async patch(table, where, payload) {
          const url = base + "/" + table + "?" + where;
          return fetchJson(url, { method: "PATCH", headers, body: JSON.stringify(payload) });
        },
        async remove(table, where) {
          const url = base + "/" + table + "?" + where;
          await fetchJson(url, { method: "DELETE", headers });
          return true;
        }
      };
    };

    function Badge({ children, color }) {
      return <span className="badge" style={{ background: (color || "#888") + "18", color: color || "#888" }}>{children}</span>;
    }
    function Tag({ label }) { return <Badge color={SC[label] || "var(--dim)"}>{label}</Badge>; }
    function Empty({ text }) { return <div className="empty">{text}</div>; }

    function KPI({ label, value, sub, color }) {
      return (
        <div className="kpi">
          <div className="kpi-bar" style={{ background: color }} />
          <div className="kpi-label">{label}</div>
          <div className="kpi-value mono" style={{ color }}>{value}</div>
          {sub && <div className="kpi-sub">{sub}</div>}
        </div>
      );
    }

    function Modal({ title, onClose, children, width }) {
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" style={{ width: width || "min(720px,94vw)" }} onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <div className="modal-title">{title}</div>
              </div>
              <button className="btn-icon" onClick={onClose} title="Fermer">✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function Field({ label, span, children }) {
      return (
        <div className={span ? "form-span" : ""}>
          <label className="label">{label}</label>
          {children}
        </div>
      );
    }

    function ResultBadge({ r }) {
      return <span className={r === "Admis" ? "result-admis" : r === "Ajourne" ? "result-ajourne" : "result-attente"}>{r}</span>;
    }

    function useToasts() {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((type, title, msg, ms = 3200) => {
        const id = Math.random().toString(36).slice(2);
        const dot = type === "error" ? "var(--red-tn)" : type === "success" ? "var(--green)" : "var(--orange)";
        setToasts((t) => [{ id, type, title, msg, dot }, ...t].slice(0, 4));
        setTimeout(() => setToasts((t) => t.filter(x => x.id !== id)), ms);
      }, []);
      const View = () => (
        <div className="toast-wrap">
          {toasts.map(t => (
            <div key={t.id} className="toast">
              <div className="dot" style={{ background: t.dot }} />
              <div>
                <div className="t-title">{t.title}</div>
                <div className="t-msg">{t.msg}</div>
              </div>
            </div>
          ))}
        </div>
      );
      return { push, View };
    }

    function LoginScreen({ onLogin, onLookup }) {
      const [email, setEmail] = useState("");
      const [pw, setPw] = useState("");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");

      const go = async () => {
        if (!email || !pw) { setErr("Remplissez les deux champs."); return; }
        setLoading(true); setErr("");
        try {
          const d = await authApi.login(email, pw);
          localStorage.setItem("ate_token", d.access_token);
          onLogin(d.access_token, d.user);
        } catch (e) {
          const msg = String(e.message || "");
          setErr(msg.includes("Invalid login credentials") ? "Email ou mot de passe incorrect." : msg);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="login-page">
          <div className="login-box">

    function CandidatLookup({ onBack }) {
      const [cin, setCin] = useState("");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");
      const [result, setResult] = useState(null);
      const [notes, setNotes] = useState([]);
      const [matieres, setMatieres] = useState([]);

      const search = async () => {
        if (!cin.trim()) { setErr("Entrez votre numéro CIN."); return; }
        setLoading(true); setErr(""); setResult(null);
        const h = { apikey: APP.SB_KEY, "Content-Type": "application/json" };
        const b = APP.SB_URL + "/rest/v1";
        try {
          const cands = await fetchJson(b + "/candidats?cin=eq." + encodeURIComponent(cin.trim()), { headers: h });
          if (!cands || cands.length === 0) { setErr("Aucun candidat trouvé avec ce CIN."); return; }

          const cand = cands[0];
          const inscs = await fetchJson(b + "/inscriptions?candidat_uuid=eq." + cand.id + "&order=created_at.desc&limit=1", { headers: h });
          if (!inscs || inscs.length === 0) { setErr("Aucune inscription trouvée."); return; }

          const insc = inscs[0];
          const nts = await fetchJson(b + "/notes?inscription_uuid=eq." + insc.id, { headers: h });
          const mats = await fetchJson(b + "/matieres?order=ordre.asc", { headers: h });

          setResult({ candidat: cand, inscription: insc });
          setNotes(nts || []);
          setMatieres(mats || []);
        } catch (e) {
          setErr("Erreur : " + (e.message || "inconnue"));
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="login-page">
          <div className="login-box" style={{ width: 560 }}>
            <div className="login-header">
              <div style={{ width: 64, height: 64, borderRadius: 16, background: "linear-gradient(135deg,var(--gold),var(--gold-dark))", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 28, color:"#0B1528", boxShadow: "0 6px 26px rgba(189,165,107,0.28)" }}>✈</div>
              <h1 className="login-title">Espace Candidat</h1>
              <p className="login-sub">Consultation des résultats — {APP.BRAND_TITLE}</p>
            </div>

            {!result ? (
              <div className="card card-padded">
                <Field label="Numéro CIN" span>
                  <input className="input" value={cin} onChange={e => setCin(e.target.value)} placeholder="Entrez votre numéro CIN" onKeyDown={e => e.key === "Enter" && search()} />
                </Field>
                {err && <div className="error-box">{err}</div>}
                <button className="btn btn-gold btn-full" onClick={search} disabled={loading}>
                  {loading ? "Recherche..." : "Consulter mes résultats"}
                </button>
                <div style={{ textAlign: "center", marginTop: 14 }}>
                  <button className="btn-outline" onClick={onBack}>← Retour</button>
                </div>
              </div>
            ) : (
              <div>
                <div className="card card-padded" style={{ marginBottom: 12, textAlign: "center" }}>
                  <div className="hint">{result.candidat.prenom} {result.candidat.nom}</div>
                  <div style={{
                    fontSize: 36, fontWeight: 900, marginTop: 10,
                    color: result.inscription.moyenne_ponderee !== null ? (Number(result.inscription.moyenne_ponderee) >= APP.PASS_MARK ? "var(--green)" : "var(--red-tn)") : "var(--dim)"
                  }}>
                    {result.inscription.moyenne_ponderee !== null ? Number(result.inscription.moyenne_ponderee).toFixed(2) : "—"} <span style={{ fontSize: 14, color: "var(--muted)" }}>/20</span>
                  </div>
                  <div style={{ marginTop: 8, fontSize: 18 }}><ResultBadge r={result.inscription.resultat} /></div>
                </div>

                <div className="card card-padded">
                  <div className="section-title" style={{ marginTop: 0 }}>Détail des notes</div>
                  {matieres.map(m => {
                    const n = (notes || []).find(x => x.matiere_uuid === m.id);
                    const txt = n?.absent ? "ABS" : (n?.note ?? null) !== null ? (n.note + "/20") : "—";
                    const col = n?.absent ? "var(--red-tn)" : (n?.note ?? null) !== null ? moyColor(n.note) : "var(--dim)";
                    return (
                      <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid var(--border)" }}>
                        <div>
                          <div style={{ fontWeight: 800 }}>{m.nom} <span className="mono" style={{ color: "var(--gold)", fontSize: 10 }}>x{m.coefficient}</span></div>
                        </div>
                        <div className="mono" style={{ fontWeight: 900, color: col }}>{txt}</div>
                      </div>
                    );
                  })}
                  <div style={{ textAlign: "center", marginTop: 14 }}>
                    <button className="btn-outline" onClick={() => { setResult(null); setCin(""); }}>Nouvelle recherche</button>
                    <span style={{ display: "inline-block", width: 10 }} />
                    <button className="btn-outline" onClick={onBack}>← Retour</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Dashboard({ sessions, candidats, inscriptions, matieres, onNav }) {
      const actives = sessions.filter(s => s.statut === "Planifiee" || s.statut === "En cours");
      const admis = inscriptions.filter(i => i.resultat === "Admis").length;
      const ajournes = inscriptions.filter(i => i.resultat === "Ajourne").length;
      const total = admis + ajournes;
      const taux = total > 0 ? Math.round((admis / total) * 100) : 0;

      const avecMoy = inscriptions.filter(i => i.moyenne_ponderee !== null && i.moyenne_ponderee !== undefined);
      const moyG = avecMoy.length > 0 ? (avecMoy.reduce((s, i) => s + Number(i.moyenne_ponderee), 0) / avecMoy.length).toFixed(2) : "—";

      return (
        <div>
          <div className="kpi-grid">
            <KPI label="Sessions" value={sessions.length} sub={actives.length + " actives"} color="var(--gold)" />
            <KPI label="Candidats" value={candidats.length} sub="en base" color="var(--cyan)" />
            <KPI label="Taux réussite" value={taux + "%"} sub={`${admis} admis / ${total}`} color="var(--green)" />
            <KPI label="Moyenne (glob.)" value={moyG} sub="/20" color={moyG === "—" ? "var(--orange)" : (Number(moyG) >= APP.PASS_MARK ? "var(--green)" : "var(--orange)")} />
          </div>

          <div className="grid-2">
            <div className="card card-padded">
              <div className="section-title" style={{ marginTop: 0 }}>Sessions actives</div>
              {actives.length === 0 && <div className="hint">Aucune session active.</div>}
              {actives.slice(0, 6).map(s => {
                const nb = inscriptions.filter(i => i.session_uuid === s.id).length;
                return (
                  <div key={s.id} style={{ display: "flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:"1px solid var(--border)" }}>
                    <div>
                      <div style={{ fontWeight: 900 }}>{s.intitule}</div>
                      <div className="hint">{fmtDate(s.date_debut)} — {s.lieu || "—"}</div>
                    </div>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <Tag label={s.statut} />
                      <Badge color="var(--cyan)">{nb}</Badge>
                    </div>
                  </div>
                );
              })}
              <div style={{ marginTop: 14 }}>
                <button className="btn-outline btn-sm" onClick={() => onNav("sessions")}>Voir toutes →</button>
              </div>
            </div>

            <div className="card card-padded">
              <div className="section-title" style={{ marginTop: 0 }}>Matières</div>
              {matieres.length === 0 ? (
                <div className="hint">Aucune matière. Ajoute les matières (et coefficients) avant la saisie des notes.</div>
              ) : (
                matieres.slice(0, 8).map(m => (
                  <div key={m.id} style={{ display: "flex", justifyContent:"space-between", padding:"10px 0", borderBottom:"1px solid var(--border)" }}>
                    <div style={{ fontWeight: 900 }}>{m.nom}</div>
                    <div className="mono" style={{ color:"var(--gold)", fontWeight: 900 }}>x{m.coefficient}</div>
                  </div>
                ))
              )}
              <div style={{ marginTop: 14 }}>
                <button className="btn-outline btn-sm" onClick={() => onNav("matieres")}>Gérer matières →</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SessionModal({ api, session, onClose, candidats, inscriptions, matieres, notes, deliberations, refresh, toast }) {
      const [tab, setTab] = useState("inscriptions"); // inscriptions | notes | deliberation | export | edit
      const [busy, setBusy] = useState(false);

      const inscs = useMemo(() => inscriptions.filter(i => i.session_uuid === session.id), [inscriptions, session.id]);
      const delib = useMemo(() => deliberations.find(d => d.session_uuid === session.id) || null, [deliberations, session.id]);

      const [edit, setEdit] = useState({ ...session });
      const [del, setDel] = useState(delib ? { ...delib } : {
        session_uuid: session.id,
        date_deliberation: new Date().toISOString().slice(0,10),
        membres_presents: "",
        observations_generales: "",
        decision_jury: "",
        pv_valide: false
      });

      const [addCandId, setAddCandId] = useState("");
      const [inscStatut, setInscStatut] = useState("Inscrit");

      const addInscription = async () => {
        if (!addCandId) { toast("error","Action","Choisis un candidat."); return; }
        setBusy(true);
        try {
          // éviter doublons
          const exists = inscs.some(i => i.candidat_uuid === addCandId);
          if (exists) { toast("error","Action","Ce candidat est déjà inscrit."); return; }

          await api.insert("inscriptions", [{
            candidat_uuid: addCandId,
            session_uuid: session.id,
            statut: inscStatut,
            observations: "",
            moyenne_ponderee: null,
            resultat: "En attente"
          }]);
          toast("success","OK","Inscription ajoutée.");
          setAddCandId("");
          await refresh();
        } catch (e) {
          toast("error","Erreur", e.message || "Impossible d'ajouter.");
        } finally {
          setBusy(false);
        }
      };

      const removeInscription = async (inscId) => {
        if (!confirm("Supprimer l'inscription ?")) return;
        setBusy(true);
        try {
          await api.remove("inscriptions", "id=eq." + inscId);
          toast("success","OK","Inscription supprimée.");
          await refresh();
        } catch (e) {
          toast("error","Erreur", e.message || "Suppression impossible.");
        } finally {
          setBusy(false);
        }
      };

      const saveSession = async () => {
        setBusy(true);
        try {
          await api.patch("sessions", "id=eq." + session.id, {
            session_id: edit.session_id || null,
            intitule: edit.intitule || "",
            date_debut: edit.date_debut || null,
            date_fin: edit.date_fin || null,
            lieu: edit.lieu || null,
            president_jury: edit.president_jury || null,
            membres_jury: edit.membres_jury || null,
            statut: edit.statut || "Planifiee",
            notes: edit.notes || null
          });
          toast("success","OK","Session mise à jour.");
          await refresh();
        } catch (e) {
          toast("error","Erreur", e.message || "Enregistrement impossible.");
        } finally {
          setBusy(false);
        }
      };

      const saveDelib = async () => {
        setBusy(true);
        try {
          const exists = delib && delib.id;
          if (exists) {
            await api.patch("deliberations", "id=eq." + delib.id, {
              date_deliberation: del.date_deliberation,
              membres_presents: del.membres_presents || null,
              observations_generales: del.observations_generales || null,
              decision_jury: del.decision_jury || null,
              pv_valide: !!del.pv_valide
            });
          } else {
            await api.insert("deliberations", [{
              session_uuid: session.id,
              date_deliberation: del.date_deliberation,
              membres_presents: del.membres_presents || null,
              observations_generales: del.observations_generales || null,
              decision_jury: del.decision_jury || null,
              pv_valide: !!del.pv_valide
            }]);
          }
          toast("success","OK","Délibération enregistrée.");
          await refresh();
        } catch (e) {
          toast("error","Erreur", e.message || "Enregistrement impossible.");
        } finally {
          setBusy(false);
        }
      };

      const openNotes = () => {
        if (matieres.length === 0) {
          toast("error","Notes","Ajoute d'abord les matières.");
          return;
        }
        setTab("notes");
      };

      const exportXlsx = () => {
        const rows = inscs.map(i => {
          const c = candidats.find(x => x.id === i.candidat_uuid);
          return {
            Session: session.session_id || "",
            Intitule: session.intitule || "",
            Matricule: c?.matricule || "",
            Nom: c ? (c.nom + " " + c.prenom) : "",
            CIN: c?.cin || "",
            Organisme: c?.organisme_formation || "",
            Statut: i.statut || "",
            Moyenne: i.moyenne_ponderee ?? "",
            Resultat: i.resultat || ""
          };
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, "Inscriptions");
        XLSX.writeFile(wb, `session_${session.session_id || session.id}_inscriptions.xlsx`);
      };

      const exportPV = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "portrait", unit: "pt", format: "a4" });

        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text("PV de Délibération — Examens ATE", 40, 50);

        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.text(`Session: ${session.session_id || "—"} — ${session.intitule || ""}`, 40, 72);
        doc.text(`Dates: ${fmtDate(session.date_debut)} → ${fmtDate(session.date_fin)}    Lieu: ${session.lieu || "—"}`, 40, 88);
        doc.text(`Président: ${session.president_jury || "—"}`, 40, 104);

        const d = deliberations.find(x => x.session_uuid === session.id);
        const dd = d?.date_deliberation || del.date_deliberation || new Date().toISOString().slice(0,10);

        doc.setFont("helvetica","bold"); doc.text("Délibération", 40, 132);
        doc.setFont("helvetica","normal");
        doc.text(`Date: ${dd}`, 40, 148);
        doc.text(`Membres présents: ${(d?.membres_presents || del.membres_presents || "—")}`, 40, 164);

        const tableRows = inscs.map(i => {
          const c = candidats.find(x => x.id === i.candidat_uuid);
          return [
            c?.matricule || "—",
            c ? (c.prenom + " " + c.nom) : "—",
            String(i.moyenne_ponderee ?? "—"),
            i.resultat || "—"
          ];
        });

        doc.autoTable({
          startY: 190,
          head: [["Matricule", "Candidat", "Moyenne", "Résultat"]],
          body: tableRows,
          styles: { fontSize: 9 },
          headStyles: { fillColor: [20, 32, 61] }
        });

        const y = doc.lastAutoTable.finalY + 18;
        doc.setFont("helvetica","bold");
        doc.text("Observations / Décision", 40, y);
        doc.setFont("helvetica","normal");
        const obs = d?.observations_generales || del.observations_generales || "—";
        const dec = d?.decision_jury || del.decision_jury || "—";
        doc.text("Observations: " + obs, 40, y + 16, { maxWidth: 520 });
        doc.text("Décision: " + dec, 40, y + 40, { maxWidth: 520 });

        doc.save(`PV_session_${session.session_id || session.id}.pdf`);
      };

      return (
        <Modal title={`Session — ${session.session_id || "—"} | ${session.intitule || ""}`} onClose={onClose}>

    function NotesTab({ api, session, inscs, candidats, matieres, notes, refresh, toast }) {
      const [inscId, setInscId] = useState(inscs[0]?.id || "");
      const [busy, setBusy] = useState(false);

      const insc = useMemo(() => inscs.find(x => x.id === inscId) || null, [inscs, inscId]);
      const cand = useMemo(() => {
        if (!insc) return null;
        return candidats.find(x => x.id === insc.candidat_uuid) || null;
      }, [insc, candidats]);

      const currentNotes = useMemo(() => {
        if (!insc) return [];
        return (notes || []).filter(n => n.inscription_uuid === insc.id);
      }, [notes, insc]);

      const [draft, setDraft] = useState({}); // { matiereId: {note, absent, id?}}
      useEffect(() => {
        if (!insc) return;
        const d = {};
        for (const m of matieres) {
          const found = currentNotes.find(n => n.matiere_uuid === m.id);
          d[m.id] = {
            id: found?.id || null,
            note: found?.note ?? "",
            absent: !!found?.absent
          };
        }
        setDraft(d);
      }, [inscId, matieres, currentNotes, insc]);

      const save = async () => {
        if (!insc) { toast("error","Notes","Choisis une inscription."); return; }
        setBusy(true);
        try {
          // upsert manual
          for (const m of matieres) {
            const row = draft[m.id] || { note:"", absent:false, id:null };
            const payload = { inscription_uuid: insc.id, matiere_uuid: m.id, absent: !!row.absent };
            if (!row.absent) payload.note = safeNum(row.note);
            else payload.note = null;

            if (row.id) {
              await api.patch("notes", "id=eq." + row.id, payload);
            } else {
              const res = await api.insert("notes", [payload]);
              const newId = res?.[0]?.id;
              if (newId) {
                setDraft(prev => ({ ...prev, [m.id]: { ...prev[m.id], id: newId } }));
              }
            }
          }

          // recalcul moyenne + résultat
          const moy = computeMoyenne(matieres, draft);
          const resu = computeResult(moy);

          await api.patch("inscriptions", "id=eq." + insc.id, {
            moyenne_ponderee: moy,
            resultat: resu
          });

          toast("success","OK","Notes enregistrées + moyenne recalculée.");
          await refresh();
        } catch (e) {
          toast("error","Erreur", e.message || "Enregistrement impossible.");
        } finally {
          setBusy(false);
        }
      };

      return (
        <div>
          <div className="filters">
            <select className="select" style={{ maxWidth: 520 }} value={inscId} onChange={e=>setInscId(e.target.value)}>
              {inscs.map(i => {
                const c = candidats.find(x => x.id === i.candidat_uuid);
                return <option key={i.id} value={i.id}>{c?.matricule || "—"} — {c ? `${c.prenom} ${c.nom}` : "—"} · {i.resultat || "En attente"}</option>;
              })}
            </select>
            <div className="spacer" />
            <button className="btn btn-gold" onClick={save} disabled={busy || matieres.length===0}>
              {busy ? "Enregistrement..." : "Enregistrer"}
            </button>
          </div>

          {!insc ? (
            <Empty text="Aucune inscription sélectionnée." />
          ) : (
            <div>
              <div className="card card-padded" style={{ marginBottom: 12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                  <div>
                    <div style={{ fontWeight: 900, fontSize: 16 }}>
                      {cand ? `${cand.prenom} ${cand.nom}` : "—"}
                    </div>
                    <div className="hint">
                      Matricule: <span className="mono">{cand?.matricule || "—"}</span> · CIN: <span className="mono">{cand?.cin || "—"}</span>
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div className="hint">Résultat</div>
                    <div style={{ fontSize: 18 }}><ResultBadge r={insc.resultat || "En attente"} /></div>
                    <div className="mono" style={{ fontWeight: 900, color: moyColor(insc.moyenne_ponderee) }}>
                      {insc.moyenne_ponderee ?? "—"} <span className="hint">/20</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="card card-padded">
                <div className="section-title" style={{ marginTop: 0 }}>Notes</div>
                {matieres.length === 0 ? (
                  <Empty text="Ajoute des matières d'abord." />
                ) : (
                  <div className="note-grid">
                    {matieres
                      .slice()
                      .sort((a,b)=>Number(a.ordre||0)-Number(b.ordre||0))
                      .map(m => {
                        const row = draft[m.id] || { note:"", absent:false };
                        return (
                          <div key={m.id} className="note-row">
                            <div>
                              <div className="matiere-name">{m.nom}</div>
                              <div className="coef mono">x{m.coefficient}</div>
                            </div>

                            <input
                              className={"note-input " + (row.absent ? "absent" : "")}
                              value={row.absent ? "" : (row.note ?? "")}
                              placeholder={row.absent ? "ABS" : "0-20"}
                              disabled={row.absent}
                              onChange={e=>{
                                const v = e.target.value;
                                setDraft(prev => ({ ...prev, [m.id]: { ...prev[m.id], note: v } }));
                              }}
                            />

                            <label className="chk">
                              <input
                                type="checkbox"
                                checked={!!row.absent}
                                onChange={e=>{
                                  const checked = e.target.checked;
                                  setDraft(prev => ({ ...prev, [m.id]: { ...prev[m.id], absent: checked } }));
                                }}
                              />
                              Absent
                            </label>
                          </div>
                        );
                      })}
                  </div>
                )}

                <div style={{ display:"flex", justifyContent:"flex-end", gap:10, marginTop: 14 }}>
                  <button className="btn-outline" onClick={save} disabled={busy || matieres.length===0}>
                    {busy ? "..." : "Enregistrer"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const { push: toast, View: ToastView } = useToasts();

      const [token, setToken] = useState(localStorage.getItem("ate_token") || "");
      const [user, setUser] = useState(null);
      const [nav, setNav] = useState(APP.DEFAULT_TAB);
      const [mode, setMode] = useState("app"); // app | lookup

      const api = useMemo(() => token ? createApi(token) : null, [token]);

      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");

      const [sessions, setSessions] = useState([]);
      const [candidats, setCandidats] = useState([]);
      const [matieres, setMatieres] = useState([]);
      const [inscriptions, setInscriptions] = useState([]);
      const [notes, setNotes] = useState([]);
      const [deliberations, setDeliberations] = useState([]);

      const refresh = useCallback(async () => {
        if (!api) return;
        setLoading(true);
        setErr("");
        try {
          const [ss, cc, mm, ii, nn, dd] = await Promise.all([
            api.select("sessions", "order=created_at.desc"),
            api.select("candidats", "order=created_at.desc"),
            api.select("matieres", "order=ordre.asc"),
            api.select("inscriptions", "order=created_at.desc"),
            api.select("notes", "order=created_at.desc"),
            api.select("deliberations", "order=created_at.desc"),
          ]);
          setSessions(ss || []);
          setCandidats(cc || []);
          setMatieres(mm || []);
          setInscriptions(ii || []);
          setNotes(nn || []);
          setDeliberations(dd || []);
        } catch (e) {
          setErr(e.message || "Erreur de chargement");
        } finally {
          setLoading(false);
        }
      }, [api]);

      const boot = useCallback(async () => {
        if (!token) return;
        setLoading(true);
        setErr("");
        try {
          const u = await authApi.getUser(token);
          setUser(u);
          await refresh();
        } catch (e) {
          // token expiré
          localStorage.removeItem("ate_token");
          setToken("");
          setUser(null);
        } finally {
          setLoading(false);
        }
      }, [token, refresh]);

      useEffect(() => { boot(); }, [boot]);

      const onLogin = async (t, u) => {
        setToken(t);
        setUser(u || null);
        toast("success", "Connexion", "Bienvenue.");
      };

      const logout = async () => {
        try {
          if (token) await authApi.logout(token);
        } catch {}
        localStorage.removeItem("ate_token");
        setToken("");
        setUser(null);
        toast("success","OK","Déconnecté.");
      };

      // Modals
      const [openSession, setOpenSession] = useState(null);
      const [openCandidat, setOpenCandidat] = useState(null);
      const [openMatiere, setOpenMatiere] = useState(null);

      const [addSession, setAddSession] = useState(false);
      const [addCand, setAddCand] = useState(false);
      const [addMat, setAddMat] = useState(false);

      const createSession = async (v) => {
        try {
          if (!v.intitule) { toast("error","Validation","Intitulé obligatoire."); return; }
          await api.insert("sessions", [{
            session_id: v.session_id || null,
            intitule: v.intitule,
            date_debut: v.date_debut || null,
            date_fin: v.date_fin || null,
            lieu: v.lieu || null,
            president_jury: v.president_jury || null,
            membres_jury: v.membres_jury || null,
            statut: v.statut || "Planifiee",
            notes: v.notes || null
          }]);
          toast("success","OK","Session créée.");
          setAddSession(false);
          await refresh();
        } catch(e) { toast("error","Erreur", e.message || "Création impossible."); }
      };

      const saveCandidat = async (v, isNew) => {
        try {
          if (!v.matricule || !v.nom || !v.prenom) { toast("error","Validation","Matricule, Nom, Prénom obligatoires."); return; }
          if (isNew) {
            await api.insert("candidats", [{
              matricule: v.matricule,
              nom: v.nom,
              prenom: v.prenom,
              cin: v.cin || null,
              date_naissance: v.date_naissance || null,
              telephone: v.telephone || null,
              email: v.email || null,
              organisme_formation: v.organisme_formation || null,
              notes: v.notes || null
            }]);
            toast("success","OK","Candidat créé.");
            setAddCand(false);
          } else {
            await api.patch("candidats", "id=eq." + v.id, {
              matricule: v.matricule,
              nom: v.nom,
              prenom: v.prenom,
              cin: v.cin || null,
              date_naissance: v.date_naissance || null,
              telephone: v.telephone || null,
              email: v.email || null,
              organisme_formation: v.organisme_formation || null,
              notes: v.notes || null
            });
            toast("success","OK","Candidat mis à jour.");
            setOpenCandidat(null);
          }
          await refresh();
        } catch(e) { toast("error","Erreur", e.message || "Enregistrement impossible."); }
      };

      const saveMatiere = async (v, isNew) => {
        try {
          if (!v.nom) { toast("error","Validation","Nom obligatoire."); return; }
          if (isNew) {
            await api.insert("matieres", [{ nom: v.nom, coefficient: v.coefficient ?? 1, ordre: v.ordre ?? 1 }]);
            toast("success","OK","Matière créée.");
            setAddMat(false);
          } else {
            await api.patch("matieres", "id=eq." + v.id, { nom: v.nom, coefficient: v.coefficient ?? 1, ordre: v.ordre ?? 1 });
            toast("success","OK","Matière mise à jour.");
            setOpenMatiere(null);
          }
          await refresh();
        } catch(e) { toast("error","Erreur", e.message || "Enregistrement impossible."); }
      };

      const deleteCandidat = async (id) => {
        if (!confirm("Supprimer le candidat ?")) return;
        try {
          await api.remove("candidats", "id=eq." + id);
          toast("success","OK","Candidat supprimé.");
          setOpenCandidat(null);
          await refresh();
        } catch(e) { toast("error","Erreur", e.message || "Suppression impossible."); }
      };

      const deleteMatiere = async (id) => {
        if (!confirm("Supprimer la matière ?")) return;
        try {
          await api.remove("matieres", "id=eq." + id);
          toast("success","OK","Matière supprimée.");
          setOpenMatiere(null);
          await refresh();
        } catch(e) { toast("error","Erreur", e.message || "Suppression impossible."); }
      };

      if (!token) {
        if (mode === "lookup") return <CandidatLookup onBack={() => setMode("app")} />;
        return <LoginScreen onLogin={onLogin} onLookup={() => setMode("lookup")} />;
      }

      return (
        <div>
          <ToastView />

          <div className="header">
            <div className="header-left">
              <div className="logo-mark">✈</div>
              <div>
                <div className="header-title">{APP.BRAND_TITLE}</div>
                <div className="header-sub">{APP.BRAND_SUBTITLE}</div>
              </div>
            </div>

            <div className="desktop-tabs">
              <button className={"tab-btn " + (nav==="dashboard"?"active":"")} onClick={()=>setNav("dashboard")}>Dashboard</button>
              <button className={"tab-btn " + (nav==="sessions"?"active":"")} onClick={()=>setNav("sessions")}>Sessions <span className="tab-count">{sessions.length}</span></button>
              <button className={"tab-btn " + (nav==="candidats"?"active":"")} onClick={()=>setNav("candidats")}>Candidats <span className="tab-count">{candidats.length}</span></button>
              <button className={"tab-btn " + (nav==="matieres"?"active":"")} onClick={()=>setNav("matieres")}>Matières <span className="tab-count">{matieres.length}</span></button>
            </div>

            <div className="header-right">
              <div className="user-badge" title="Utilisateur connecté">
                <div className="user-dot"></div>
                <span>{user?.email || "Connecté"}</span>
              </div>
              <button className="btn-outline btn-outline-red" onClick={logout}>Déconnexion</button>
            </div>
          </div>

          <main>
            {err && <div className="error-box">{err}</div>}
            {loading && <div className="hint">Chargement…</div>}

            {nav === "dashboard" && (
              <Dashboard
                sessions={sessions}
                candidats={candidats}
                inscriptions={inscriptions}
                matieres={matieres}
                onNav={setNav}
              />
            )}

            {nav === "sessions" && (
              <SessionsPage
                sessions={sessions}
                inscriptions={inscriptions}
                onOpen={(s)=>setOpenSession(s)}
                onAdd={()=>setAddSession(true)}
              />
            )}

            {nav === "candidats" && (
              <CandidatsPage
                candidats={candidats}
                onOpen={(c)=>setOpenCandidat(c)}
                onAdd={()=>setAddCand(true)}
              />
            )}

            {nav === "matieres" && (
              <MatieresPage
                matieres={matieres}
                onAdd={()=>setAddMat(true)}
                onOpen={(m)=>setOpenMatiere(m)}
              />
            )}
          </main>

          {openSession && (
            <SessionModal
              api={api}
              session={openSession}
              onClose={()=>setOpenSession(null)}
              candidats={candidats}
              inscriptions={inscriptions}
              matieres={matieres}
              notes={notes}
              deliberations={deliberations}
              refresh={refresh}
              toast={toast}
            />
          )}

          {addSession && (
            <EntityModal title="Créer une session" onClose={()=>setAddSession(false)}>
              <SessionForm
                initial={{ session_id:"", intitule:"", date_debut:"", date_fin:"", lieu:"", president_jury:"", membres_jury:"", statut:"Planifiee", notes:"" }}
                onCancel={()=>setAddSession(false)}
                onSave={createSession}
              />
            </EntityModal>
          )}

          {openCandidat && (
            <EntityModal title="Modifier candidat" onClose={()=>setOpenCandidat(null)}>
              <CandidatForm initial={openCandidat} onCancel={()=>setOpenCandidat(null)} onSave={(v)=>saveCandidat(v,false)} />
              <div style={{ display:"flex", justifyContent:"space-between", marginTop: 14 }}>
                <button className="btn-outline btn-outline-red" onClick={()=>deleteCandidat(openCandidat.id)}>Supprimer</button>
                <button className="btn-outline" onClick={()=>setOpenCandidat(null)}>Fermer</button>
              </div>
            </EntityModal>
          )}

          {addCand && (
            <EntityModal title="Créer candidat" onClose={()=>setAddCand(false)}>
              <CandidatForm initial={{ matricule:"", nom:"", prenom:"", cin:"", date_naissance:"", telephone:"", email:"", organisme_formation:"", notes:"" }} onCancel={()=>setAddCand(false)} onSave={(v)=>saveCandidat(v,true)} />
            </EntityModal>
          )}

          {openMatiere && (
            <EntityModal title="Modifier matière" onClose={()=>setOpenMatiere(null)}>
              <MatiereForm initial={openMatiere} onCancel={()=>setOpenMatiere(null)} onSave={(v)=>saveMatiere(v,false)} />
              <div style={{ display:"flex", justifyContent:"space-between", marginTop: 14 }}>
                <button className="btn-outline btn-outline-red" onClick={()=>deleteMatiere(openMatiere.id)}>Supprimer</button>
                <button className="btn-outline" onClick={()=>setOpenMatiere(null)}>Fermer</button>
              </div>
            </EntityModal>
          )}

          {addMat && (
            <EntityModal title="Créer matière" onClose={()=>setAddMat(false)}>
              <MatiereForm initial={{ nom:"", coefficient:1, ordre:1 }} onCancel={()=>setAddMat(false)} onSave={(v)=>saveMatiere(v,true)} />
            </EntityModal>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
