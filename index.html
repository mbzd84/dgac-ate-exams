<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGAC — Examens ATE</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2463EB">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  /* Surfaces */
  --bg:#F6F8FC;
  --card:#FFFFFF;
  --card-hover:#F2F6FF;
  --border:rgba(36,99,235,0.12);
  --border-light:rgba(36,99,235,0.20);

  /* Texte */
  --text:#0B1220;
  --muted:rgba(11,18,32,0.62);
  --dim:rgba(11,18,32,0.42);

  /* Accent moderne (bleu) */
  --gold:#2463EB;
  --gold-light:#3B82F6;
  --gold-dark:#1E40AF;

  /* Statuts */
  --red-tn:#C8102E;
  --green:#22C55E;
  --red:#E74C3C;
  --orange:#F59E0B;
  --cyan:#06B6D4;
  --purple:#8B5CF6;

  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tr:all .25s cubic-bezier(.4,0,.2,1);
}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.6}
h1,h2,h3,.serif{font-family:'Playfair Display',serif}
.mono{font-family:'JetBrains Mono',monospace}
::selection{background:rgba(36,99,235,0.3)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(36,99,235,0.2);border-radius:4px}
.header{padding:0 32px;height:64px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.92);box-shadow:0 10px 30px rgba(2,6,23,0.06);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.logo-mark{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(36,99,235,0.2);font-size:18px}
.header-title{font-size:16px;font-weight:700;color:var(--accent)}
.header-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.desktop-tabs{display:flex;gap:2px;padding:3px;border-radius:10px;background:rgba(36,99,235,0.04);border:1px solid var(--border)}
.tab-btn{padding:8px 16px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;background:transparent;color:var(--muted);transition:var(--tr);white-space:nowrap;letter-spacing:0.3px;text-transform:uppercase}
.tab-btn:hover{color:var(--text)}.tab-btn.active{background:rgba(36,99,235,0.12);color:var(--accent)}
.tab-count{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:6px;background:rgba(36,99,235,0.15);color:var(--accent)}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(11,21,40,0.98);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:6px 4px;padding-bottom:calc(6px + var(--safe-bottom));z-index:100;justify-content:space-around}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:9px;font-family:inherit;font-weight:600;cursor:pointer;padding:5px 4px;border-radius:8px;min-width:44px;position:relative;transition:var(--tr)}
.mobile-nav-btn.active{color:var(--accent)}.mobile-nav-btn .nav-icon{font-size:18px}
.mobile-nav-btn .nav-badge{position:absolute;top:0;right:2px;font-size:8px;font-weight:700;background:var(--red-tn);color:#fff;padding:1px 4px;border-radius:6px}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--tr);letter-spacing:0.5px;text-transform:uppercase}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}.btn:active{transform:scale(0.97)}.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-accent{background:var(--accent);color:#0B1528}
.btn-red{background:var(--red-tn);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-purple{background:var(--purple);color:#fff}.btn-orange{background:var(--orange);color:#fff}
.btn-outline{padding:9px 18px;background:transparent;border:1px solid rgba(36,99,235,0.25);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--accent);transition:var(--tr)}
.btn-outline:hover{border-color:var(--accent)}.btn-outline-red{border-color:rgba(200,16,46,0.3);color:var(--red-tn)}
.btn-sm{padding:6px 14px;font-size:10px}.btn-full{width:100%;padding:14px 0}
.btn-icon{background:none;border:none;color:var(--dim);cursor:pointer;padding:8px;transition:var(--tr);border-radius:6px}.btn-icon:hover{color:var(--accent)}
.btn-fab{position:fixed;bottom:80px;right:18px;width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 24px rgba(36,99,235,0.25);z-index:90;display:none;align-items:center;justify-content:center;color:#0B1528;background:var(--accent)}
.input,.select,.textarea{width:100%;padding:12px 16px;background:rgba(36,99,235,0.04);border:1px solid var(--border-light);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:var(--tr)}
.input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(36,99,235,0.08)}.select{cursor:pointer}.textarea{min-height:80px;resize:vertical}
.label{font-size:10px;color:var(--accent);margin-bottom:6px;display:block;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:var(--tr)}.card-padded{padding:24px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:var(--tr)}.kpi:hover{border-color:var(--border-light);transform:translateY(-2px)}
.kpi-bar{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:16px 0 0 16px}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700}
.kpi-value{font-size:28px;font-weight:700;margin-top:6px;font-family:'Playfair Display',serif}.kpi-sub{font-size:12px;color:var(--dim);margin-top:4px}
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.table-container{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
/* FIX #2: Added missing .table-head CSS */
.table-head{display:grid;padding:12px 22px;border-bottom:2px solid var(--border);background:rgba(36,99,235,0.04);font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;align-items:center}
.table-row{display:grid;padding:14px 22px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:var(--tr)}.table-row:hover{background:var(--card-hover)}.table-row:last-child{border-bottom:none}
.mobile-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:var(--tr)}.mobile-card:hover{border-color:var(--border-light)}
.mobile-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.mobile-card-title{font-size:15px;font-weight:600}.mobile-card-id{font-size:11px;color:var(--dim);margin-top:3px}
.mobile-card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.mobile-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:12px;animation:fadeIn 0.2s}
.modal{background:linear-gradient(180deg,#FFFFFF,#F3F6FF);border:1px solid var(--border-light);border-radius:20px;padding:28px;max-width:94vw;max-height:90vh;overflow-y:auto;width:560px;animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:20px;font-weight:700;color:var(--accent)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form-span{grid-column:1/-1}
.filters{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;gap:3px;background:rgba(36,99,235,0.04);border-radius:10px;padding:3px;border:1px solid var(--border)}
.filter-btn{padding:7px 14px;border-radius:7px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--muted);white-space:nowrap;transition:var(--tr)}.filter-btn.active{background:rgba(36,99,235,0.12);color:var(--accent)}
.spacer{flex:1}.empty{padding:48px 24px;text-align:center;color:var(--dim);font-size:14px;font-style:italic}
/* FIX #3: Added missing .hint CSS */
.hint{font-size:12px;color:var(--muted);font-weight:400}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#F6F8FC,#EAF1FF,#F6F8FC)}
.login-box{width:440px;max-width:100%}.login-header{text-align:center;margin-bottom:36px}
.login-title{font-size:26px;font-weight:800;color:var(--accent)}
.login-sub{color:var(--muted);font-size:14px;margin-top:10px}
.error-box{padding:12px 16px;background:rgba(200,16,46,0.08);border:1px solid rgba(200,16,46,0.2);border-radius:10px;color:var(--red-tn);font-size:12px;margin-bottom:16px}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(36,99,235,0.06);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted)}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.section-title{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:18px;margin-top:32px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border:none}
.note-grid{display:grid;gap:6px;margin:16px 0}
.note-row{display:grid;grid-template-columns:1fr 80px 50px;gap:10px;align-items:center;padding:10px 14px;background:rgba(36,99,235,0.02);border:1px solid var(--border);border-radius:10px}
.note-row .module-name{font-size:12px;font-weight:500}.note-row .coef{font-size:10px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600}
.note-input{width:100%;padding:8px;background:rgba(36,99,235,0.06);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-size:14px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none;transition:var(--tr)}
.note-input:focus{border-color:var(--accent)}.note-input.absent{background:rgba(200,16,46,0.08);border-color:rgba(200,16,46,0.25);color:var(--red-tn)}
.result-admis{color:var(--green);font-weight:700}.result-ajourne{color:var(--red-tn);font-weight:700}.result-attente{color:var(--orange);font-weight:700}
.moyenne-display{font-size:32px;font-weight:800;text-align:center;padding:20px;border-radius:14px;margin-bottom:18px;font-family:'Playfair Display',serif}
.stats-table{width:100%;border-collapse:collapse;font-size:12px}
.stats-table th{text-align:left;padding:10px 12px;background:rgba(36,99,235,0.06);color:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid var(--border)}
.stats-table td{padding:10px 12px;border-bottom:1px solid var(--border)}.stats-table tr:hover td{background:rgba(36,99,235,0.02)}
.tn-stripe{height:3px;background:linear-gradient(90deg,var(--red-tn),#0F172A,var(--red-tn));opacity:0.6}
.progress-bar{height:6px;border-radius:3px;background:var(--bg);overflow:hidden}.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.centre-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:22px;cursor:pointer;transition:var(--tr)}.centre-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.alert-card{padding:12px 16px;border-radius:10px;font-size:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cas-limite{background:rgba(234,88,12,.06)!important;border-left:3px solid var(--orange)!important}
@media(max-width:768px){
  .header{padding:0 16px;height:56px}.header-title{font-size:14px}.header-sub{display:none}
  .desktop-tabs{display:none!important}.header-right .user-badge{display:none}.header-right .btn-outline:not(.btn-outline-red){display:none}
  .mobile-nav{display:flex!important}.btn-fab{display:flex!important}
  main{padding:16px 14px 96px 14px!important}
  .form-grid{grid-template-columns:1fr}.form-span{grid-column:1}.grid-2{grid-template-columns:1fr}
  .modal{padding:22px 18px;width:100%;max-width:100%;border-radius:18px 18px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:92vh}
  .modal-overlay{align-items:flex-end;padding:0}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}.kpi{padding:14px}.kpi-value{font-size:24px}
  .desktop-only{display:none!important}.mobile-only{display:block!important}
  .input,.select,.textarea{font-size:16px;padding:14px}.btn{padding:12px 20px;font-size:13px}.btn-full{padding:16px 0}
  .note-row{grid-template-columns:1fr 60px 45px}
  /* FIX #2 responsive: table-head on mobile */
  .table-head{padding:10px 16px;font-size:9px}
}
@media(min-width:769px){.mobile-only{display:none!important}.mobile-nav{display:none!important}.btn-fab{display:none!important}}
</style>
</head>

/* FIX #1: Added missing fmtDate utility function */
function fmtDate(d) {
  if (!d) return "—";
  try {
    const parts = String(d).split("-");
    if (parts.length === 3) return parts[2] + "/" + parts[1] + "/" + parts[0];
    return d;
  } catch (e) { return d; }
}

const authApi = {
  async login(e, p) {
    const r = await fetch(SB_URL + "/auth/v1/token?grant_type=password", { method: "POST", headers: { apikey: SB_KEY, "Content-Type": "application/json" }, body: JSON.stringify({ email: e, password: p }) });
    const d = await r.json(); if (!r.ok) throw new Error(d.error_description || d.msg || "Echec"); return d;
  },
  async logout(t) { await fetch(SB_URL + "/auth/v1/logout", { method: "POST", headers: { apikey: SB_KEY, Authorization: "Bearer " + t, "Content-Type": "application/json" } }); },
  async getUser(t) { const r = await fetch(SB_URL + "/auth/v1/user", { headers: { apikey: SB_KEY, Authorization: "Bearer " + t } }); if (!r.ok) throw new Error("Expire"); return r.json(); }
};
const createApi = (t) => {
  const h = { apikey: SB_KEY, Authorization: "Bearer " + t, "Content-Type": "application/json", Prefer: "return=representation" };
  const b = SB_URL + "/rest/v1";
  return {
    async select(tb, q) { const r = await fetch(b + "/" + tb + "?" + (q || ""), { headers: h }); if (!r.ok) throw new Error(r.statusText); return r.json(); },
    async insert(tb, d) { const r = await fetch(b + "/" + tb, { method: "POST", headers: h, body: JSON.stringify(d) }); if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.statusText); } return r.json(); },
    async update(tb, id, d) { const r = await fetch(b + "/" + tb + "?id=eq." + id, { method: "PATCH", headers: h, body: JSON.stringify(d) }); if (!r.ok) throw new Error(r.statusText); return r.json(); },
    async remove(tb, id) { const r = await fetch(b + "/" + tb + "?id=eq." + id, { method: "DELETE", headers: h }); if (!r.ok) throw new Error(r.statusText); return true; }
  };
};

function moyColor(m) { if (m === null || m === undefined) return "var(--dim)"; return Number(m) >= PASS_MARK ? "var(--green)" : "var(--red-tn)"; }

function Badge({ children, color }) { return <span className="badge" style={{ background: (color || "#888") + "18", color: color || "#888" }}>{children}</span>; }
function Tag({ label }) { return <Badge color={SC[label]}>{label}</Badge>; }
function Empty({ text }) { return <div className="empty">{text}</div>; }
function KPI({ label, value, sub, color }) {
  return (<div className="kpi"><div className="kpi-bar" style={{ background: color }} /><div className="kpi-label">{label}</div><div className="kpi-value mono" style={{ color: color }}>{value}</div>{sub && <div className="kpi-sub">{sub}</div>}</div>);
}
function Modal({ onClose, title, width, children }) {
  return (<div className="modal-overlay" onClick={onClose}><div className="modal" style={{ width: width || 560 }} onClick={e => e.stopPropagation()}><div className="modal-header"><h3 className="modal-title">{title}</h3><button className="btn-icon" onClick={onClose} style={{ fontSize: 20 }}>&#10005;</button></div>{children}</div></div>);
}
function Field({ label, span, children }) { return <div className={span ? "form-span" : ""}><label className="label">{label}</label>{children}</div>; }
function Sel({ value, onChange, options }) { return <select className="select" value={value} onChange={e => onChange(e.target.value)}>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>; }
function ConfirmDelete({ item, onConfirm, onCancel }) {
  return (<Modal onClose={onCancel} title="Confirmer la suppression" width={420}><p style={{ color: "var(--muted)", fontSize: 14, marginBottom: 20 }}>Supprimer <strong style={{ color: "var(--red-tn)" }}>{item}</strong> ?</p><div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><button className="btn btn-outline" onClick={onCancel}>Annuler</button><button className="btn btn-red" onClick={onConfirm}>Supprimer</button></div></Modal>);
}
function FAB({ onClick, color }) { return <button className="btn-fab" style={{ background: color || "var(--accent)" }} onClick={onClick}>+</button>; }
function ResultBadge({ r }) { return <span className={r === "Admis" ? "result-admis" : r === "Ajourne" ? "result-ajourne" : "result-attente"}>{r}</span>; }
function OrgIcon({org,size}){const d=ORGANISMES_DATA[org]||{color:"#64748B"};const s=size||36;return d.logo?(<img src={d.logo} alt={org} style={{width:s,height:s,borderRadius:s*.25,objectFit:"cover",flexShrink:0,border:"1px solid var(--border)"}}/>):(<div style={{width:s,height:s,borderRadius:s*.3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:s*.4,fontWeight:800,color:"#fff",background:d.color,flexShrink:0}}>{org[0]}</div>);}
function ProgressBar({value,color}){return(<div className="progress-bar"><div className="progress-fill" style={{width:Math.min(100,Math.max(0,value))+"%",background:color||"var(--accent)"}}/></div>);}

/* ===== LOGIN ===== */
function LoginScreen({ onLogin, onLookup }) {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [ld, setLd] = useState(false);
  const [err, setErr] = useState("");
  const go = async () => {
    if (!email || !pw) { setErr("Remplissez les deux champs"); return; }
    setLd(true); setErr("");
    try { const d = await authApi.login(email, pw); localStorage.setItem("ate_token", d.access_token); onLogin(d.access_token, d.user); }
    catch (e) { setErr(e.message === "Invalid login credentials" ? "Email ou mot de passe incorrect" : e.message); }
    setLd(false);
  };
  return (
    <div className="login-page"><div className="login-box">
      <div className="login-header">
        <div style={{ width: 64, height: 64, borderRadius: 16, background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", fontSize: 28, boxShadow: "0 4px 24px rgba(36,99,235,0.3)" }}>&#9992;</div>
        <h1 className="login-title">Examens ATE</h1>
        <p className="login-sub">Direction Generale de l'Aviation Civile — Tunisie</p>
      </div>
      <div className="card card-padded">
        <div style={{ marginBottom: 18 }}><label className="label">Email</label><input className="input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="votre.email@dgac.tn" onKeyDown={e => e.key === "Enter" && go()} /></div>
        <div style={{ marginBottom: 18 }}><label className="label">Mot de passe</label><input className="input" type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && go()} /></div>
        {err && <div className="error-box">{err}</div>}
        <button className="btn btn-accent btn-full" onClick={go} disabled={ld}>{ld ? "Connexion..." : "Se connecter"}</button>
      </div>
      <div style={{ textAlign: "center", marginTop: 20 }}>
        <button onClick={onLookup} style={{ background: "none", border: "none", color: "var(--accent)", cursor: "pointer", fontFamily: "inherit", fontSize: 13, textDecoration: "underline" }}>Espace candidat — Consulter mes resultats</button>
      </div>
    </div></div>
  );
}

/* ===== CANDIDATE LOOKUP ===== */
/* FIX #7 (note): This uses anonymous Supabase access (anon key only).
   Ensure your Supabase RLS policies allow anonymous SELECT on:
   candidats, inscriptions, notes, modules
   Otherwise the lookup will silently fail or return empty results. */
function CandidatLookup({ onBack }) {
  const [cin, setCin] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [result, setResult] = useState(null);
  const [notes, setNotes] = useState([]);
  const [modules, setModules] = useState([]);

  const search = async () => {
    if (!cin.trim()) { setErr("Entrez votre numero CIN"); return; }
    setLoading(true); setErr(""); setResult(null);
    const h = { apikey: SB_KEY, "Content-Type": "application/json" };
    const b = SB_URL + "/rest/v1";
    try {
      const cr = await fetch(b + "/candidats?cin=eq." + encodeURIComponent(cin.trim()), { headers: h });
      if (!cr.ok) throw new Error("Acces refuse. Veuillez contacter l'administration.");
      const cands = await cr.json();
      if (!cands || cands.length === 0) { setErr("Aucun candidat trouve avec ce CIN"); setLoading(false); return; }
      const cand = cands[0];
      const ir = await fetch(b + "/inscriptions?candidat_uuid=eq." + cand.id + "&order=created_at.desc&limit=1", { headers: h });
      if (!ir.ok) throw new Error("Acces refuse aux inscriptions.");
      const inscs = await ir.json();
      if (!inscs || inscs.length === 0) { setErr("Aucune inscription trouvee"); setLoading(false); return; }
      const insc = inscs[0];
      const nr = await fetch(b + "/notes?inscription_uuid=eq." + insc.id, { headers: h });
      const nts = nr.ok ? await nr.json() : [];
      const mr = await fetch(b + "/matieres?order=ordre.asc", { headers: h });
      const mats = mr.ok ? await mr.json() : [];
      setResult({ candidat: cand, inscription: insc });
      setNotes(nts);
      setModules(mats);
    } catch (e) { setErr("Erreur: " + e.message); }
    setLoading(false);
  };

  return (
    <div className="login-page"><div className="login-box" style={{ width: 520 }}>
      <div className="login-header">
        <div style={{ width: 64, height: 64, borderRadius: 16, background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", fontSize: 28, boxShadow: "0 4px 24px rgba(36,99,235,0.3)" }}>&#9992;</div>
        <h1 className="login-title">Espace Candidat</h1>
        <p className="login-sub">Consultation des resultats — Examens ATE</p>
      </div>
      {!result ? (
        <div className="card card-padded">
          <div style={{ marginBottom: 18 }}><label className="label">Numero CIN</label><input className="input" value={cin} onChange={e => setCin(e.target.value)} placeholder="Entrez votre numero CIN" onKeyDown={e => e.key === "Enter" && search()} /></div>
          {err && <div className="error-box">{err}</div>}
          <button className="btn btn-accent btn-full" onClick={search} disabled={loading}>{loading ? "Recherche..." : "Consulter mes resultats"}</button>
          <div style={{ textAlign: "center", marginTop: 16 }}><button onClick={onBack} style={{ background: "none", border: "none", color: "var(--accent)", cursor: "pointer", fontFamily: "inherit", fontSize: 13 }}>&#8592; Retour</button></div>
        </div>
      ) : (
        <div>
          <div className="card card-padded" style={{ marginBottom: 16 }}>
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 14, color: "var(--muted)" }}>{result.candidat.prenom} {result.candidat.nom}</div>

/* ===== DASHBOARD ===== */
function Dashboard({ sessions, candidats, inscriptions, notes, modules, deliberations, onNav }) {
  const actives = sessions.filter(s => s.statut === "Planifiee" || s.statut === "En cours");
  const allWithResult = inscriptions.filter(i => i.resultat === "Admis" || i.resultat === "Ajourne");
  const admisTotal = allWithResult.filter(i => i.resultat === "Admis").length;
  const totalDelibered = allWithResult.length;
  const tauxGlobal = totalDelibered > 0 ? Math.round((admisTotal / totalDelibered) * 100) : 0;
  const avecMoy = inscriptions.filter(i => i.moyenne_ponderee !== null);
  const moyG = avecMoy.length > 0 ? (avecMoy.reduce((s, i) => s + Number(i.moyenne_ponderee), 0) / avecMoy.length).toFixed(2) : "—";

  /* Alerts (#6) */
  const sessionsNoDelib = sessions.filter(s => s.statut === "Terminee" && !(deliberations||[]).find(d => d.session_uuid === s.id));
  const pvNonValides = (deliberations||[]).filter(d => !d.pv_valide);
  const inscSansNotes = inscriptions.filter(i => i.statut === "Inscrit" && !(notes||[]).find(n => n.inscription_uuid === i.id));

  /* Stats par centre (#2,3) */
  const centreStats = ORGANISMES.map(org => {
    const orgCands = new Set(candidats.filter(c => (c.organisme_formation || "") === org).map(c => c.id));
    const orgInscs = inscriptions.filter(i => orgCands.has(i.candidat_uuid));
    const orgAdmis = orgInscs.filter(i => i.resultat === "Admis").length;
    const orgAj = orgInscs.filter(i => i.resultat === "Ajourne").length;
    const orgTotal = orgAdmis + orgAj;
    const taux = orgTotal > 0 ? Math.round((orgAdmis / orgTotal) * 100) : 0;
    const moys = orgInscs.filter(i => i.moyenne_ponderee !== null).map(i => Number(i.moyenne_ponderee));
    const best = moys.length > 0 ? Math.max(...moys) : null;
    const worst = moys.length > 0 ? Math.min(...moys) : null;
    return { org, total: orgCands.size, admis: orgAdmis, ajournes: orgAj, taux, best, worst };
  });

  /* Top/Flop modules (#4,5) */
  const moduleStats = (modules||[]).map(m => {
    const mNotes = (notes||[]).filter(n => n.matiere_uuid === m.id && n.note !== null && !n.absent);
    const passed = mNotes.filter(n => n.note >= PASS_MARK).length;
    const total = mNotes.length;
    const pct = total > 0 ? Math.round((passed / total) * 100) : 0;
    return { nom: m.nom, passed, failed: total - passed, total, pct };
  }).filter(m => m.total > 0);
  const topModules = moduleStats.slice().sort((a, b) => b.pct - a.pct).slice(0, 5);
  const flopModules = moduleStats.slice().sort((a, b) => a.pct - b.pct).slice(0, 5);

  return (
    <div>
      {/* Alerts */}
      {(sessionsNoDelib.length > 0 || pvNonValides.length > 0 || inscSansNotes.length > 0) && (
        <div style={{ marginBottom: 20 }}>
          {sessionsNoDelib.length > 0 && <div className="alert-card" style={{ background: "rgba(234,88,12,.06)", border: "1px solid rgba(234,88,12,.15)", color: "var(--orange)" }}>⚠️ <strong>{sessionsNoDelib.length} session{sessionsNoDelib.length > 1 ? "s" : ""}</strong> terminee{sessionsNoDelib.length > 1 ? "s" : ""} sans deliberation</div>}
          {pvNonValides.length > 0 && <div className="alert-card" style={{ background: "rgba(124,58,237,.06)", border: "1px solid rgba(124,58,237,.15)", color: "var(--purple)" }}>📋 <strong>{pvNonValides.length} PV</strong> en attente de validation</div>}
          {inscSansNotes.length > 0 && <div className="alert-card" style={{ background: "rgba(37,99,235,.06)", border: "1px solid rgba(37,99,235,.15)", color: "var(--accent)" }}>✏️ <strong>{inscSansNotes.length} inscription{inscSansNotes.length > 1 ? "s" : ""}</strong> sans notes saisies</div>}
        </div>
      )}

      <div className="kpi-grid">
        <KPI label="Sessions" value={sessions.length} sub={actives.length + " actives"} color="var(--accent)" />
        <KPI label="Candidats" value={candidats.length} sub="total" color="var(--cyan)" />
        <KPI label="Taux reussite" value={tauxGlobal + "%"} sub={admisTotal + " admis / " + totalDelibered} color="var(--green)" />
        <KPI label="Moyenne gen." value={moyG} sub="/20" color={Number(moyG) >= PASS_MARK ? "var(--green)" : "var(--orange)"} />
      </div>

      {/* Performance par centre (#2,3) */}
      <div className="section-title" style={{ marginTop: 0 }}>Performance par centre</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 12, marginBottom: 24 }}>
        {centreStats.map(cs => { const d = ORGANISMES_DATA[cs.org]; return (
          <div key={cs.org} className="card card-padded">
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <OrgIcon org={cs.org} size={40} />
              <div><div style={{ fontWeight: 800, fontSize: 16 }}>{cs.org}</div><div className="hint">{cs.total} candidats</div></div>
              <div className="spacer" />
              <div style={{ textAlign: "right" }}><div style={{ fontSize: 22, fontWeight: 800, color: cs.taux >= 50 ? "var(--green)" : "var(--red-tn)" }}>{cs.taux}%</div><div className="hint">reussite</div></div>
            </div>
            <ProgressBar value={cs.taux} color={cs.taux >= 50 ? "var(--green)" : "var(--red-tn)"} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 12, fontSize: 12 }}>
              <div><span className="hint">Meilleure:</span> <strong className="mono" style={{ color: "var(--green)" }}>{cs.best !== null ? cs.best.toFixed(2) : "—"}</strong></div>
              <div><span className="hint">Pire:</span> <strong className="mono" style={{ color: "var(--red-tn)" }}>{cs.worst !== null ? cs.worst.toFixed(2) : "—"}</strong></div>
              <div><span className="hint">Admis:</span> <strong style={{ color: "var(--green)" }}>{cs.admis}</strong></div>
              <div><span className="hint">Ajournes:</span> <strong style={{ color: "var(--red-tn)" }}>{cs.ajournes}</strong></div>
            </div>
          </div>
        ); })}
      </div>

      {/* Top / Flop modules (#4,5) */}
      <div className="grid-2">
        <div className="card card-padded">
          <div className="section-title" style={{ marginTop: 0, color: "var(--green)" }}>🏆 Top 5 modules reussis</div>
          {topModules.length === 0 ? <div className="hint">Pas de donnees</div> : topModules.map((m, i) => (
            <div key={i} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}><span style={{ fontWeight: 600 }}>{m.nom}</span><span className="mono" style={{ color: "var(--green)", fontWeight: 700 }}>{m.pct}%</span></div>
              <ProgressBar value={m.pct} color="var(--green)" />
            </div>
          ))}
        </div>
        <div className="card card-padded">
          <div className="section-title" style={{ marginTop: 0, color: "var(--red-tn)" }}>⚠ Top 5 modules les plus echoues</div>
          {flopModules.length === 0 ? <div className="hint">Pas de donnees</div> : flopModules.map((m, i) => (
            <div key={i} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}><span style={{ fontWeight: 600 }}>{m.nom}</span><span className="mono" style={{ color: "var(--red-tn)", fontWeight: 700 }}>{100 - m.pct}% echec</span></div>
              <ProgressBar value={100 - m.pct} color="var(--red-tn)" />
            </div>
          ))}
        </div>
      </div>

      {/* Sessions actives */}
      <div className="card card-padded" style={{ marginTop: 20 }}>
        <div className="section-title" style={{ marginTop: 0 }}>Sessions actives</div>
        {actives.length === 0 && <div className="hint">Aucune session active</div>}
        {actives.slice(0, 5).map(s => {
          const nb = inscriptions.filter(i => i.session_uuid === s.id).length;
          return (<div key={s.id} className="stat-row"><div><div style={{ fontSize: 13, fontWeight: 600 }}>{s.intitule}</div><div className="hint">{fmtDate(s.date_debut)} — {s.lieu || "—"}</div></div><div style={{ display: "flex", gap: 6, alignItems: "center" }}><Tag label={s.statut} /><Badge color="var(--cyan)">{nb}</Badge></div></div>);
        })}
        <button className="btn-outline btn-sm" onClick={() => onNav("sessions")} style={{ marginTop: 14 }}>Voir toutes →</button>
      </div>
    </div>
  );
}
