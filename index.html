<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DGAC — Examens ATE</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2463EB">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      /* Accent (FIX CRITIQUE: --accent manquait dans ton code) */
      --accent:#2463EB;
      --accent-2:#3B82F6;
      --accent-dark:#1E40AF;

      --bg:#F6F8FC;
      --card:#FFFFFF;
      --card-hover:#F2F6FF;
      --border:rgba(36,99,235,0.12);
      --border-light:rgba(36,99,235,0.20);

      --text:#0B1220;
      --muted:rgba(11,18,32,0.62);
      --dim:rgba(11,18,32,0.42);

      --red-tn:#C8102E;
      --green:#22C55E;
      --orange:#F59E0B;
      --cyan:#06B6D4;
      --purple:#8B5CF6;

      --safe-bottom:env(safe-area-inset-bottom,0px);
      --tr:all .25s cubic-bezier(.4,0,.2,1);
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Source Sans 3',sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      line-height:1.6
    }
    h1,h2,h3,.serif{font-family:'Playfair Display',serif}
    .mono{font-family:'JetBrains Mono',monospace}
    ::selection{background:rgba(36,99,235,0.25)}

    .tn-stripe{height:3px;background:linear-gradient(90deg,var(--red-tn),#0F172A,var(--red-tn));opacity:.6}

    .header{
      padding:0 22px;height:64px;border-bottom:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
      background:rgba(255,255,255,.92);backdrop-filter:blur(16px);
      position:sticky;top:0;z-index:100;
      box-shadow:0 10px 30px rgba(2,6,23,.06);
    }
    .header-left{display:flex;align-items:center;gap:12px}
    .logo-mark{
      width:38px;height:38px;border-radius:10px;background:var(--accent);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      box-shadow:0 2px 12px rgba(36,99,235,.2);font-size:18px;color:#0B1528;font-weight:900;
    }
    .header-title{font-size:15px;font-weight:800;color:var(--accent)}
    .header-sub{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
    .user-badge{
      display:flex;align-items:center;gap:8px;padding:6px 12px;
      background:rgba(36,99,235,0.06);border:1px solid var(--border);
      border-radius:10px;font-size:12px;color:var(--muted)
    }
    .user-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}

    main{padding:22px;max-width:1200px;margin:0 auto}

    .btn{
      padding:10px 18px;border:none;border-radius:10px;font-size:12px;font-weight:700;
      cursor:pointer;font-family:inherit;transition:var(--tr);
      letter-spacing:.4px;text-transform:uppercase;
    }
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .btn-accent{background:var(--accent);color:#0B1528;box-shadow:0 10px 24px rgba(36,99,235,.22)}
    .btn-outline{
      background:transparent;border:1px solid rgba(36,99,235,0.25);
      color:var(--accent);font-weight:800
    }
    .btn-red{background:var(--red-tn);color:#fff}
    .btn-sm{padding:7px 12px;font-size:10px;border-radius:9px}

    .input,.select,.textarea{
      width:100%;padding:12px 14px;background:rgba(36,99,235,.04);
      border:1px solid var(--border-light);border-radius:10px;
      color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:var(--tr)
    }
    .input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(36,99,235,.08)}
    .textarea{min-height:90px;resize:vertical}
    .label{font-size:10px;color:var(--accent);margin-bottom:6px;display:block;font-weight:800;letter-spacing:1.3px;text-transform:uppercase}

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px}
    .card-padded{padding:18px}

    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden}
    .kpi-bar{position:absolute;top:0;left:0;width:3px;height:100%}
    .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:800}
    .kpi-value{font-size:28px;font-weight:900;margin-top:6px}
    .kpi-sub{font-size:12px;color:var(--dim);margin-top:3px}

    .section-title{
      font-size:18px;font-weight:900;color:var(--accent);
      margin:22px 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border)
    }

    .badge{
      display:inline-flex;align-items:center;padding:4px 12px;border-radius:999px;
      font-size:11px;font-weight:800;white-space:nowrap
    }

    .hint{font-size:12px;color:var(--muted)}
    .empty{padding:28px;text-align:center;color:var(--dim);font-style:italic}

    .table-container{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .table-head{
      display:grid;padding:12px 16px;border-bottom:2px solid var(--border);
      background:rgba(36,99,235,.04);font-size:10px;font-weight:900;color:var(--accent);
      text-transform:uppercase;letter-spacing:1px;align-items:center
    }
    .table-row{
      display:grid;padding:12px 16px;border-bottom:1px solid var(--border);
      align-items:center;cursor:pointer;transition:var(--tr)
    }
    .table-row:hover{background:var(--card-hover)}
    .table-row:last-child{border-bottom:none}

    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.55);
      backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
      z-index:1000;padding:12px
    }
    .modal{
      background:linear-gradient(180deg,#fff,#F3F6FF);
      border:1px solid var(--border-light);border-radius:20px;
      padding:20px;max-width:96vw;max-height:90vh;overflow:auto;width:640px
    }
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .modal-title{font-size:18px;font-weight:900;color:var(--accent)}
    .btn-icon{background:none;border:none;color:var(--dim);cursor:pointer;padding:8px;border-radius:10px}
    .btn-icon:hover{color:var(--accent);background:rgba(36,99,235,.06)}

    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-span{grid-column:1/-1}

    .login-page{
      min-height:calc(100vh - 3px);
      display:flex;align-items:center;justify-content:center;padding:18px;
      background:linear-gradient(160deg,#F6F8FC,#EAF1FF,#F6F8FC)
    }
    .login-box{width:460px;max-width:100%}
    .login-header{text-align:center;margin-bottom:22px}
    .login-title{font-size:26px;font-weight:900;color:var(--accent)}
    .login-sub{color:var(--muted);font-size:14px;margin-top:8px}
    .error-box{
      padding:12px 14px;background:rgba(200,16,46,.08);
      border:1px solid rgba(200,16,46,.2);
      border-radius:12px;color:var(--red-tn);font-size:12px;margin:12px 0
    }

    .nav-tabs{display:flex;gap:6px;flex-wrap:wrap}
    .tab{padding:8px 12px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--muted);font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:.7px;cursor:pointer}
    .tab.active{color:var(--accent);background:rgba(36,99,235,.08);border-color:rgba(36,99,235,.25)}

    .progress-bar{height:7px;border-radius:999px;background:var(--bg);overflow:hidden}
    .progress-fill{height:100%;border-radius:999px;transition:width .35s}

    .moyenne-display{
      font-size:34px;font-weight:900;text-align:center;padding:18px;border-radius:16px;margin:10px 0 14px
    }

    @media(max-width:768px){
      .header{height:58px;padding:0 14px}
      main{padding:14px}
      .form-grid{grid-template-columns:1fr}
      .modal{width:100%;border-radius:18px}
    }
  </style>
</head>

<body>
  <div class="tn-stripe"></div>
  <div id="app"></div>

  <!-- Libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    /* ===========================
       CONFIG SUPABASE
       =========================== */
    const SB_URL = "https://rvsldfentjjuukgozrzv.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2c2xkZmVudGpqdXVrZ296cnp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzA0MDEsImV4cCI6MjA4NzI0NjQwMX0.PAFfUgH1-cmrd7HULo0H46Bzs9q3fwX3qoxjBgnvCdQ";

    const PASS_MARK = 13;

    /* ===========================
       UTIL
       =========================== */
    function fmtDate(d){
      if(!d) return "—";
      const s = String(d);
      const parts = s.split("-");
      if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
      return s;
    }
    function safeJson(x){ try{ return JSON.stringify(x); } catch(e){ return "{}"; } }

    const SC = {
      "Planifiee":"#BDA56B","En cours":"#F59E0B","Terminee":"#5DADE2","Deliberee":"#22C55E","Archivee":"rgba(232,228,221,0.6)",
      "Inscrit":"#BDA56B","Absent":"#C8102E","Retire":"rgba(232,228,221,0.6)",
      "En attente":"#F59E0B","Admis":"#22C55E","Ajourne":"#C8102E"
    };
    const STATUTS_SESSION = ["Planifiee","En cours","Terminee","Deliberee","Archivee"];

    function moyColor(m){
      if(m === null || m === undefined) return "var(--dim)";
      return Number(m) >= PASS_MARK ? "var(--green)" : "var(--red-tn)";
    }

    /* ===========================
       SUPABASE (REST + AUTH)
       =========================== */
    const authApi = {
      async login(email, password){
        const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
          method:"POST",
          headers:{ apikey:SB_KEY, "Content-Type":"application/json" },
          body: JSON.stringify({ email, password })
        });
        const d = await r.json();
        if(!r.ok) throw new Error(d.error_description || d.msg || "Echec de connexion");
        return d;
      },
      async logout(token){
        await fetch(`${SB_URL}/auth/v1/logout`, {
          method:"POST",
          headers:{ apikey:SB_KEY, Authorization:`Bearer ${token}`, "Content-Type":"application/json" }
        });
      },
      async getUser(token){
        const r = await fetch(`${SB_URL}/auth/v1/user`, {
          headers:{ apikey:SB_KEY, Authorization:`Bearer ${token}` }
        });
        if(!r.ok) throw new Error("Session expiree");
        return r.json();
      }
    };

    function createApi(token){
      const base = `${SB_URL}/rest/v1`;
      const h = {
        apikey: SB_KEY,
        Authorization: `Bearer ${token}`,
        "Content-Type":"application/json",
        Prefer:"return=representation"
      };

      async function handle(r){
        if(!r.ok){
          let msg = r.statusText;
          try{ const d = await r.json(); msg = d.message || d.error || d.hint || msg; }catch(e){}
          throw new Error(msg);
        }
        if(r.status === 204) return null;
        return r.json();
      }

      return {
        async select(table, query=""){
          const url = `${base}/${table}${query ? "?" + query : ""}`;
          return handle(await fetch(url, { headers:h }));
        },
        async insert(table, payload){
          return handle(await fetch(`${base}/${table}`, { method:"POST", headers:h, body:JSON.stringify(payload) }));
        },
        async update(table, id, payload){
          return handle(await fetch(`${base}/${table}?id=eq.${encodeURIComponent(id)}`, { method:"PATCH", headers:h, body:JSON.stringify(payload) }));
        },
        async remove(table, id){
          await handle(await fetch(`${base}/${table}?id=eq.${encodeURIComponent(id)}`, { method:"DELETE", headers:h }));
          return true;
        }
      };
    }

    /* ===========================
       UI ATOMS
       =========================== */
    function Badge({children,color}){
      return <span className="badge" style={{ background:(color||"#64748B")+"18", color:color||"#64748B" }}>{children}</span>;
    }
    function Tag({label}){ return <Badge color={SC[label] || "#64748B"}>{label}</Badge>; }
    function Empty({text}){ return <div className="empty">{text}</div>; }

    function KPI({label,value,sub,color}){
      return (
        <div className="kpi">
          <div className="kpi-bar" style={{ background: color }} />
          <div className="kpi-label">{label}</div>
          <div className="kpi-value mono" style={{ color }}>{value}</div>
          {sub && <div className="kpi-sub">{sub}</div>}
        </div>
      );
    }

    function Modal({title,onClose,width,children}){
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" style={{ width: width || 640 }} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{title}</div>
              <button className="btn-icon" onClick={onClose} title="Fermer">✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function Field({label,span,children}){
      return (
        <div className={span ? "form-span" : ""}>
          <label className="label">{label}</label>
          {children}
        </div>
      );
    }

    function ProgressBar({value,color}){
      const v = Math.max(0, Math.min(100, Number(value||0)));
      return (
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: v+"%", background: color || "var(--accent)" }} />
        </div>
      );
    }

    function ResultBadge({r}){
      const cls = r === "Admis" ? {color:"var(--green)"} : r === "Ajourne" ? {color:"var(--red-tn)"} : {color:"var(--orange)"};
      return <span style={{ fontWeight: 900, ...cls }}>{r || "—"}</span>;
    }

    /* ===========================
       FORMS
       =========================== */
    function SessionForm({initial,onClose,onSave}){
      const [f,setF] = useState(initial || {
        session_id:"",
        intitule:"",
        date_debut:"",
        date_fin:"",
        lieu:"",
        president_jury:"",
        membres_jury:"",
        statut:"Planifiee",
        notes:""
      });

      return (
        <Modal title={initial ? "Modifier session" : "Nouvelle session"} onClose={onClose} width={720}>
          <div className="form-grid">
            <Field label="ID Session *">
              <input className="input" value={f.session_id} onChange={e=>setF({...f,session_id:e.target.value})} placeholder="S-2026-01"/>
            </Field>
            <Field label="Statut">
              <select className="select" value={f.statut} onChange={e=>setF({...f,statut:e.target.value})}>
                {STATUTS_SESSION.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </Field>

            <Field label="Intitulé *" span>
              <input className="input" value={f.intitule} onChange={e=>setF({...f,intitule:e.target.value})} placeholder="Session Juin 2026"/>
            </Field>

            <Field label="Date début">
              <input type="date" className="input" value={f.date_debut || ""} onChange={e=>setF({...f,date_debut:e.target.value})}/>
            </Field>
            <Field label="Date fin">
              <input type="date" className="input" value={f.date_fin || ""} onChange={e=>setF({...f,date_fin:e.target.value})}/>
            </Field>

            <Field label="Lieu">
              <input className="input" value={f.lieu || ""} onChange={e=>setF({...f,lieu:e.target.value})} />
            </Field>
            <Field label="Président jury">
              <input className="input" value={f.president_jury || ""} onChange={e=>setF({...f,president_jury:e.target.value})}/>
            </Field>

            <Field label="Membres jury" span>
              <textarea className="textarea" value={f.membres_jury || ""} onChange={e=>setF({...f,membres_jury:e.target.value})}/>
            </Field>

            <Field label="Notes" span>
              <textarea className="textarea" value={f.notes || ""} onChange={e=>setF({...f,notes:e.target.value})}/>
            </Field>
          </div>

          <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:14 }}>
            <button className="btn btn-outline" onClick={onClose}>Annuler</button>
            <button className="btn btn-accent" onClick={()=>onSave(f)}>Enregistrer</button>
          </div>
        </Modal>
      );
    }

    function CandidatForm({initial,onClose,onSave,organismes}){
      const [f,setF] = useState(initial || {
        matricule:"",
        nom:"",
        prenom:"",
        cin:"",
        date_naissance:"",
        telephone:"",
        email:"",
        organisme_formation: organismes?.[0] || "CIFAC",
        notes:""
      });

      return (
        <Modal title={initial ? "Modifier candidat" : "Nouveau candidat"} onClose={onClose} width={720}>
          <div className="form-grid">
            <Field label="Matricule *">
              <input className="input" value={f.matricule} onChange={e=>setF({...f,matricule:e.target.value})}/>
            </Field>
            <Field label="Organisme">
              <select className="select" value={f.organisme_formation} onChange={e=>setF({...f,organisme_formation:e.target.value})}>
                {organismes.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            </Field>

            <Field label="Nom *">
              <input className="input" value={f.nom} onChange={e=>setF({...f,nom:e.target.value})}/>
            </Field>
            <Field label="Prénom *">
              <input className="input" value={f.prenom} onChange={e=>setF({...f,prenom:e.target.value})}/>
            </Field>

            <Field label="CIN">
              <input className="input" value={f.cin || ""} onChange={e=>setF({...f,cin:e.target.value})}/>
            </Field>
            <Field label="Date naissance">
              <input type="date" className="input" value={f.date_naissance || ""} onChange={e=>setF({...f,date_naissance:e.target.value})}/>
            </Field>

            <Field label="Téléphone">
              <input className="input" value={f.telephone || ""} onChange={e=>setF({...f,telephone:e.target.value})}/>
            </Field>
            <Field label="Email">
              <input className="input" type="email" value={f.email || ""} onChange={e=>setF({...f,email:e.target.value})}/>
            </Field>

            <Field label="Notes" span>
              <textarea className="textarea" value={f.notes || ""} onChange={e=>setF({...f,notes:e.target.value})}/>
            </Field>
          </div>

          <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:14 }}>
            <button className="btn btn-outline" onClick={onClose}>Annuler</button>
            <button className="btn btn-accent" onClick={()=>onSave(f)}>Enregistrer</button>
          </div>
        </Modal>
      );
    }

    function InscriptionForm({initial,onClose,onSave,sessions,candidats}){
      const [f,setF] = useState(initial || {
        candidat_uuid:"",
        session_uuid:"",
        statut:"Inscrit",
        observations:""
      });

      return (
        <Modal title={initial ? "Modifier inscription" : "Nouvelle inscription"} onClose={onClose} width={720}>
          <div className="form-grid">
            <Field label="Candidat *">
              <select className="select" value={f.candidat_uuid} onChange={e=>setF({...f,candidat_uuid:e.target.value})}>
                <option value="">—</option>
                {candidats.map(c => (
                  <option key={c.id} value={c.id}>{c.prenom} {c.nom} ({c.matricule})</option>
                ))}
              </select>
            </Field>

            <Field label="Session *">
              <select className="select" value={f.session_uuid} onChange={e=>setF({...f,session_uuid:e.target.value})}>
                <option value="">—</option>
                {sessions.map(s => (
                  <option key={s.id} value={s.id}>{s.intitule}</option>
                ))}
              </select>
            </Field>

            <Field label="Statut">
              <select className="select" value={f.statut} onChange={e=>setF({...f,statut:e.target.value})}>
                {["Inscrit","Absent","Retire"].map(x => <option key={x} value={x}>{x}</option>)}
              </select>
            </Field>

            <Field label="Observations" span>
              <textarea className="textarea" value={f.observations || ""} onChange={e=>setF({...f,observations:e.target.value})}/>
            </Field>
          </div>

          <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:14 }}>
            <button className="btn btn-outline" onClick={onClose}>Annuler</button>
            <button className="btn btn-accent" onClick={()=>onSave(f)}>Enregistrer</button>
          </div>
        </Modal>
      );
    }

    function NotesEntryModal({api,inscription,modules,existingNotes,onClose,onSaved}){
      const [nv,setNv] = useState({});
      const [saving,setSaving] = useState(false);

      useEffect(()=>{
        const o = {};
        (modules||[]).forEach(m=>{
          const ex = (existingNotes||[]).find(n=>n.matiere_uuid===m.id);
          o[m.id] = ex ? { note: ex.note!==null && ex.note!==undefined ? String(ex.note) : "", absent: !!ex.absent } : { note:"", absent:false };
        });
        setNv(o);
      },[modules,existingNotes]);

      const setNote = (mid,val)=>setNv(p=>({ ...p, [mid]:{...p[mid], note:val, absent:false} }));
      const toggleAbs = (mid)=>setNv(p=>({ ...p, [mid]:{ note:"", absent: !p[mid]?.absent } }));

      let tCN=0,tC=0;
      (modules||[]).forEach(m=>{
        const v = nv[m.id];
        if(!v) return;
        if(v.absent) return;
        if(v.note === "") return;
        const n = parseFloat(v.note);
        if(!isNaN(n)){
          tCN += n * Number(m.coefficient||1);
          tC += Number(m.coefficient||1);
        }
      });
      const moy = tC>0 ? (tCN/tC) : null;
      const passed = moy!==null && moy>=PASS_MARK;

      async function save(){
        setSaving(true);
        try{
          for(const m of (modules||[])){
            const v = nv[m.id] || {};
            const payload = {
              inscription_uuid: inscription.id,
              matiere_uuid: m.id,
              note: v.absent ? null : (v.note!=="" ? parseFloat(v.note) : null),
              absent: !!v.absent
            };
            const ex = (existingNotes||[]).find(x=>x.matiere_uuid===m.id);
            if(ex) await api.update("notes", ex.id, payload);
            else await api.insert("notes", payload);
          }

          const res = moy===null ? "En attente" : (moy>=PASS_MARK ? "Admis" : "Ajourne");
          await api.update("inscriptions", inscription.id, {
            moyenne_ponderee: moy,
            resultat: res
          });

          onSaved();
        }catch(e){
          alert("Erreur: " + e.message);
        }
        setSaving(false);
      }

      return (
        <Modal title="Saisie des notes" onClose={onClose} width={720}>
          <div className="moyenne-display"
               style={{
                 background: moy===null ? "rgba(36,99,235,0.06)" : passed ? "rgba(34,197,94,0.12)" : "rgba(200,16,46,0.12)",
                 color: moy===null ? "var(--dim)" : passed ? "var(--green)" : "var(--red-tn)"
               }}>
            {moy===null ? "—" : moy.toFixed(2)} <span style={{ fontSize:16, fontWeight:600 }}>/20</span>
            <div style={{ fontSize:14, fontWeight:800, marginTop:6 }}>
              {moy===null ? "EN ATTENTE" : (passed ? "ADMIS" : "AJOURNÉ")}
            </div>
          </div>

          <div className="table-container" style={{ marginTop:10 }}>
            <div className="table-head" style={{ gridTemplateColumns:"1fr 90px 60px" }}>
              <div>Module</div><div style={{textAlign:"center"}}>Note</div><div style={{textAlign:"center"}}>Abs</div>
            </div>

            {(modules||[]).slice().sort((a,b)=>(a.ordre||0)-(b.ordre||0)).map(m=>{
              const v = nv[m.id] || {note:"", absent:false};
              return (
                <div key={m.id} className="table-row" style={{ gridTemplateColumns:"1fr 90px 60px" }}>
                  <div>
                    <div style={{ fontWeight:800, fontSize:13 }}>{m.nom} <span className="mono" style={{ color:"var(--accent)", fontSize:11 }}>x{m.coefficient}</span></div>
                  </div>
                  <div>
                    <input className="input mono" style={{ textAlign:"center", padding:"10px 10px", background: v.absent ? "rgba(200,16,46,.08)" : "rgba(36,99,235,.04)" }}
                      type="number" min="0" max="20" step="0.25"
                      disabled={v.absent}
                      value={v.absent ? "" : (v.note||"")}
                      onChange={e=>setNote(m.id, e.target.value)}
                      placeholder="—"
                    />
                  </div>
                  <div style={{ textAlign:"center" }}>
                    <input type="checkbox" checked={!!v.absent} onChange={()=>toggleAbs(m.id)} style={{ width:18, height:18, cursor:"pointer" }}/>
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:14 }}>
            <button className="btn btn-outline" onClick={onClose}>Annuler</button>
            <button className="btn btn-accent" onClick={save} disabled={saving}>{saving ? "Enregistrement..." : "Enregistrer"}</button>
          </div>
        </Modal>
      );
    }

    function CandidateLookup({onBack}){
      const [cin,setCin] = useState("");
      const [loading,setLoading] = useState(false);
      const [err,setErr] = useState("");
      const [result,setResult] = useState(null);
      const [notes,setNotes] = useState([]);
      const [modules,setModules] = useState([]);

      async function search(){
        if(!cin.trim()){ setErr("Entrez votre numéro CIN"); return; }
        setLoading(true); setErr(""); setResult(null);

        const h = { apikey: SB_KEY, "Content-Type":"application/json" };
        const base = `${SB_URL}/rest/v1`;

        try{
          const cr = await fetch(`${base}/candidats?cin=eq.${encodeURIComponent(cin.trim())}&limit=1`, { headers:h });
          if(!cr.ok) throw new Error("Accès refusé. Contactez l’administration.");
          const cands = await cr.json();
          if(!cands?.length){ setErr("Aucun candidat trouvé"); setLoading(false); return; }

          const cand = cands[0];

          const ir = await fetch(`${base}/inscriptions?candidat_uuid=eq.${cand.id}&order=created_at.desc&limit=1`, { headers:h });
          if(!ir.ok) throw new Error("Accès refusé aux inscriptions.");
          const inscs = await ir.json();
          if(!inscs?.length){ setErr("Aucune inscription trouvée"); setLoading(false); return; }

          const insc = inscs[0];

          const nr = await fetch(`${base}/notes?inscription_uuid=eq.${insc.id}`, { headers:h });
          const nts = nr.ok ? await nr.json() : [];

          const mr = await fetch(`${base}/matieres?order=ordre.asc`, { headers:h });
          const mats = mr.ok ? await mr.json() : [];

          setResult({ candidat:cand, inscription:insc });
          setNotes(nts);
          setModules(mats);
        }catch(e){
          setErr("Erreur: " + e.message);
        }

        setLoading(false);
      }

      return (
        <div className="login-page">
          <div className="login-box" style={{ width:560 }}>
            <div className="login-header">
              <div className="logo-mark" style={{ width:64,height:64,borderRadius:16, margin:"0 auto 14px" }}>👤</div>
              <div className="login-title">Espace Candidat</div>
              <div className="login-sub">Consultation des résultats</div>
            </div>

            {!result ? (
              <div className="card card-padded">
                <label className="label">Numéro CIN</label>
                <input className="input" value={cin} onChange={e=>setCin(e.target.value)} placeholder="Ex: 01234567"
                       onKeyDown={e=>e.key==="Enter" && search()}/>

                {err && <div className="error-box">{err}</div>}

                <button className="btn btn-accent" style={{ width:"100%", marginTop:12 }} onClick={search} disabled={loading}>
                  {loading ? "Recherche..." : "Consulter mes résultats"}
                </button>

                <div style={{ textAlign:"center", marginTop:14 }}>
                  <button className="btn btn-outline btn-sm" onClick={onBack}>← Retour</button>
                </div>
              </div>
            ) : (
              <div>
                <div className="card card-padded" style={{ marginBottom:12 }}>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:14, color:"var(--muted)" }}>
                      {result.candidat.prenom} {result.candidat.nom}
                    </div>

                    <div className="moyenne-display"
                      style={{
                        background: result.inscription.moyenne_ponderee !== null
                          ? (Number(result.inscription.moyenne_ponderee) >= PASS_MARK ? "rgba(34,197,94,0.12)" : "rgba(200,16,46,0.12)")
                          : "rgba(36,99,235,0.06)",
                        color: result.inscription.moyenne_ponderee !== null
                          ? (Number(result.inscription.moyenne_ponderee) >= PASS_MARK ? "var(--green)" : "var(--red-tn)")
                          : "var(--dim)"
                      }}
                    >
                      {result.inscription.moyenne_ponderee !== null ? Number(result.inscription.moyenne_ponderee).toFixed(2) : "—"}
                      <span style={{ fontSize:16, fontWeight:600, marginLeft:8 }}>/20</span>
                    </div>

                    <div style={{ fontSize:18, fontWeight:900 }}>
                      <ResultBadge r={result.inscription.resultat || "En attente"} />
                    </div>
                  </div>
                </div>

                <div className="card card-padded">
                  <div className="section-title" style={{ marginTop:0 }}>Détail des notes</div>
                  {(modules||[]).map(m=>{
                    const n = (notes||[]).find(x=>x.matiere_uuid===m.id);
                    const txt = n?.absent ? "ABS" : (n?.note!==null && n?.note!==undefined ? (n.note + "/20") : "—");
                    const col = n?.absent ? "var(--red-tn)" : (n?.note!==null && n?.note!==undefined ? moyColor(n.note) : "var(--dim)");
                    return (
                      <div key={m.id} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid var(--border)", fontSize:13 }}>
                        <span>{m.nom} <span className="mono" style={{ color:"var(--accent)", fontSize:10 }}>x{m.coefficient}</span></span>
                        <span className="mono" style={{ fontWeight:900, color: col }}>{txt}</span>
                      </div>
                    );
                  })}
                </div>

                <div style={{ display:"flex", gap:10, justifyContent:"center", marginTop:14 }}>
                  <button className="btn btn-outline" onClick={()=>{ setResult(null); setCin(""); }}>Nouvelle recherche</button>
                  <button className="btn btn-outline" onClick={onBack}>Retour</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

      const totalDelib = delibRes.length;

      const avecMoy = inscriptions.filter(i=>i.moyenne_ponderee!==null && i.moyenne_ponderee!==undefined);
      const moyG = avecMoy.length ? (avecMoy.reduce((s,i)=>s+Number(i.moyenne_ponderee),0)/avecMoy.length).toFixed(2) : "—";

              <div>Intitulé</div><div>Début</div><div>Lieu</div><div>Statut</div>

    function InscriptionsView({api,data,reload}){
      const { inscriptions=[], candidats=[], sessions=[] } = data;
      const [form,setForm] = useState(null);
      const [delId,setDelId] = useState(null);
      const [q,setQ] = useState("");

      const candMap = useMemo(()=>{
        const m = new Map();
        candidats.forEach(c=>m.set(c.id,c));
        return m;
      },[candidats]);

      const sessMap = useMemo(()=>{
        const m = new Map();
        sessions.forEach(s=>m.set(s.id,s));
        return m;
      },[sessions]);

      const list = inscriptions.filter(i=>{
        const c = candMap.get(i.candidat_uuid);
        const s = sessMap.get(i.session_uuid);
        const t = (
          (c ? (c.nom+" "+c.prenom+" "+c.matricule+" "+(c.cin||"")) : "") +
          " " +
          (s ? s.intitule : "")
        ).toLowerCase();
        return t.includes(q.toLowerCase());
      }).slice().sort((a,b)=>String(b.created_at||"").localeCompare(String(a.created_at||"")));

      async function save(payload){
        if(!payload.candidat_uuid || !payload.session_uuid){
          alert("Candidat et Session obligatoires");
          return;
        }
        try{
          if(form?.id) await api.update("inscriptions", form.id, payload);
          else await api.insert("inscriptions", payload);
          setForm(null);
          await reload();
        }catch(e){ alert("Erreur: "+e.message); }
      }

      async function remove(id){
        if(!confirm("Supprimer cette inscription ?")) return;
        try{ await api.remove("inscriptions", id); setDelId(null); await reload(); }
        catch(e){ alert("Erreur: "+e.message); }
      }

      return (
        <div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap", justifyContent:"space-between", alignItems:"center" }}>
            <input className="input" style={{ width:320 }} value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher (candidat / session)" />
            <button className="btn btn-accent" onClick={()=>setForm({})}>+ Nouvelle inscription</button>
          </div>

          <div className="section-title">Inscriptions</div>
          <div className="table-container">
            <div className="table-head" style={{ gridTemplateColumns:"1.2fr 1fr .6fr .6fr" }}>
              <div>Candidat</div><div>Session</div><div>Statut</div><div>Actions</div>
            </div>

            {list.length===0 ? <Empty text="Aucune inscription" /> : list.map(i=>{
              const c = candMap.get(i.candidat_uuid);
              const s = sessMap.get(i.session_uuid);
              return (
                <div className="table-row" key={i.id} style={{ gridTemplateColumns:"1.2fr 1fr .6fr .6fr" }}>
                  <div style={{ fontWeight:900 }}>{c ? `${c.prenom} ${c.nom}` : "—"} <span className="hint mono" style={{ marginLeft:8 }}>{c?.matricule || ""}</span></div>
                  <div>{s ? s.intitule : "—"}</div>
                  <div><Tag label={i.statut || "Inscrit"} /></div>
                  <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
                    <button className="btn btn-outline btn-sm" onClick={()=>setForm(i)}>Modifier</button>
                    <button className="btn btn-red btn-sm" onClick={()=>setDelId(i.id)}>Suppr.</button>
                  </div>
                </div>
              );
            })}
          </div>

          {form!==null && (
            <InscriptionForm
              initial={form?.id ? form : null}
              sessions={sessions}
              candidats={candidats}
              onClose={()=>setForm(null)}
              onSave={save}
            />
          )}

          {delId && (
            <Modal title="Confirmer suppression" onClose={()=>setDelId(null)} width={480}>
              <div style={{ fontSize:13, color:"var(--muted)" }}>Supprimer définitivement cette inscription ?</div>
              <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:14 }}>
                <button className="btn btn-outline" onClick={()=>setDelId(null)}>Annuler</button>
                <button className="btn btn-red" onClick={()=>remove(delId)}>Supprimer</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ===========================
       APP SHELL
       =========================== */
    const ORGANISMES = ["CIFAC","AFA","OSC"];

    function App(){
      const [route,setRoute] = useState("login"); // login | lookup | admin
      const [tab,setTab] = useState("dashboard"); // dashboard | sessions | candidats | inscriptions
      const [token,setToken] = useState(localStorage.getItem("ate_token") || "");
      const [user,setUser] = useState(null);
      const [api,setApi] = useState(null);

      const [loading,setLoading] = useState(false);
      const [err,setErr] = useState("");

      const [data,setData] = useState({
        sessions:[], candidats:[], inscriptions:[], notes:[], matieres:[], deliberations:[]
      });

      async function reload(){
        if(!api) return;
        setLoading(true); setErr("");
        try{
          const [sessions,candidats,inscriptions,notes,matieres,deliberations] = await Promise.all([
            api.select("sessions","order=date_debut.desc.nullslast"),
            api.select("candidats","order=nom.asc"),
            api.select("inscriptions","order=created_at.desc.nullslast"),
            api.select("notes",""),
            api.select("matieres","order=ordre.asc"),
            api.select("deliberations","order=date_deliberation.desc.nullslast")
          ]);
          setData({ sessions, candidats, inscriptions, notes, matieres, deliberations });
        }catch(e){
          setErr(e.message);
        }
        setLoading(false);
      }

      useEffect(()=>{
        // Auto-check token
        (async ()=>{
          if(!token){ setRoute("login"); return; }
          try{
            const u = await authApi.getUser(token);
            setUser(u);
            const a = createApi(token);
            setApi(a);
            setRoute("admin");
          }catch(e){
            localStorage.removeItem("ate_token");
            setToken("");
            setUser(null);
            setApi(null);
            setRoute("login");
          }
        })();
      },[]);

      useEffect(()=>{
        if(api) reload();
      },[api]);

      async function onLogin(tok,u){
        setToken(tok);
        setUser(u);
        const a = createApi(tok);
        setApi(a);
        setRoute("admin");
      }

      async function doLogout(){
        try{ if(token) await authApi.logout(token); }catch(e){}
        localStorage.removeItem("ate_token");
        setToken("");
        setUser(null);
        setApi(null);
        setRoute("login");
        setTab("dashboard");
      }

      if(route === "login"){
        return <LoginScreen onLogin={onLogin} onGotoLookup={()=>setRoute("lookup")} />;
      }
      if(route === "lookup"){
        return <CandidateLookup onBack={()=>setRoute("login")} />;
      }

      // Admin
      return (
        <div>
          <div className="header">
            <div className="header-left">
              <div className="logo-mark">DG</div>
              <div>
                <div className="header-title">Examens ATE</div>
                <div className="header-sub">DGAC — Administration</div>
              </div>
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              {user && (
                <div className="user-badge">
                  <div className="user-dot"></div>
                  <span>{user.email || "Utilisateur"}</span>
                </div>
              )}
              <button className="btn btn-outline btn-sm" onClick={reload} disabled={loading}>
                {loading ? "Chargement…" : "Rafraîchir"}
              </button>
              <button className="btn btn-red btn-sm" onClick={doLogout}>Déconnexion</button>
            </div>
          </div>

          <main>
            <div className="nav-tabs" style={{ marginBottom:14 }}>
              {[
                ["dashboard","Dashboard"],
                ["sessions","Sessions"],
                ["candidats","Candidats"],
                ["inscriptions","Inscriptions"],
              ].map(([k,label])=>(
                <button key={k} className={"tab "+(tab===k?"active":"")} onClick={()=>setTab(k)}>{label}</button>
              ))}
            </div>

            {err && (
              <div className="card card-padded" style={{ borderColor:"rgba(200,16,46,.25)", background:"rgba(200,16,46,.06)", marginBottom:12 }}>
                <div style={{ color:"var(--red-tn)", fontWeight:900 }}>Erreur: {err}</div>
                <div className="hint" style={{ marginTop:6 }}>
                  Si l’erreur est “permission denied”, vérifie les RLS policies Supabase.
                </div>
              </div>
            )}

            {tab==="dashboard" && <Dashboard data={data} onNav={(t)=>setTab(t)} />}

            {tab==="sessions" && api && <SessionsView api={api} data={data} reload={reload} />}

            {tab==="candidats" && api && <CandidatsView api={api} data={data} reload={reload} organismes={ORGANISMES} />}

            {tab==="inscriptions" && api && <InscriptionsView api={api} data={data} reload={reload} />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
  </script>
</body>
</html>
